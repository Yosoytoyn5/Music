<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario Estudio Grabación</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Opción 1: con la imagen de York (la que pediste) */
            background-image: url('https://www.york.ac.uk/media/study/courses/postgraduate/music/music-production-banner.jpg');
            
            /* Opción 2 alternativa (si la primera falla, descomenta y prueba otra URL) */
            /* background-image: url('https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?q=80&w=2070'); */
            
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 2rem;
            
            /* Para que el texto se lea bien sobre la imagen */
            min-height: 100vh;
        }

        /* Capa semitransparente opcional para mejorar legibilidad */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.55);
            z-index: 0;
        }

        /* Contenido por encima de la capa */
        .content {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
        }

        .day-item {
            margin-bottom: 1rem;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .day-name {
            font-weight: 700;
        }

        .separator {
            margin: 1.5rem 0;
            border-top: 1px solid #aaa;
            max-width: 300px;
        }

        .total {
            margin-top: 1.5rem;
            font-style: italic;
            color: #1e466e;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .content {
                padding: 1.2rem;
                margin: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Capa para oscurecer el fondo y que el texto resalte -->
    <div class="overlay"></div>
    
    <div class="content">
        <div class="day-item">
            <span class="day-name">Lunes:</span> 2:00 pm – 6:00 pm (4 horas)
        </div>
        <div class="day-item">
            <span class="day-name">Martes:</span> 2:00 pm – 6:00 pm (4 horas)
        </div>
        <div class="day-item">
            <span class="day-name">Miércoles:</span> 2:00 pm – 6:00 pm (4 horas)
        </div>
        <div class="day-item">
            <span class="day-name">Jueves:</span> 2:00 pm – 6:00 pm (4 horas)
        </div>
        <div class="day-item">
            <span class="day-name">Viernes:</span> 2:00 pm – 6:00 pm (4 horas)
        </div>
        <div class="separator"></div>
        <div class="total">
            📍 Total semanal: 20 horas (Lunes a Viernes de 2pm a 6pm)
        </div>
    </div>
</body>
</html>
