<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario Estudio Grabación</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('https://www.york.ac.uk/media/study/courses/postgraduate/music/music-production-banner.jpg');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 2rem;
            min-height: 100vh;
            position: relative;
        }

        /* Capa semitransparente para mejorar legibilidad */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.55);
            z-index: 0;
        }

        /* Contenido por encima de la capa */
        .content {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
        }

        /* Botón circular de flecha hacia atrás - posición fija */
        .back-button {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 10;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #1e466e;
        }

        .back-button:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.3);
        }

        .back-button:active {
            transform: scale(0.95);
        }

        .back-button svg {
            width: 26px;
            height: 26px;
            fill: none;
            stroke: #1e466e;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .day-item {
            margin-bottom: 1rem;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .day-name {
            font-weight: 700;
        }

        .separator {
            margin: 1.5rem 0;
            border-top: 1px solid #aaa;
            max-width: 300px;
        }

        .total {
            margin-top: 1.5rem;
            font-style: italic;
            color: #1e466e;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .content {
                padding: 1.2rem;
                margin: 1rem;
            }
            .back-button {
                width: 45px;
                height: 45px;
                top: 15px;
                right: 15px;
            }
            .back-button svg {
                width: 22px;
                height: 22px;
            }
        }
    </style>
</head>
<body>
    <!-- Capa para oscurecer el fondo -->
    <div class="overlay"></div>
    
    <!-- Botón circular de flecha hacia atrás -->
    <a href="index.html" class="back-button" aria-label="Volver atrás">
        <svg viewBox="0 0 24 24">
            <path d="M19 12H5" />
            <path d="M12 19l-7-7 7-7" />
        </svg>
    </a>
    
    <div class="content">
        <div class="day-item">
            <span class="day-name">Lunes:</span> 2:00 pm – 6:00 pm (4 horas)
        </div>
        <div class="day-item">
            <span class="day-name">Martes:</span> 2:00 pm – 6:00 pm (4 horas)
        </div>
        <div class="day-item">
            <span class="day-name">Miércoles:</span> 2:00 pm – 6:00 pm (4 horas)
        </div>
        <div class="day-item">
            <span class="day-name">Jueves:</span> 2:00 pm – 6:00 pm (4 horas)
        </div>
        <div class="day-item">
            <span class="day-name">Viernes:</span> 2:00 pm – 6:00 pm (4 horas)
        </div>
        <div class="separator"></div>
        <div class="total">
            📍 Total semanal: 20 horas (Lunes a Viernes de 2pm a 6pm)
        </div>
    </div>
</body>
</html>
