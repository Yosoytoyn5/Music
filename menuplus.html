<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrusel táctil · Desliza para elegir</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background: linear-gradient(135deg, #0a0a0a, #2a2a2a, #1a1a1a, #3a3a3a, #0a0a0a);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            padding: 0 10px 30px 10px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Portada fija */
        .portada-fija {
            width: 100%;
            max-width: 1200px;
            margin: 12px auto 0 auto;
            padding: 0 10px;
            animation: fadeInScale 1.2s ease-out forwards;
            opacity: 0;
            transform: scale(0.9);
        }

        .portada-fija img {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 7;
            object-fit: cover;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
            border: 2px solid rgba(255,255,255,0.15);
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.1)); }
            50% { filter: drop-shadow(0 0 25px rgba(255,255,255,0.25)); }
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ===== LEYENDA PROFESIONAL ===== */
        .leyenda {
            width: 100%;
            max-width: 700px;
            margin-top: 28px;
            margin-bottom: 14px;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 15px;
            letter-spacing: 3px;
            font-weight: 300;
            text-transform: uppercase;
            padding: 0 10px;
            animation: fadeInUp 1s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .leyenda::after {
            content: '';
            display: block;
            width: 60px;
            height: 1px;
            margin: 10px auto 0 auto;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ===== CARRUSEL SIN BOTONES ===== */
        .carrusel-wrapper {
            width: 100%;
            max-width: 700px;
            margin-bottom: 20px;
            position: relative;
            border-radius: 30px;
            overflow: hidden;
            background: transparent;
            touch-action: pan-y;
        }

        .carrusel-viewport {
            overflow: hidden;
            border-radius: 22px;
            position: relative;
            background: transparent;
            touch-action: pan-y;
        }

        .carrusel-track {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
            touch-action: pan-y;
            cursor: grab;
        }

        .carrusel-track:active {
            cursor: grabbing;
        }

        .carrusel-track.dragging {
            transition: none !important;
            cursor: grabbing;
        }

        .carrusel-slide {
            min-width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 10px 20px 10px;
            background: transparent;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        .carrusel-slide .mini-img {
            width: 100%;
            margin-bottom: 18px;
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .carrusel-slide .mini-img img {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 5;
            object-fit: cover;
            border-radius: 18px;
            border: 2px solid rgba(255,255,255,0.08);
            transition: transform 0.5s ease, filter 0.5s ease;
            pointer-events: none;
        }

        /* ===== LEYENDA ESPECÍFICA PARA KERIM MUSIC (SOLO TEXTO) ===== */
        .leyenda-kerim {
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            letter-spacing: 1.5px;
            font-weight: 300;
            text-transform: uppercase;
            padding: 0 10px 12px 10px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(6px);
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .carrusel-slide .button1 {
            width: 100%;
            padding: 0 10px;
            pointer-events: auto;
        }

        .carrusel-slide .button1 button {
            width: 100%;
            background: linear-gradient(135deg, #ffffff, #e8e8e8);
            color: #0a0a0a;
            padding: 18px 12px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2.5px;
            transition: all 0.35s ease;
            box-shadow: 0 6px 25px rgba(0,0,0,0.4);
            text-align: center;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            pointer-events: auto;
        }

        .carrusel-slide .button1 button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s ease;
        }

        .carrusel-slide .button1 button:hover::before {
            left: 100%;
        }

        .carrusel-slide .button1 button:hover {
            background: linear-gradient(135deg, #1a1a1a, #000000);
            color: #ffffff;
            transform: scale(1.04) translateY(-2px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.7);
            letter-spacing: 3px;
        }

        .carrusel-slide .button1 button:active {
            transform: scale(0.96);
        }

        /* ===== INDICADORES (PUNTOS) ===== */
        .carrusel-indicators {
            display: flex;
            justify-content: center;
            gap: 14px;
            padding: 18px 0 8px 0;
            background: transparent;
        }

        .carrusel-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            pointer-events: auto;
        }

        .carrusel-dot::after {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border-radius: 50%;
            border: 2px solid transparent;
            transition: all 0.4s ease;
        }

        .carrusel-dot.active {
            background: #ffffff;
            border-color: #ffffff;
            transform: scale(1.25);
            box-shadow: 0 0 25px rgba(255,255,255,0.4);
        }

        .carrusel-dot.active::after {
            border-color: rgba(255,255,255,0.2);
        }

        .carrusel-dot:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.15);
        }

        /* ===== EFECTO PARTÍCULAS ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 10% 30%, rgba(255,255,255,0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 70%, rgba(255,255,255,0.04) 0%, transparent 50%);
            pointer-events: none;
            animation: particleFloat 12s ease-in-out infinite alternate;
            z-index: -1;
        }

        @keyframes particleFloat {
            0% { opacity: 0.3; transform: scale(1) rotate(0deg); }
            100% { opacity: 0.7; transform: scale(1.1) rotate(5deg); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .carrusel-wrapper {
                max-width: 100%;
                border-radius: 16px;
            }

            .carrusel-slide {
                padding: 6px 6px 14px 6px;
            }

            .carrusel-slide .button1 button {
                font-size: 17px;
                padding: 15px 8px;
                letter-spacing: 1.5px;
            }

            .carrusel-slide .mini-img img {
                aspect-ratio: 16 / 5;
                border-radius: 14px;
            }

            .portada-fija {
                padding: 0 4px;
                margin-top: 8px;
            }

            .portada-fija img {
                aspect-ratio: 16 / 6;
                border-radius: 16px;
            }

            .carrusel-dot {
                width: 10px;
                height: 10px;
                gap: 10px;
            }

            .leyenda {
                font-size: 12px;
                margin-top: 20px;
                margin-bottom: 10px;
                letter-spacing: 2px;
            }

            .leyenda::after {
                width: 40px;
                margin-top: 8px;
            }

            .leyenda-kerim {
                font-size: 10px;
                letter-spacing: 1px;
                padding: 0 10px 8px 10px;
            }
        }

        @media (max-width: 380px) {
            .carrusel-slide .button1 button {
                font-size: 14px;
                padding: 12px 6px;
                letter-spacing: 1px;
            }

            .carrusel-slide .mini-img img {
                aspect-ratio: 16 / 4;
            }

            .leyenda {
                font-size: 10px;
                letter-spacing: 1.5px;
            }

            .leyenda-kerim {
                font-size: 9px;
                letter-spacing: 0.8px;
                padding: 0 8px 6px 8px;
            }
        }

        @media (min-width: 768px) {
            .carrusel-wrapper {
                max-width: 750px;
            }

            .carrusel-slide .button1 button {
                font-size: 24px;
                padding: 20px 16px;
            }

            .portada-fija {
                margin-top: 18px;
            }

            .portada-fija img {
                aspect-ratio: 16 / 5;
            }

            .leyenda {
                font-size: 16px;
                max-width: 750px;
                letter-spacing: 4px;
            }

            .leyenda-kerim {
                font-size: 13px;
                letter-spacing: 1.8px;
                padding: 0 10px 14px 10px;
            }
        }

        @media (min-width: 1200px) {
            .carrusel-wrapper {
                max-width: 850px;
            }

            .leyenda {
                max-width: 850px;
                font-size: 17px;
            }

            .leyenda-kerim {
                font-size: 14px;
                letter-spacing: 2px;
                padding: 0 10px 16px 10px;
            }
        }
    </style>
</head>
<body>

    <!-- PORTADA FIJA -->
    <div class="portada-fija">
        <img src="https://i.pinimg.com/originals/52/77/2e/52772e0efba59b07dbeae4463e70bf25.gif" alt="Imagen de portada">
    </div>

    <!-- LEYENDA PROFESIONAL -->
    <div class="leyenda">Desliza hacia los lados para elegir</div>

    <!-- CARRUSEL TÁCTIL SIN BOTONES -->
    <div class="carrusel-wrapper">
        <div class="carrusel-viewport">
            <div class="carrusel-track" id="carruselTrack">

                <!-- Slide 1 -->
                <div class="carrusel-slide">
                    <div class="mini-img">
                        <img src="https://www.dropbox.com/scl/fi/fi800hxjvsqe0bwwlhxxa/3346530_slider.png?rlkey=qiifcvge4lvg5o7fcr88ftcxu&st=mp5kiu9b&raw=1" alt="Agendar">
                    </div>
                    <div class="button1">
                        <a href="formulariodecitasporwhastapplus.html">
                            <button>Agendar</button>
                        </a>
                    </div>
                </div>

                <!-- Slide 2 -->
                <div class="carrusel-slide">
                    <div class="mini-img">
                        <img src="https://www.dropbox.com/scl/fi/kckbrg6uyca6acqd9ltps/juliush-clock-1983_512.gif?rlkey=rn797llxxj1loqewnlh51iwqs&st=c5bz9j90&raw=1" alt="Horarios">
                    </div>
                    <div class="button1">
                        <a href="horariodeestudiodegrabaciongratis.html">
                            <button>Horarios</button>
                        </a>
                    </div>
                </div>

                <!-- Slide 3 -->
                <div class="carrusel-slide">
                    <div class="mini-img">
                        <img src="https://www.dropbox.com/scl/fi/6wh4qibh3rzhzrq230yuk/25735928-skull-1339_512.gif?rlkey=5au2p6hnzovf32e2oqsg4o1yn&st=wimv373f&raw=1" alt="Noticias">
                    </div>
                    <div class="button1">
                        <a href="noticiasgratis.html">
                            <button>Noticias</button>
                        </a>
                    </div>
                </div>

                <!-- Slide 4 (Kerim Music) con leyenda profesional -->
                <div class="carrusel-slide">
                    <div class="mini-img">
                        <img src="https://www.dropbox.com/scl/fi/bf60dftx3xarwa9bxvu4l/gustavorezende-audio-4919.gif?rlkey=n9azy9ivi6414a3a34w64tcll&st=xm5tdx4v&raw=1" alt="Kerim Music">
                    </div>
                    <!-- Leyenda específica para Kerim Music, solo texto -->
                    <div class="leyenda-kerim">MANTENGA LA APP ABIERTA PARA TENER UNA REPRODUCCIÓN FLUIDA SIN CORTE</div>
                    <div class="button1">
                        <a href="musicakerimmusicplus.html">
                            <button>Kerim Music</button>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Indicadores -->
        <div class="carrusel-indicators" id="carruselIndicators">
            <span class="carrusel-dot active" data-index="0"></span>
            <span class="carrusel-dot" data-index="1"></span>
            <span class="carrusel-dot" data-index="2"></span>
            <span class="carrusel-dot" data-index="3"></span>
        </div>
    </div>

    <script>
        (function() {
            const track = document.getElementById('carruselTrack');
            const dots = document.querySelectorAll('.carrusel-dot');
            const wrapper = document.querySelector('.carrusel-wrapper');
            const totalSlides = 4;
            let currentIndex = 0;
            let startX = 0;
            let currentX = 0;
            let isDragging = false;
            let isTransitioning = false;

            // Función para ir a un slide específico
            function goToSlide(index) {
                if (isTransitioning) return;
                if (index < 0) index = totalSlides - 1;
                if (index >= totalSlides) index = 0;

                isTransitioning = true;
                currentIndex = index;

                track.style.transition = 'transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                track.style.transform = `translateX(-${currentIndex * 100}%)`;

                dots.forEach((dot, i) => {
                    dot.classList.toggle('active', i === currentIndex);
                });

                setTimeout(() => {
                    isTransitioning = false;
                }, 650);
            }

            // ===== EVENTOS TÁCTILES =====
            track.addEventListener('touchstart', function(e) {
                if (isTransitioning) return;
                startX = e.touches[0].clientX;
                currentX = startX;
                isDragging = true;
                track.style.transition = 'none';
                track.classList.add('dragging');
            }, { passive: true });

            track.addEventListener('touchmove', function(e) {
                if (!isDragging || isTransitioning) return;
                currentX = e.touches[0].clientX;
                const diff = currentX - startX;
                const offset = (-currentIndex * 100) + (diff / track.offsetWidth * 100);
                track.style.transform = `translateX(${offset}%)`;
            }, { passive: true });

            track.addEventListener('touchend', function(e) {
                if (!isDragging || isTransitioning) {
                    isDragging = false;
                    track.classList.remove('dragging');
                    return;
                }
                isDragging = false;
                track.classList.remove('dragging');

                const diff = currentX - startX;
                const threshold = track.offsetWidth * 0.2;

                if (Math.abs(diff) > threshold) {
                    if (diff < 0 && currentIndex < totalSlides - 1) {
                        goToSlide(currentIndex + 1);
                    } else if (diff > 0 && currentIndex > 0) {
                        goToSlide(currentIndex - 1);
                    } else {
                        goToSlide(currentIndex);
                    }
                } else {
                    goToSlide(currentIndex);
                }
            }, { passive: true });

            // ===== EVENTOS MOUSE (para escritorio) =====
            let mouseStartX = 0;
            let mouseCurrentX = 0;
            let isMouseDragging = false;

            track.addEventListener('mousedown', function(e) {
                if (isTransitioning) return;
                mouseStartX = e.clientX;
                mouseCurrentX = mouseStartX;
                isMouseDragging = true;
                track.style.transition = 'none';
                track.classList.add('dragging');
                e.preventDefault();
            });

            document.addEventListener('mousemove', function(e) {
                if (!isMouseDragging || isTransitioning) return;
                mouseCurrentX = e.clientX;
                const diff = mouseCurrentX - mouseStartX;
                const offset = (-currentIndex * 100) + (diff / track.offsetWidth * 100);
                track.style.transform = `translateX(${offset}%)`;
            });

            document.addEventListener('mouseup', function(e) {
                if (!isMouseDragging || isTransitioning) {
                    isMouseDragging = false;
                    track.classList.remove('dragging');
                    return;
                }
                isMouseDragging = false;
                track.classList.remove('dragging');

                const diff = mouseCurrentX - mouseStartX;
                const threshold = track.offsetWidth * 0.2;

                if (Math.abs(diff) > threshold) {
                    if (diff < 0 && currentIndex < totalSlides - 1) {
                        goToSlide(currentIndex + 1);
                    } else if (diff > 0 && currentIndex > 0) {
                        goToSlide(currentIndex - 1);
                    } else {
                        goToSlide(currentIndex);
                    }
                } else {
                    goToSlide(currentIndex);
                }
            });

            // ===== CLICK EN PUNTOS =====
            dots.forEach((dot, index) => {
                dot.addEventListener('click', function() {
                    if (index !== currentIndex) {
                        goToSlide(index);
                    }
                });
            });

            // ===== PREVENIR DRAG EN IMÁGENES =====
            document.querySelectorAll('.carrusel-slide img').forEach(img => {
                img.addEventListener('dragstart', function(e) {
                    e.preventDefault();
                });
            });

            // Iniciar en slide 0
            goToSlide(0);

        })();
    </script>

</body>
</html>
