<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página con fondo blanco y negro · posiciones aleatorias</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            /* FONDO BLANCO Y NEGRO CON ANIMACIÓN */
            background: linear-gradient(135deg, #1a1a1a, #4a4a4a, #2a2a2a, #5a5a5a, #1a1a1a);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            padding: 0 10px 30px 10px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* IMAGEN DE PORTADA FIJA ARRIBA */
        .portada-fija {
            width: 100%;
            max-width: 1200px;
            margin: 12px auto 0 auto;
            padding: 0 10px;
            animation: fadeInScale 1.2s ease-out forwards;
            opacity: 0;
            transform: scale(0.9);
        }

        .portada-fija img {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 7;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 3px solid rgba(255,255,255,0.2);
            animation: subtleGlow 1.2s ease-out 0.2s forwards;
        }

        @keyframes subtleGlow {
            0% { filter: drop-shadow(0 0 0px rgba(255,255,255,0)); }
            50% { filter: drop-shadow(0 0 15px rgba(255,255,255,0.3)); }
            100% { filter: drop-shadow(0 0 0px rgba(255,255,255,0)); }
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* CONTENEDOR DE BOTONES: 2 columnas con grid */
        .botones-container {
            display: grid;
            grid-template-columns: 1fr 1fr;  /* 2 columnas fijas */
            gap: 20px;
            margin-top: 25px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 650px;   /* ancho cómodo para 2 columnas */
            padding: 0 10px;
        }

        /* Cada bloque de botón + mini imagen */
        .boton-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeInUp 1s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
            width: 100%;
        }

        .mini-img {
            width: 100%;
            margin-bottom: 8px;
        }

        .mini-img img {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 5;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.15);
            transition: transform 0.3s ease;
        }

        .mini-img img:hover {
            transform: scale(1.02);
        }

        .button1 {
            width: 100%;
        }

        .button1 button {
            width: 100%;
            background-color: #ffffff;
            color: #000000;
            padding: 14px 10px;
            border: 2px solid #000000;
            border-radius: 50px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
            white-space: nowrap;
        }

        .button1 button:hover {
            background-color: #000000;
            color: #ffffff;
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            border-color: #ffffff;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Efecto de partículas en blanco y negro */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.05) 0%, transparent 50%);
            pointer-events: none;
            animation: particleMove 8s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes particleMove {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }

        /* --- RESPONSIVE: en móvil apilamos en 1 columna si es necesario,
           pero mantenemos 2 filas en pantallas pequeñas ajustando tamaño */
        @media (max-width: 480px) {
            .botones-container {
                grid-template-columns: 1fr 1fr;  /* seguimos con 2 columnas */
                gap: 14px;
                max-width: 100%;
                padding: 0 4px;
            }
            .button1 button {
                font-size: 14px;
                padding: 12px 4px;
                letter-spacing: 1px;
                white-space: normal;   /* permite salto de línea en textos largos */
            }
            .mini-img img {
                aspect-ratio: 16 / 5;
                border-radius: 12px;
            }
            .portada-fija {
                padding: 0 4px;
                margin-top: 8px;
            }
            .portada-fija img {
                aspect-ratio: 16 / 6;
                border-radius: 12px;
            }
        }

        /* Para pantallas muy pequeñas (menos de 400px) reducimos aún más */
        @media (max-width: 380px) {
            .botones-container {
                gap: 10px;
            }
            .button1 button {
                font-size: 12px;
                padding: 10px 2px;
                border-radius: 30px;
            }
            .mini-img img {
                aspect-ratio: 16 / 4;
            }
        }

        /* Para pantallas grandes: más espacio y tamaño cómodo */
        @media (min-width: 768px) {
            .botones-container {
                max-width: 700px;
                gap: 28px;
            }
            .button1 button {
                font-size: 20px;
                padding: 16px 12px;
            }
            .portada-fija {
                margin-top: 16px;
            }
            .portada-fija img {
                aspect-ratio: 16 / 5;
            }
        }

        @media (min-width: 1200px) {
            .botones-container {
                max-width: 800px;
                gap: 32px;
            }
        }
    </style>
</head>
<body>

    <!-- IMAGEN DE PORTADA FIJA (siempre arriba) -->
    <div class="portada-fija">
        <img src="https://i.pinimg.com/originals/52/77/2e/52772e0efba59b07dbeae4463e70bf25.gif" alt="Imagen de portada">
    </div>

    <!-- CONTENEDOR DE BOTONES (se reordenarán aleatoriamente) -->
    <div id="botonesContainer" class="botones-container">
        <!-- Los botones se inyectan con JS en orden aleatorio -->
    </div>

    <script>
        (function() {
            // DATOS DE CADA BOTÓN (con su mini imagen y enlace)
            const botonesData = [
                {
                    id: 'agendar',
                    img: 'https://www.dropbox.com/scl/fi/fi800hxjvsqe0bwwlhxxa/3346530_slider.png?rlkey=qiifcvge4lvg5o7fcr88ftcxu&st=mp5kiu9b&raw=1',
                    link: 'formulariodecitasporwhastapgratis.html',
                    texto: 'Agendar'
                },
                {
                    id: 'horarios',
                    img: 'https://www.dropbox.com/scl/fi/kckbrg6uyca6acqd9ltps/juliush-clock-1983_512.gif?rlkey=rn797llxxj1loqewnlh51iwqs&st=c5bz9j90&raw=1',
                    link: 'horariodeestudiodegrabaciongratis.html',
                    texto: 'Horarios'
                },
                {
                    id: 'noticias',
                    img: 'https://www.dropbox.com/scl/fi/6wh4qibh3rzhzrq230yuk/25735928-skull-1339_512.gif?rlkey=5au2p6hnzovf32e2oqsg4o1yn&st=wimv373f&raw=1',
                    link: 'noticiasgratis.html',
                    texto: 'Noticias'
                },
                {
                    id: 'kerim',
                    img: 'https://www.dropbox.com/scl/fi/bf60dftx3xarwa9bxvu4l/gustavorezende-audio-4919.gif?rlkey=n9azy9ivi6414a3a34w64tcll&st=xm5tdx4v&raw=1',
                    link: 'musicakerimmusicplus.html',
                    texto: 'Kerim Music'
                }
            ];

            // FUNCIÓN PARA REVOLVER (FISHER-YATES)
            function shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            // MEZCLAR LOS BOTONES
            const shuffled = shuffleArray([...botonesData]);

            // GENERAR HTML
            const container = document.getElementById('botonesContainer');
            container.innerHTML = '';

            shuffled.forEach(boton => {
                const html = `
                    <div class="boton-item">
                        <div class="mini-img">
                            <img src="${boton.img}" alt="mini ${boton.texto}">
                        </div>
                        <div class="button1">
                            <a href="${boton.link}">
                                <button>${boton.texto}</button>
                            </a>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        })();
    </script>

</body>
</html>
