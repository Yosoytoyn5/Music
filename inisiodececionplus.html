<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Acceso · Blanco & Negro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: url('https://wallpapers.com/images/hd/newsroom-background-1500-x-999-qyiubqf85wlp4yvo.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 0;
            backdrop-filter: grayscale(100%) brightness(0.7);
        }

        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .main-container.visible {
            opacity: 1;
        }

        .legend-text {
            text-align: center;
            color: #ffffff;
            font-size: 15px;
            line-height: 1.8;
            font-weight: 300;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
            padding: 0 10px;
            animation: fadeInDown 0.8s ease-out;
        }

        .legend-text .highlight {
            color: #e0e0e0;
            font-weight: 400;
        }

        .legend-text .highlight-action {
            color: #ffffff;
            font-weight: 500;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-box {
            display: flex;
            flex-direction: row;
            gap: 12px;
            width: 100%;
            margin: 0 auto;
        }

        input[type="text"] {
            flex: 1;
            padding: 16px 20px;
            font-size: 16px;
            border: 2px solid #ffffff;
            border-radius: 50px;
            outline: none;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            color: #ffffff;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        input[type="text"]:focus {
            background: rgba(0, 0, 0, 0.9);
            border-color: #aaaaaa;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        button {
            padding: 16px 28px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            color: #ffffff;
            border: 2px solid #ffffff;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
            border-color: #cccccc;
        }

        button:active {
            transform: scale(0.98);
        }

        .registrar-btn {
            background: rgba(0, 0, 0, 0.5);
            border-color: #aaaaaa;
        }
        
        .registrar-btn:hover {
            background: rgba(0, 0, 0, 0.7);
            border-color: #ffffff;
        }

        /* BOTÓN MEJORAR PLAN - VERSIÓN FLOTANTE CIRCULAR */
        .mejorar-plan-flotante {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(255, 215, 0, 0.35), rgba(255, 200, 0, 0.2));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: #ffffff;
            border: 2.5px solid #ffd700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 8px 35px rgba(255, 215, 0, 0.3), 0 2px 15px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            font-size: 28px;
            font-weight: 700;
            text-decoration: none;
            padding: 0;
            line-height: 1;
            text-align: center;
        }

        .mejorar-plan-flotante::after {
            content: "⬆";
            display: block;
            font-size: 30px;
            line-height: 1;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .mejorar-plan-flotante .tooltip-text {
            position: absolute;
            bottom: 85px;
            right: 50%;
            transform: translateX(50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            border: 1px solid rgba(255, 215, 0, 0.3);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            letter-spacing: 0.5px;
        }

        .mejorar-plan-flotante:hover .tooltip-text,
        .mejorar-plan-flotante:focus .tooltip-text {
            opacity: 1;
        }

        .mejorar-plan-flotante:hover {
            transform: scale(1.12);
            background: rgba(255, 215, 0, 0.5);
            border-color: #ffffff;
            box-shadow: 0 12px 50px rgba(255, 215, 0, 0.4), 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .mejorar-plan-flotante:active {
            transform: scale(0.92);
            background: rgba(255, 215, 0, 0.6);
        }

        @media (max-width: 900px) {
            .mejorar-plan-flotante {
                bottom: 25px;
                right: 25px;
                width: 62px;
                height: 62px;
                font-size: 24px;
                border-width: 2px;
            }
            .mejorar-plan-flotante::after {
                font-size: 26px;
            }
            .mejorar-plan-flotante .tooltip-text {
                font-size: 11px;
                bottom: 75px;
                padding: 5px 12px;
            }
        }

        @media (max-width: 768px) {
            .mejorar-plan-flotante {
                bottom: 22px;
                right: 22px;
                width: 56px;
                height: 56px;
                font-size: 20px;
                border-width: 2px;
            }
            .mejorar-plan-flotante::after {
                font-size: 22px;
            }
            .mejorar-plan-flotante .tooltip-text {
                font-size: 10px;
                bottom: 68px;
                padding: 4px 10px;
            }
            .main-container {
                max-width: 90%;
            }
            .search-box {
                gap: 10px;
            }
            input[type="text"] {
                padding: 14px 18px;
                font-size: 15px;
            }
            button {
                padding: 14px 24px;
                font-size: 15px;
            }
            .legend-text {
                font-size: 14px;
                line-height: 1.6;
            }
        }
        
        @media (max-width: 600px) {
            .mejorar-plan-flotante {
                bottom: 18px;
                right: 18px;
                width: 50px;
                height: 50px;
                font-size: 18px;
                border-width: 1.8px;
                box-shadow: 0 6px 25px rgba(255, 215, 0, 0.25), 0 2px 10px rgba(0, 0, 0, 0.3);
            }
            .mejorar-plan-flotante::after {
                font-size: 20px;
            }
            .mejorar-plan-flotante .tooltip-text {
                font-size: 9px;
                bottom: 60px;
                padding: 3px 8px;
                border-radius: 16px;
            }
            .search-box {
                flex-wrap: wrap;
                justify-content: center;
            }
            input[type="text"] {
                flex: 1 1 100%;
                order: 1;
            }
            .enviar-btn {
                order: 2;
            }
            .registrar-btn {
                order: 3;
            }
        }
        
        @media (max-width: 480px) {
            .mejorar-plan-flotante {
                bottom: 15px;
                right: 15px;
                width: 44px;
                height: 44px;
                font-size: 15px;
                border-width: 1.5px;
                box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2), 0 2px 8px rgba(0, 0, 0, 0.25);
            }
            .mejorar-plan-flotante::after {
                font-size: 17px;
            }
            .mejorar-plan-flotante .tooltip-text {
                font-size: 8px;
                bottom: 52px;
                padding: 2px 7px;
                border-radius: 14px;
            }
            body {
                padding: 12px;
            }
            .main-container {
                max-width: 100%;
                gap: 15px;
            }
            .search-box {
                flex-direction: column;
                gap: 12px;
                width: 100%;
            }
            input[type="text"] {
                width: 100%;
                padding: 16px 18px;
                font-size: 16px;
                text-align: left;
            }
            button {
                width: 100%;
                padding: 14px 20px;
                font-size: 16px;
                font-weight: 600;
            }
            .legend-text {
                font-size: 13px;
                line-height: 1.5;
                padding: 0 5px;
            }
        }
        
        @media (max-width: 400px) {
            .mejorar-plan-flotante {
                bottom: 12px;
                right: 12px;
                width: 38px;
                height: 38px;
                font-size: 12px;
                border-width: 1.3px;
                box-shadow: 0 3px 15px rgba(255, 215, 0, 0.15), 0 1px 6px rgba(0, 0, 0, 0.2);
            }
            .mejorar-plan-flotante::after {
                font-size: 14px;
            }
            .mejorar-plan-flotante .tooltip-text {
                font-size: 7px;
                bottom: 46px;
                padding: 2px 6px;
                border-radius: 12px;
            }
            input[type="text"] {
                padding: 14px 16px;
                font-size: 14px;
            }
            input[type="text"]::placeholder {
                font-size: 13px;
            }
            button {
                padding: 12px 18px;
                font-size: 14px;
            }
            .legend-text {
                font-size: 12px;
            }
        }
        
        @media (max-width: 320px) {
            .mejorar-plan-flotante {
                bottom: 10px;
                right: 10px;
                width: 32px;
                height: 32px;
                font-size: 10px;
                border-width: 1px;
                box-shadow: 0 2px 10px rgba(255, 215, 0, 0.1);
            }
            .mejorar-plan-flotante::after {
                font-size: 12px;
            }
            .mejorar-plan-flotante .tooltip-text {
                display: none;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .mejorar-plan-flotante {
                bottom: 15px;
                right: 15px;
                width: 40px;
                height: 40px;
                font-size: 14px;
                border-width: 1.5px;
            }
            .mejorar-plan-flotante::after {
                font-size: 16px;
            }
            .mejorar-plan-flotante .tooltip-text {
                font-size: 8px;
                bottom: 50px;
                padding: 2px 8px;
            }
        }

        @media (max-height: 400px) and (orientation: landscape) {
            .mejorar-plan-flotante {
                bottom: 10px;
                right: 10px;
                width: 34px;
                height: 34px;
                font-size: 11px;
                border-width: 1.2px;
            }
            .mejorar-plan-flotante::after {
                font-size: 13px;
            }
            .mejorar-plan-flotante .tooltip-text {
                display: none;
            }
        }
        
        @media (hover: none) and (pointer: coarse) {
            button {
                -webkit-tap-highlight-color: rgba(255, 255, 255, 0.3);
            }
            input[type="text"] {
                font-size: 16px;
            }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border-radius: 28px;
            max-width: 340px;
            width: 85%;
            padding: 24px 20px 20px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 255, 255, 0.1);
            animation: modalAppear 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-family: inherit;
        }

        @keyframes modalAppear {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-icon {
            font-size: 56px;
            margin-bottom: 12px;
            display: inline-block;
            filter: grayscale(100%) drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }

        .modal-title {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .modal-message {
            font-size: 17px;
            color: #e0e0e0;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 12px;
            border-radius: 48px;
            margin: 14px 0 10px;
            line-height: 1.4;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-close-btn {
            background: #333333;
            border: 2px solid #666666;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            width: 100%;
            backdrop-filter: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .modal-close-btn:hover {
            background: #555555;
            border-color: #aaaaaa;
            transform: scale(1.02);
        }

        .modal-close-btn:active {
            transform: scale(0.97);
        }

        @media (max-width: 480px) {
            .modal-container {
                width: 80%;
                padding: 20px 16px 16px;
            }
            .modal-title {
                font-size: 24px;
            }
            .modal-message {
                font-size: 15px;
            }
        }

        .timer-display {
            display: none;
        }
    </style>
</head>
<body>
    <!-- CONTENIDO PRINCIPAL -->
    <div class="main-container" id="mainContainer">
        <div class="legend-text">
            Si su usuario ya está registrado,<br>
            ingrese su información y presione <span class="highlight-action">Entrar</span>.<br>
            En caso contrario, presione <span class="highlight-action">Registrar</span>.
        </div>

        <div class="search-box">
            <input type="text" id="textInput" placeholder="Ingrese su usuario...">
            <button id="submitBtn" class="enviar-btn">Entrar</button>
            <button id="registrarBtn" class="registrar-btn">Registrar</button>
        </div>
    </div>

    <!-- BOTÓN MEJORAR PLAN -->
    <button id="mejorarPlanBtn" class="mejorar-plan-flotante" aria-label="Mejorar Plan">
        <span class="tooltip-text">Mejorar Plan</span>
    </button>

    <!-- MODAL -->
    <div id="customModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-icon">⚠️</div>
            <div class="modal-title">Acceso denegado</div>
            <div class="modal-message" id="modalMessageText">
                La información ingresada no es válida.
            </div>
            <button class="modal-close-btn" id="modalCloseBtn">Entendido</button>
        </div>
    </div>

    <script>
        (function(){
            "use strict";

            // --- ELEMENTOS DOM ---
            var mainContainer = document.getElementById('mainContainer');
            var input = document.getElementById('textInput');
            var enviarBtn = document.getElementById('submitBtn');
            var registrarBtn = document.getElementById('registrarBtn');
            var mejorarPlanBtn = document.getElementById('mejorarPlanBtn');
            
            var modalOverlay = document.getElementById('customModal');
            var modalMessageText = document.getElementById('modalMessageText');
            var modalCloseBtn = document.getElementById('modalCloseBtn');

            // --- LISTA DE USUARIOS VÁLIDOS (exactos) ---
            var USUARIOS_VALIDOS = ["Marco", ""];

            // --- FUNCIONES ---
            function mostrarModalInvalido(usuarioIngresado) {
                if (usuarioIngresado === "") {
                    modalMessageText.innerHTML = "No ha ingresado ningún nombre.<br>Por favor, ingrese un usuario.";
                } else {
                    modalMessageText.innerHTML = "“" + escapeHtml(usuarioIngresado) + "” no está autorizado.<br>Verifique su usuario o regístrese.";
                }
                modalOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            function cerrarModal() {
                modalOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            // --- FUNCIÓN PRINCIPAL DE VERIFICACIÓN Y REDIRECCIÓN ---
            function verificarYRedirigir() {
                var texto = input.value.trim();
                
                // Caso vacío
                if (texto === "") {
                    mostrarModalInvalido("");
                    return;
                }
                
                // Verificar si el texto coincide exactamente con algún usuario válido
                var esValido = false;
                for (var i = 0; i < USUARIOS_VALIDOS.length; i++) {
                    if (USUARIOS_VALIDOS[i] === texto) {
                        esValido = true;
                        break;
                    }
                }
                
                if (!esValido) {
                    mostrarModalInvalido(texto);
                    return;
                }
                
                // --- USUARIO VÁLIDO: OCULTAR TODO Y REDIRIGIR ---
                // Guardar en sessionStorage para la siguiente página
                sessionStorage.setItem("textoEnviado", texto);
                
                // Ocultar el contenido principal y el botón flotante (opcional)
                mainContainer.style.display = 'none';
                mejorarPlanBtn.style.display = 'none';
                
                // Redirigir a la siguiente página (simulada con un hash o URL)
                // En este ejemplo, usamos "menuplus.html" como destino.
                window.location.href = "musicakerimmusicplus.html";
            }

            // --- NAVEGACIÓN A REGISTRO Y MEJORAR PLAN ---
            function irARegistro() {
                window.location.href = "registrorapidodewhatsapplus.html";
            }

            function irAMejorarPlan() {
                window.location.href = "index.html";
            }

            // --- EVENTOS ---
            enviarBtn.addEventListener('click', verificarYRedirigir);
            registrarBtn.addEventListener('click', irARegistro);
            mejorarPlanBtn.addEventListener('click', irAMejorarPlan);
            
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    verificarYRedirigir();
                }
            });
            
            input.addEventListener('touchstart', function() {
                this.focus();
            });
            
            modalCloseBtn.addEventListener('click', cerrarModal);
            
            modalOverlay.addEventListener('click', function(e) {
                if (e.target === modalOverlay) {
                    cerrarModal();
                }
            });
            
            var modalContainer = document.querySelector('.modal-container');
            if (modalContainer) {
                modalContainer.addEventListener('click', function(e) {
                    e.stopPropagation();
                });
            }
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                    cerrarModal();
                    e.preventDefault();
                }
            });

            // Mostrar el contenido principal con animación
            mainContainer.classList.add('visible');

        })();
    </script>
</body>
</html>
