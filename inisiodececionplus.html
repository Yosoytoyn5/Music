<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Acceso Usuario - Blanco y Negro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: url('https://wallpapers.com/images/hd/newsroom-background-1500-x-999-qyiubqf85wlp4yvo.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 0;
            backdrop-filter: grayscale(100%) brightness(0.7);
        }

        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .main-container.visible {
            opacity: 1;
        }

        .legend-text {
            text-align: center;
            color: #ffffff;
            font-size: 15px;
            line-height: 1.8;
            font-weight: 300;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
            padding: 0 10px;
            animation: fadeInDown 0.8s ease-out;
        }

        .legend-text .highlight {
            color: #e0e0e0;
            font-weight: 400;
        }

        .legend-text .highlight-action {
            color: #ffffff;
            font-weight: 500;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-box {
            display: flex;
            flex-direction: row;
            gap: 12px;
            width: 100%;
            margin: 0 auto;
        }

        input[type="text"] {
            flex: 1;
            padding: 16px 20px;
            font-size: 16px;
            border: 2px solid #ffffff;
            border-radius: 50px;
            outline: none;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            color: #ffffff;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        input[type="text"]:focus {
            background: rgba(0, 0, 0, 0.9);
            border-color: #aaaaaa;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        button {
            padding: 16px 28px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            color: #ffffff;
            border: 2px solid #ffffff;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
            border-color: #cccccc;
        }

        button:active {
            transform: scale(0.98);
        }

        .registrar-btn {
            background: rgba(0, 0, 0, 0.5);
            border-color: #aaaaaa;
        }
        
        .registrar-btn:hover {
            background: rgba(0, 0, 0, 0.7);
            border-color: #ffffff;
        }

        /* BOTÓN MEJORAR PLAN - VERSIÓN FLOTANTE CIRCULAR */
        .mejorar-plan-flotante {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(255, 215, 0, 0.35), rgba(255, 200, 0, 0.2));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: #ffffff;
            border: 2.5px solid #ffd700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 8px 35px rgba(255, 215, 0, 0.3), 0 2px 15px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            font-size: 28px;
            font-weight: 700;
            text-decoration: none;
            padding: 0;
            line-height: 1;
            text-align: center;
        }

        .mejorar-plan-flotante::after {
            content: "⬆";
            display: block;
            font-size: 30px;
            line-height: 1;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .mejorar-plan-flotante .tooltip-text {
            position: absolute;
            bottom: 85px;
            right: 50%;
            transform: translateX(50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            border: 1px solid rgba(255, 215, 0, 0.3);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            letter-spacing: 0.5px;
        }

        .mejorar-plan-flotante:hover .tooltip-text,
        .mejorar-plan-flotante:focus .tooltip-text {
            opacity: 1;
        }

        .mejorar-plan-flotante:hover {
            transform: scale(1.12);
            background: rgba(255, 215, 0, 0.5);
            border-color: #ffffff;
            box-shadow: 0 12px 50px rgba(255, 215, 0, 0.4), 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .mejorar-plan-flotante:active {
            transform: scale(0.92);
            background: rgba(255, 215, 0, 0.6);
        }

        @media (max-width: 900px) {
            .mejorar-plan-flotante {
                bottom: 25px;
                right: 25px;
                width: 62px;
                height: 62px;
                font-size: 24px;
                border-width: 2px;
            }
            .mejorar-plan-flotante::after {
                font-size: 26px;
            }
            .mejorar-plan-flotante .tooltip-text {
                font-size: 11px;
                bottom: 75px;
                padding: 5px 12px;
            }
        }

        @media (max-width: 768px) {
            .mejorar-plan-flotante {
                bottom: 22px;
                right: 22px;
                width: 56px;
                height: 56px;
                font-size: 20px;
                border-width: 2px;
            }
            .mejorar-plan-flotante::after {
                font-size: 22px;
            }
            .mejorar-plan-flotante .tooltip-text {
                font-size: 10px;
                bottom: 68px;
                padding: 4px 10px;
            }
            .main-container {
                max-width: 90%;
            }
            .search-box {
                gap: 10px;
            }
            input[type="text"] {
                padding: 14px 18px;
                font-size: 15px;
            }
            button {
                padding: 14px 24px;
                font-size: 15px;
            }
            .legend-text {
                font-size: 14px;
                line-height: 1.6;
            }
        }
        
        @media (max-width: 600px) {
            .mejorar-plan-flotante {
                bottom: 18px;
                right: 18px;
                width: 50px;
                height: 50px;
                font-size: 18px;
                border-width: 1.8px;
                box-shadow: 0 6px 25px rgba(255, 215, 0, 0.25), 0 2px 10px rgba(0, 0, 0, 0.3);
            }
            .mejorar-plan-flotante::after {
                font-size: 20px;
            }
            .mejorar-plan-flotante .tooltip-text {
                font-size: 9px;
                bottom: 60px;
                padding: 3px 8px;
                border-radius: 16px;
            }
            .search-box {
                flex-wrap: wrap;
                justify-content: center;
            }
            input[type="text"] {
                flex: 1 1 100%;
                order: 1;
            }
            .enviar-btn {
                order: 2;
            }
            .registrar-btn {
                order: 3;
            }
        }
        
        @media (max-width: 480px) {
            .mejorar-plan-flotante {
                bottom: 15px;
                right: 15px;
                width: 44px;
                height: 44px;
                font-size: 15px;
                border-width: 1.5px;
                box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2), 0 2px 8px rgba(0, 0, 0, 0.25);
            }
            .mejorar-plan-flotante::after {
                font-size: 17px;
            }
            .mejorar-plan-flotante .tooltip-text {
                font-size: 8px;
                bottom: 52px;
                padding: 2px 7px;
                border-radius: 14px;
            }
            body {
                padding: 12px;
            }
            .main-container {
                max-width: 100%;
                gap: 15px;
            }
            .search-box {
                flex-direction: column;
                gap: 12px;
                width: 100%;
            }
            input[type="text"] {
                width: 100%;
                padding: 16px 18px;
                font-size: 16px;
                text-align: left;
            }
            button {
                width: 100%;
                padding: 14px 20px;
                font-size: 16px;
                font-weight: 600;
            }
            .legend-text {
                font-size: 13px;
                line-height: 1.5;
                padding: 0 5px;
            }
        }
        
        @media (max-width: 400px) {
            .mejorar-plan-flotante {
                bottom: 12px;
                right: 12px;
                width: 38px;
                height: 38px;
                font-size: 12px;
                border-width: 1.3px;
                box-shadow: 0 3px 15px rgba(255, 215, 0, 0.15), 0 1px 6px rgba(0, 0, 0, 0.2);
            }
            .mejorar-plan-flotante::after {
                font-size: 14px;
            }
            .mejorar-plan-flotante .tooltip-text {
                font-size: 7px;
                bottom: 46px;
                padding: 2px 6px;
                border-radius: 12px;
            }
            input[type="text"] {
                padding: 14px 16px;
                font-size: 14px;
            }
            input[type="text"]::placeholder {
                font-size: 13px;
            }
            button {
                padding: 12px 18px;
                font-size: 14px;
            }
            .legend-text {
                font-size: 12px;
            }
        }
        
        @media (max-width: 320px) {
            .mejorar-plan-flotante {
                bottom: 10px;
                right: 10px;
                width: 32px;
                height: 32px;
                font-size: 10px;
                border-width: 1px;
                box-shadow: 0 2px 10px rgba(255, 215, 0, 0.1);
            }
            .mejorar-plan-flotante::after {
                font-size: 12px;
            }
            .mejorar-plan-flotante .tooltip-text {
                display: none;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .mejorar-plan-flotante {
                bottom: 15px;
                right: 15px;
                width: 40px;
                height: 40px;
                font-size: 14px;
                border-width: 1.5px;
            }
            .mejorar-plan-flotante::after {
                font-size: 16px;
            }
            .mejorar-plan-flotante .tooltip-text {
                font-size: 8px;
                bottom: 50px;
                padding: 2px 8px;
            }
        }

        @media (max-height: 400px) and (orientation: landscape) {
            .mejorar-plan-flotante {
                bottom: 10px;
                right: 10px;
                width: 34px;
                height: 34px;
                font-size: 11px;
                border-width: 1.2px;
            }
            .mejorar-plan-flotante::after {
                font-size: 13px;
            }
            .mejorar-plan-flotante .tooltip-text {
                display: none;
            }
        }
        
        @media (hover: none) and (pointer: coarse) {
            button {
                -webkit-tap-highlight-color: rgba(255, 255, 255, 0.3);
            }
            input[type="text"] {
                font-size: 16px;
            }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border-radius: 28px;
            max-width: 340px;
            width: 85%;
            padding: 24px 20px 20px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 255, 255, 0.1);
            animation: modalAppear 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-family: inherit;
        }

        @keyframes modalAppear {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-icon {
            font-size: 56px;
            margin-bottom: 12px;
            display: inline-block;
            filter: grayscale(100%) drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }

        .modal-title {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .modal-message {
            font-size: 17px;
            color: #e0e0e0;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 12px;
            border-radius: 48px;
            margin: 14px 0 10px;
            line-height: 1.4;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-close-btn {
            background: #333333;
            border: 2px solid #666666;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            width: 100%;
            backdrop-filter: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .modal-close-btn:hover {
            background: #555555;
            border-color: #aaaaaa;
            transform: scale(1.02);
        }

        .modal-close-btn:active {
            transform: scale(0.97);
        }

        @media (max-width: 480px) {
            .modal-container {
                width: 80%;
                padding: 20px 16px 16px;
            }
            .modal-title {
                font-size: 24px;
            }
            .modal-message {
                font-size: 15px;
            }
        }

        /* Estilo para ocultar el input y botón Entrar cuando solo se muestra Registrarse */
        .hidden-element {
            display: none !important;
        }

        /* El contenedor principal de la pantalla de login se mantiene visible */
        #loginContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- CONTENIDO PRINCIPAL -->
    <div class="main-container" id="mainContainer">
        <div id="loginContainer">
            <div class="legend-text" id="legendText">
                Si su usuario ya está registrado,<br>
                ingrese su información y presione <span class="highlight-action">Entrar</span>.<br>
                En caso contrario, presione <span class="highlight-action">Registrar</span>.
            </div>

            <div class="search-box" id="searchBox">
                <input type="text" id="textInput" placeholder="Ingrese su usuario...">
                <button id="submitBtn" class="enviar-btn">Entrar</button>
                <button id="registrarBtn" class="registrar-btn">Registrar</button>
            </div>
        </div>
    </div>

    <!-- BOTÓN MEJORAR PLAN -->
    <button id="mejorarPlanBtn" class="mejorar-plan-flotante" aria-label="Mejorar Plan">
        <span class="tooltip-text">Mejorar Plan</span>
    </button>

    <!-- MODAL -->
    <div id="customModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-icon">⚠️</div>
            <div class="modal-title">Acceso denegado</div>
            <div class="modal-message" id="modalMessageText">
                La información ingresada no es válida.
            </div>
            <button class="modal-close-btn" id="modalCloseBtn">Entendido</button>
        </div>
    </div>

    <script>
        /**
         * ============================================================
         *  NUEVA LÓGICA DE INICIO DE SESIÓN CON ALMACENAMIENTO LOCAL
         *  Y CONTROL DE 60 DÍAS
         * ============================================================
         */

        // --- CONSTANTES Y CLAVES PARA LOCALSTORAGE ---
        const STORAGE_KEY_USER = 'app_user_username';
        const STORAGE_KEY_DATE = 'app_user_login_date';
        const DAYS_UNTIL_EXPIRY = 60;

        /**
         * 1. Obtener referencias a los elementos del DOM
         */
        const mainContainer = document.getElementById('mainContainer');
        const loginContainer = document.getElementById('loginContainer');
        const legendText = document.getElementById('legendText');
        const searchBox = document.getElementById('searchBox');
        const textInput = document.getElementById('textInput');
        const submitBtn = document.getElementById('submitBtn');
        const registrarBtn = document.getElementById('registrarBtn');
        const modalOverlay = document.getElementById('customModal');
        const modalMessageText = document.getElementById('modalMessageText');
        const modalCloseBtn = document.getElementById('modalCloseBtn');
        const mejorarPlanBtn = document.getElementById('mejorarPlanBtn');

        // --- USUARIOS VÁLIDOS (mismos que antes) ---
        const USUARIOS_VALIDOS = ["MAMM9511036K6", "Sain"];

        /**
         * 2. FUNCIÓN: Verificar si el usuario tiene sesión activa
         *    Retorna true si el login sigue vigente (menos de 60 días)
         */
        function isSessionValid() {
            const savedUsername = localStorage.getItem(STORAGE_KEY_USER);
            const savedDate = localStorage.getItem(STORAGE_KEY_DATE);

            // Si no hay datos guardados, no hay sesión activa
            if (!savedUsername || !savedDate) {
                return false;
            }

            // Calcular días transcurridos desde el último login
            const lastLogin = new Date(parseInt(savedDate));
            const now = new Date();
            const diffTime = now.getTime() - lastLogin.getTime();
            const diffDays = diffTime / (1000 * 60 * 60 * 24);

            // Si han pasado menos de 60 días, la sesión es válida
            if (diffDays < DAYS_UNTIL_EXPIRY) {
                return true;
            }

            // Si pasaron 60 días o más, la sesión expiró
            return false;
        }

        /**
         * 3. FUNCIÓN: Guardar sesión con usuario y fecha actual
         */
        function saveSession(username) {
            localStorage.setItem(STORAGE_KEY_USER, username);
            localStorage.setItem(STORAGE_KEY_DATE, Date.now().toString());
        }

        /**
         * 4. FUNCIÓN: Redirigir al contenido principal (menuplus.html)
         */
        function goToMainContent() {
            // Guardar el usuario en sessionStorage (por compatibilidad con el código anterior)
            const savedUser = localStorage.getItem(STORAGE_KEY_USER);
            if (savedUser) {
                sessionStorage.setItem("textoEnviado", savedUser);
            }
            // Redirigir al contenido principal
            window.location.href = "menuplus.html";
        }

        /**
         * 5. FUNCIÓN: Mostrar solo el botón "Registrar"
         *    Oculta el input y el botón "Entrar"
         */
        function showOnlyRegisterButton() {
            // Ocultar input y botón Entrar
            textInput.classList.add('hidden-element');
            submitBtn.classList.add('hidden-element');
            
            // Cambiar el texto de la leyenda
            legendText.innerHTML = `
                Su sesión ha expirado.<br>
                Presione <span class="highlight-action">Registrar</span> para continuar.
            `;
            
            // Asegurar que el botón Registrar sea el único visible
            registrarBtn.classList.remove('hidden-element');
            
            // Mostrar el contenedor principal
            mainContainer.classList.add('visible');
        }

        /**
         * 6. FUNCIÓN: Mostrar el formulario de login completo
         *    (input + botón Entrar + botón Registrar)
         */
        function showFullLoginForm() {
            // Mostrar todos los elementos
            textInput.classList.remove('hidden-element');
            submitBtn.classList.remove('hidden-element');
            registrarBtn.classList.remove('hidden-element');
            
            // Restaurar el texto de la leyenda original
            legendText.innerHTML = `
                Si su usuario ya está registrado,<br>
                ingrese su información y presione <span class="highlight-action">Entrar</span>.<br>
                En caso contrario, presione <span class="highlight-action">Registrar</span>.
            `;
            
            // Mostrar el contenedor principal
            mainContainer.classList.add('visible');
        }

        /**
         * 7. FUNCIÓN: Mostrar modal de error
         */
        function mostrarModalInvalido(usuarioIngresado) {
            if (usuarioIngresado === "") {
                modalMessageText.innerHTML = "No ha ingresado ningún nombre.<br>Por favor, ingrese un usuario.";
            } else {
                modalMessageText.innerHTML = "“" + escapeHtml(usuarioIngresado) + "” no está autorizado.<br>Verifique su usuario o regístrese.";
            }
            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        /**
         * 8. FUNCIÓN: Cerrar modal
         */
        function cerrarModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        /**
         * 9. FUNCIÓN: Escapar HTML para prevenir XSS
         */
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        /**
         * 10. FUNCIÓN: Verificar credenciales y procesar login
         */
        function verificarYRedirigir() {
            var texto = textInput.value.trim();
            
            if (texto === "") {
                mostrarModalInvalido("");
                return;
            } else if (USUARIOS_VALIDOS.indexOf(texto) === -1) {
                mostrarModalInvalido(texto);
                return;
            } else {
                // --- LOGIN EXITOSO ---
                // Guardar sesión en localStorage con fecha actual
                saveSession(texto);
                // Redirigir al contenido principal
                goToMainContent();
            }
        }

        /**
         * 11. FUNCIÓN: Ir a la página de registro
         *    NOTA: Cambié la URL a registrorapidodewhatsapplus.html según el requisito #6
         */
        function irARegistro() {
            window.location.href = "registrorapidodewhatsapplus.html";
        }

        /**
         * 12. FUNCIÓN: Ir a Mejorar Plan
         */
        function irAMejorarPlan() {
            window.location.href = "index.html";
        }

        /**
         * 13. FUNCIÓN PRINCIPAL: Control de flujo de la aplicación
         *    Esta función se ejecuta al cargar la página
         */
        function initializeApp() {
            // Verificar si la sesión es válida
            if (isSessionValid()) {
                // --- CASO 1: Sesión activa (menos de 60 días) ---
                // Redirigir directamente al contenido principal
                // No se muestra la pantalla de login
                goToMainContent();
                return;
            }

            // Si llegamos aquí, la sesión NO es válida o no existe
            
            // Verificar si existe un usuario guardado (sesión expirada)
            const savedUsername = localStorage.getItem(STORAGE_KEY_USER);
            const savedDate = localStorage.getItem(STORAGE_KEY_DATE);

            if (savedUsername && savedDate) {
                // --- CASO 2: Sesión expirada (pasaron 60 días o más) ---
                // Mostrar solo el botón "Registrar" como pide el requisito #5
                showOnlyRegisterButton();
            } else {
                // --- CASO 3: Primera vez que abre la aplicación ---
                // Mostrar el formulario de login completo
                showFullLoginForm();
            }
        }

        /**
         * 14. ASIGNACIÓN DE EVENTOS
         */
        // Evento para el botón Entrar
        submitBtn.addEventListener('click', verificarYRedirigir);

        // Evento para el botón Registrar
        registrarBtn.addEventListener('click', function(e) {
            // NOTA: Cuando el usuario presiona "Registrar", siempre va a la página de registro
            // Si el usuario se registra y luego inicia sesión, se actualizará la sesión
            irARegistro();
        });

        // Evento para el botón Mejorar Plan
        mejorarPlanBtn.addEventListener('click', irAMejorarPlan);

        // Evento para presionar Enter en el input
        textInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                verificarYRedirigir();
            }
        });

        // Evento para enfocar el input en dispositivos táctiles
        textInput.addEventListener('touchstart', function() {
            this.focus();
        });

        // Eventos del modal
        modalCloseBtn.addEventListener('click', cerrarModal);
        modalOverlay.addEventListener('click', function(e) {
            if (e.target === modalOverlay) {
                cerrarModal();
            }
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                cerrarModal();
                e.preventDefault();
            }
        });

        /**
         * 15. INICIALIZAR LA APLICACIÓN
         *     Se ejecuta al cargar la página
         */
        initializeApp();

        /**
         * ============================================================
         *  EXPLICACIÓN DE LA IMPLEMENTACIÓN
         * ============================================================
         * 
         * 1. Se utiliza localStorage para almacenar de forma persistente:
         *    - app_user_username: nombre de usuario
         *    - app_user_login_date: fecha del último login (timestamp)
         * 
         * 2. La función isSessionValid() verifica si han pasado menos de 60 días
         *    desde el último login.
         * 
         * 3. Si la sesión es válida, se redirige automáticamente a menuplus.html
         *    sin mostrar la pantalla de login.
         * 
         * 4. Si la sesión expiró (60 días o más), se muestra solo el botón
         *    "Registrar" y se ocultan el input y el botón "Entrar".
         * 
         * 5. Si es la primera vez (no hay datos guardados), se muestra el
         *    formulario completo con input, Entrar y Registrar.
         * 
         * 6. Cuando el usuario inicia sesión correctamente, se guarda la fecha
         *    actual y el nombre de usuario, reiniciando el contador de 60 días.
         * 
         * 7. El botón "Registrar" siempre redirige a registrorapidodewhatsapplus.html
         * 
         * 8. Se mantiene el resto de la funcionalidad: modal de error, botón
         *    "Mejorar Plan", diseño responsive, etc.
         * 
         * 9. Los comentarios en el código explican cada parte de la implementación.
         * ============================================================
         */
    </script>
</body>
</html>
