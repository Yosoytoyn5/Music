<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Acceso Usuario - Blanco y Negro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: url('https://wallpapers.com/images/hd/newsroom-background-1500-x-999-qyiubqf85wlp4yvo.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
        }

        /* Filtro en blanco y negro para la imagen de fondo */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 0;
            backdrop-filter: grayscale(100%) brightness(0.7);
        }

        /* Contenedor principal */
        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* ===== LEYENDA PROFESIONAL SIN EMOJIS ===== */
        .legend-text {
            text-align: center;
            color: #ffffff;
            font-size: 15px;
            line-height: 1.8;
            font-weight: 300;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
            padding: 0 10px;
            animation: fadeInDown 0.8s ease-out;
        }

        .legend-text .highlight {
            color: #e0e0e0;
            font-weight: 400;
        }

        .legend-text .highlight-action {
            color: #ffffff;
            font-weight: 500;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== SEARCH BOX ===== */
        .search-box {
            display: flex;
            flex-direction: row;
            gap: 12px;
            width: 100%;
            margin: 0 auto;
        }

        input[type="text"] {
            flex: 1;
            padding: 16px 20px;
            font-size: 16px;
            border: 2px solid #ffffff;
            border-radius: 50px;
            outline: none;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            color: #ffffff;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        input[type="text"]:focus {
            background: rgba(0, 0, 0, 0.9);
            border-color: #aaaaaa;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        button {
            padding: 16px 28px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            color: #ffffff;
            border: 2px solid #ffffff;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
            border-color: #cccccc;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Estilo específico para el botón Registrar */
        .registrar-btn {
            background: rgba(0, 0, 0, 0.5);
            border-color: #aaaaaa;
        }
        
        .registrar-btn:hover {
            background: rgba(0, 0, 0, 0.7);
            border-color: #ffffff;
        }

        /* ========== RESPONSIVE PARA MÓVIL ========== */
        
        @media (max-width: 768px) {
            .main-container {
                max-width: 90%;
            }
            
            .search-box {
                gap: 10px;
            }
            
            input[type="text"] {
                padding: 14px 18px;
                font-size: 15px;
            }
            
            button {
                padding: 14px 24px;
                font-size: 15px;
            }

            .legend-text {
                font-size: 14px;
                line-height: 1.6;
            }
        }
        
        @media (max-width: 600px) {
            .search-box {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            input[type="text"] {
                flex: 1 1 100%;
                order: 1;
            }
            
            .enviar-btn {
                order: 2;
            }
            
            .registrar-btn {
                order: 3;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            
            .main-container {
                max-width: 100%;
                gap: 15px;
            }
            
            .search-box {
                flex-direction: column;
                gap: 12px;
                width: 100%;
            }
            
            input[type="text"] {
                width: 100%;
                padding: 16px 18px;
                font-size: 16px;
                text-align: left;
            }
            
            button {
                width: 100%;
                padding: 14px 20px;
                font-size: 16px;
                font-weight: 600;
            }

            .legend-text {
                font-size: 13px;
                line-height: 1.5;
                padding: 0 5px;
            }
        }
        
        @media (max-width: 360px) {
            input[type="text"] {
                padding: 14px 16px;
                font-size: 14px;
            }
            
            input[type="text"]::placeholder {
                font-size: 13px;
            }
            
            button {
                padding: 12px 18px;
                font-size: 14px;
            }

            .legend-text {
                font-size: 12px;
            }
        }
        
        @media (hover: none) and (pointer: coarse) {
            button {
                -webkit-tap-highlight-color: rgba(255, 255, 255, 0.3);
            }
            
            input[type="text"] {
                font-size: 16px;
            }
        }

        /* ---------- ESTILOS VENTANA FLOTANTE (MODAL) BLANCO Y NEGRO ---------- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border-radius: 28px;
            max-width: 340px;
            width: 85%;
            padding: 24px 20px 20px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 255, 255, 0.1);
            animation: modalAppear 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-family: inherit;
        }

        @keyframes modalAppear {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-icon {
            font-size: 56px;
            margin-bottom: 12px;
            display: inline-block;
            filter: grayscale(100%) drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }

        .modal-title {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .modal-message {
            font-size: 17px;
            color: #e0e0e0;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 12px;
            border-radius: 48px;
            margin: 14px 0 10px;
            line-height: 1.4;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-close-btn {
            background: #333333;
            border: 2px solid #666666;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            width: 100%;
            backdrop-filter: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .modal-close-btn:hover {
            background: #555555;
            border-color: #aaaaaa;
            transform: scale(1.02);
        }

        .modal-close-btn:active {
            transform: scale(0.97);
        }

        /* responsivo modal */
        @media (max-width: 480px) {
            .modal-container {
                width: 80%;
                padding: 20px 16px 16px;
            }
            .modal-title {
                font-size: 24px;
            }
            .modal-message {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- LEYENDA PROFESIONAL SIN EMOJIS -->
        <div class="legend-text">
            Si su usuario ya está registrado,<br>
            ingrese su información y presione <span class="highlight-action">Entrar</span>.<br>
            En caso contrario, presione <span class="highlight-action">Registrar</span>.
        </div>

        <!-- SEARCH BOX -->
        <div class="search-box">
            <input type="text" id="textInput" placeholder="Ingrese su usuario...">
            <button id="submitBtn" class="enviar-btn">Entrar</button>
            <button id="registrarBtn" class="registrar-btn">Registrar</button>
        </div>
    </div>

    <!-- VENTANA FLOTANTE PERSONALIZADA (MODAL) -->
    <div id="customModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-icon">⚠️</div>
            <div class="modal-title">Acceso denegado</div>
            <div class="modal-message" id="modalMessageText">
                La información ingresada no es válida.
            </div>
            <button class="modal-close-btn" id="modalCloseBtn">Entendido</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('textInput');
        const enviarBtn = document.getElementById('submitBtn');
        const registrarBtn = document.getElementById('registrarBtn');
        
        // Elementos del modal personalizado
        const modalOverlay = document.getElementById('customModal');
        const modalMessageText = document.getElementById('modalMessageText');
        const modalCloseBtn = document.getElementById('modalCloseBtn');

        // Lista de usuarios válidos (exactos, case-sensitive como en el enunciado)
        const USUARIOS_VALIDOS = ["MAMM9511036K6", "Sain", "Ana", "Luis", "Carlos"];

        // Función para mostrar ventana flotante con mensaje dinámico
        function mostrarModalInvalido(usuarioIngresado) {
            // Personalizamos el mensaje según el caso
            if (usuarioIngresado === "") {
                modalMessageText.innerHTML = "No ha ingresado ningún nombre.<br>Por favor, ingrese un usuario.";
            } else {
                modalMessageText.innerHTML = `“${escapeHtml(usuarioIngresado)}” no está autorizado.<br>Verifique su usuario o regístrese.`;
            }
            // Mostramos overlay con animación
            modalOverlay.classList.add('active');
            // Prevenimos scroll del body mientras modal está activo (mejor UX)
            document.body.style.overflow = 'hidden';
        }

        // Función auxiliar para evitar XSS en el modal (por si el texto tiene etiquetas)
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // Cerrar modal (ocultar y restaurar scroll)
        function cerrarModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Verificar credenciales y redirigir o mostrar modal flotante
        function verificarYRedirigir() {
            const texto = input.value.trim();
            
            // Caso 1: input vacío -> mostrar ventana flotante informando inválido
            if (texto === "") {
                mostrarModalInvalido("");
                return;
            } 
            // Caso 2: usuario no está en la lista de válidos -> modal flotante de inválido
            else if (!USUARIOS_VALIDOS.includes(texto)) {
                mostrarModalInvalido(texto);
                return;
            }
            // Caso 3: usuario válido -> redirigir a index2.html guardando sesión
            else {
                sessionStorage.setItem("textoEnviado", texto);
                window.location.href = "index2.html";
            }
        }

        // Redirección directa a registro (sin validación)
        function irARegistro() {
            window.location.href = "index3.html";
        }

        // Eventos principales
        enviarBtn.addEventListener('click', verificarYRedirigir);
        registrarBtn.addEventListener('click', irARegistro);
        
        // Evento Enter en el input
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                verificarYRedirigir();
            }
        });
        
        // Toque para móvil (focus)
        input.addEventListener('touchstart', function() {
            this.focus();
        });
        
        // Cerrar modal con el botón "Entendido"
        modalCloseBtn.addEventListener('click', cerrarModal);
        
        // Opcional: Cerrar modal si se hace clic en el overlay (fuera del contenedor)
        modalOverlay.addEventListener('click', (e) => {
            // Solo cerrar si el clic es directamente en el overlay (fondo) y no en el container hijo
            if (e.target === modalOverlay) {
                cerrarModal();
            }
        });
        
        // Prevenir que el modal se cierre accidentalmente por eventos internos
        const modalContainer = document.querySelector('.modal-container');
        if (modalContainer) {
            modalContainer.addEventListener('click', (e) => {
                e.stopPropagation();
            });
        }
        
        // Ajuste extra: Para navegadores muy antiguos, aseguramos que el modal se pueda cerrar con escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                cerrarModal();
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
