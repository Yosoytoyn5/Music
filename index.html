<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Acceso Usuario - Blanco y Negro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: url('https://wallpapers.com/images/hd/newsroom-background-1500-x-999-qyiubqf85wlp4yvo.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 0;
            backdrop-filter: grayscale(100%) brightness(0.7);
        }

        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .main-container.visible {
            opacity: 1;
        }

        .legend-text {
            text-align: center;
            color: #ffffff;
            font-size: 15px;
            line-height: 1.8;
            font-weight: 300;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
            padding: 0 10px;
            animation: fadeInDown 0.8s ease-out;
        }

        .legend-text .highlight {
            color: #e0e0e0;
            font-weight: 400;
        }

        .legend-text .highlight-action {
            color: #ffffff;
            font-weight: 500;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-box {
            display: flex;
            flex-direction: row;
            gap: 12px;
            width: 100%;
            margin: 0 auto;
        }

        input[type="text"] {
            flex: 1;
            padding: 16px 20px;
            font-size: 16px;
            border: 2px solid #ffffff;
            border-radius: 50px;
            outline: none;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            color: #ffffff;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        input[type="text"]:focus {
            background: rgba(0, 0, 0, 0.9);
            border-color: #aaaaaa;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        button {
            padding: 16px 28px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            color: #ffffff;
            border: 2px solid #ffffff;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
            border-color: #cccccc;
        }

        button:active {
            transform: scale(0.98);
        }

        .registrar-btn {
            background: rgba(0, 0, 0, 0.5);
            border-color: #aaaaaa;
        }
        
        .registrar-btn:hover {
            background: rgba(0, 0, 0, 0.7);
            border-color: #ffffff;
        }

        @media (max-width: 768px) {
            .main-container {
                max-width: 90%;
            }
            .search-box {
                gap: 10px;
            }
            input[type="text"] {
                padding: 14px 18px;
                font-size: 15px;
            }
            button {
                padding: 14px 24px;
                font-size: 15px;
            }
            .legend-text {
                font-size: 14px;
                line-height: 1.6;
            }
        }
        
        @media (max-width: 600px) {
            .search-box {
                flex-wrap: wrap;
                justify-content: center;
            }
            input[type="text"] {
                flex: 1 1 100%;
                order: 1;
            }
            .enviar-btn {
                order: 2;
            }
            .registrar-btn {
                order: 3;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            .main-container {
                max-width: 100%;
                gap: 15px;
            }
            .search-box {
                flex-direction: column;
                gap: 12px;
                width: 100%;
            }
            input[type="text"] {
                width: 100%;
                padding: 16px 18px;
                font-size: 16px;
                text-align: left;
            }
            button {
                width: 100%;
                padding: 14px 20px;
                font-size: 16px;
                font-weight: 600;
            }
            .legend-text {
                font-size: 13px;
                line-height: 1.5;
                padding: 0 5px;
            }
        }
        
        @media (max-width: 360px) {
            input[type="text"] {
                padding: 14px 16px;
                font-size: 14px;
            }
            input[type="text"]::placeholder {
                font-size: 13px;
            }
            button {
                padding: 12px 18px;
                font-size: 14px;
            }
            .legend-text {
                font-size: 12px;
            }
        }
        
        @media (hover: none) and (pointer: coarse) {
            button {
                -webkit-tap-highlight-color: rgba(255, 255, 255, 0.3);
            }
            input[type="text"] {
                font-size: 16px;
            }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border-radius: 28px;
            max-width: 340px;
            width: 85%;
            padding: 24px 20px 20px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 255, 255, 0.1);
            animation: modalAppear 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-family: inherit;
        }

        @keyframes modalAppear {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-icon {
            font-size: 56px;
            margin-bottom: 12px;
            display: inline-block;
            filter: grayscale(100%) drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }

        .modal-title {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .modal-message {
            font-size: 17px;
            color: #e0e0e0;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 12px;
            border-radius: 48px;
            margin: 14px 0 10px;
            line-height: 1.4;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-close-btn {
            background: #333333;
            border: 2px solid #666666;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            width: 100%;
            backdrop-filter: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .modal-close-btn:hover {
            background: #555555;
            border-color: #aaaaaa;
            transform: scale(1.02);
        }

        .modal-close-btn:active {
            transform: scale(0.97);
        }

        @media (max-width: 480px) {
            .modal-container {
                width: 80%;
                padding: 20px 16px 16px;
            }
            .modal-title {
                font-size: 24px;
            }
            .modal-message {
                font-size: 15px;
            }
        }

        .video-intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-intro video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000000;
        }

        .video-intro.hidden {
            display: none;
        }

        body.video-playing {
            overflow: hidden;
        }

        /* Contador de tiempo - oculto */
        .timer-display {
            display: none;
        }
    </style>
</head>
<body>
    <!-- VIDEO DE INTRO -->
    <div class="video-intro" id="videoIntro">
        <video id="introVideo" playsinline>
            <source src="https://www.dropbox.com/scl/fi/u8g3drfq5eg17jlth29gf/AQNNh-pvnGElBMOzs2TCWvS1Qg7-l6790vep4zd-gh7chug5cqDUambeDrsyVlUpXyXNAUSfr3XjPeRida7vBsfSEalNOo5RhwIgpKztNXzSdQ.mp4?rlkey=x0m5hp76feokbkpxxlty14swz&st=vpndoowb&raw=1" type="video/mp4">
            Tu navegador no soporta el video.
        </video>
        <!-- Contador oculto -->
        <div class="timer-display" id="timerDisplay">0.00</div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="main-container" id="mainContainer">
        <div class="legend-text">
            Si su usuario ya está registrado,<br>
            ingrese su información y presione <span class="highlight-action">Entrar</span>.<br>
            En caso contrario, presione <span class="highlight-action">Registrar</span>.
        </div>

        <div class="search-box">
            <input type="text" id="textInput" placeholder="Ingrese su usuario...">
            <button id="submitBtn" class="enviar-btn">Entrar</button>
            <button id="registrarBtn" class="registrar-btn">Registrar</button>
        </div>
    </div>

    <!-- MODAL -->
    <div id="customModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-icon">⚠️</div>
            <div class="modal-title">Acceso denegado</div>
            <div class="modal-message" id="modalMessageText">
                La información ingresada no es válida.
            </div>
            <button class="modal-close-btn" id="modalCloseBtn">Entendido</button>
        </div>
    </div>

    <script>
        // --- VIDEO CON INICIO AUTOMÁTICO DESPUÉS DE 0 SEGUNDOS ---
        const videoIntro = document.getElementById('videoIntro');
        const introVideo = document.getElementById('introVideo');
        const mainContainer = document.getElementById('mainContainer');
        const timerDisplay = document.getElementById('timerDisplay');

        // Función para iniciar el video inmediatamente
        function iniciarVideoInmediato() {
            // Configurar sonido
            introVideo.muted = false;
            introVideo.volume = 1.0;
            
            // Iniciar el video
            var promesa = introVideo.play();
            
            if (promesa !== undefined) {
                promesa.then(function() {
                    console.log('Video iniciado automáticamente con sonido (0 segundos)');
                }).catch(function(error) {
                    console.log('Error al iniciar automáticamente:', error);
                    // Si falla el autoplay, intentar nuevamente
                    setTimeout(function() {
                        introVideo.muted = false;
                        introVideo.volume = 1.0;
                        introVideo.play().catch(function() {
                            console.log('No se pudo iniciar el video automáticamente');
                        });
                    }, 100);
                });
            }
        }

        // Mostrar el contador en 0.00 (oculto)
        timerDisplay.textContent = '0.00';

        // INICIAR EL VIDEO INMEDIATAMENTE (0 SEGUNDOS)
        document.body.classList.add('video-playing');
        
        // Pequeño retraso de 10ms para asegurar que el DOM esté listo
        setTimeout(function() {
            iniciarVideoInmediato();
        }, 10);

        // Cuando el video termina, ocultarlo y mostrar la página
        introVideo.addEventListener('ended', function() {
            videoIntro.classList.add('hidden');
            mainContainer.classList.add('visible');
            document.body.classList.remove('video-playing');
        });

        // Si el video no puede reproducirse, mostrar la página después de 3 segundos
        introVideo.addEventListener('error', function() {
            setTimeout(function() {
                videoIntro.classList.add('hidden');
                mainContainer.classList.add('visible');
                document.body.classList.remove('video-playing');
            }, 3000);
        });

        // Forzar que el video tenga sonido en todo momento
        setInterval(function() {
            if (!videoIntro.classList.contains('hidden')) {
                if (introVideo.muted) {
                    introVideo.muted = false;
                }
                if (introVideo.volume < 0.9) {
                    introVideo.volume = 1.0;
                }
                // Si el video está pausado, reanudarlo
                if (introVideo.paused) {
                    introVideo.play().catch(function() {});
                }
            }
        }, 500);

        // --- CÓDIGO DE VALIDACIÓN ---
        var input = document.getElementById('textInput');
        var enviarBtn = document.getElementById('submitBtn');
        var registrarBtn = document.getElementById('registrarBtn');
        
        var modalOverlay = document.getElementById('customModal');
        var modalMessageText = document.getElementById('modalMessageText');
        var modalCloseBtn = document.getElementById('modalCloseBtn');

        var USUARIOS_VALIDOS = ["MAMM9511036K6", "Sain", "Ana", "Luis", "Carlos"];

        function mostrarModalInvalido(usuarioIngresado) {
            if (usuarioIngresado === "") {
                modalMessageText.innerHTML = "No ha ingresado ningún nombre.<br>Por favor, ingrese un usuario.";
            } else {
                modalMessageText.innerHTML = "“" + escapeHtml(usuarioIngresado) + "” no está autorizado.<br>Verifique su usuario o regístrese.";
            }
            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function cerrarModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        function verificarYRedirigir() {
            var texto = input.value.trim();
            
            if (texto === "") {
                mostrarModalInvalido("");
                return;
            } else if (USUARIOS_VALIDOS.indexOf(texto) === -1) {
                mostrarModalInvalido(texto);
                return;
            } else {
                sessionStorage.setItem("textoEnviado", texto);
                window.location.href = "index2.html";
            }
        }

        function irARegistro() {
            window.location.href = "index3.html";
        }

        enviarBtn.addEventListener('click', verificarYRedirigir);
        registrarBtn.addEventListener('click', irARegistro);
        
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                verificarYRedirigir();
            }
        });
        
        input.addEventListener('touchstart', function() {
            this.focus();
        });
        
        modalCloseBtn.addEventListener('click', cerrarModal);
        
        modalOverlay.addEventListener('click', function(e) {
            if (e.target === modalOverlay) {
                cerrarModal();
            }
        });
        
        var modalContainer = document.querySelector('.modal-container');
        if (modalContainer) {
            modalContainer.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                cerrarModal();
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
