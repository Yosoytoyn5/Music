<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Próximamente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a1628, #1a3a6b, #0d2847, #1a4a8a, #0a1628);
            background-size: 400% 400%;
            animation: gradientShift 10s ease infinite;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animación del gradiente azul */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Partículas de fondo */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(2px 2px at 20% 30%, rgba(100, 180, 255, 0.3), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(100, 180, 255, 0.2), transparent),
                radial-gradient(2px 2px at 60% 20%, rgba(100, 180, 255, 0.3), transparent),
                radial-gradient(2px 2px at 80% 80%, rgba(100, 180, 255, 0.2), transparent),
                radial-gradient(1px 1px at 10% 50%, rgba(100, 180, 255, 0.4), transparent),
                radial-gradient(1px 1px at 30% 10%, rgba(100, 180, 255, 0.3), transparent),
                radial-gradient(1px 1px at 50% 90%, rgba(100, 180, 255, 0.4), transparent),
                radial-gradient(1px 1px at 70% 40%, rgba(100, 180, 255, 0.3), transparent),
                radial-gradient(1px 1px at 90% 60%, rgba(100, 180, 255, 0.4), transparent);
            background-size: 200% 200%;
            animation: particleMove 15s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes particleMove {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        /* Contenedor principal */
        .main-container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* ===== LEYENDA ANIMADA "PROXIMAMENTE" ===== */
        .coming-soon {
            font-size: clamp(3rem, 12vw, 7rem);
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 
                0 0 20px rgba(50, 150, 255, 0.3),
                0 0 40px rgba(50, 150, 255, 0.2),
                0 0 60px rgba(50, 150, 255, 0.1),
                0 4px 20px rgba(0, 0, 0, 0.3);
            animation: pulseGlow 2.5s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% {
                text-shadow: 
                    0 0 20px rgba(50, 150, 255, 0.3),
                    0 0 40px rgba(50, 150, 255, 0.2),
                    0 0 60px rgba(50, 150, 255, 0.1),
                    0 4px 20px rgba(0, 0, 0, 0.3);
                transform: scale(1);
            }
            50% {
                text-shadow: 
                    0 0 30px rgba(50, 150, 255, 0.5),
                    0 0 60px rgba(50, 150, 255, 0.3),
                    0 0 80px rgba(50, 150, 255, 0.2),
                    0 4px 25px rgba(0, 0, 0, 0.4);
                transform: scale(1.02);
            }
        }

        /* Línea decorativa animada */
        .line-decorative {
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #4a9eff, #6bb5ff, #4a9eff, transparent);
            border-radius: 2px;
            animation: expandLine 2s ease-out forwards;
            box-shadow: 0 0 20px rgba(74, 158, 255, 0.3);
        }

        @keyframes expandLine {
            0% { width: 0; }
            100% { width: 60%; }
        }

        /* Texto secundario */
        .sub-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: clamp(1rem, 2vw, 1.3rem);
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            animation: fadeInUp 1.5s ease-out 0.5s both;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .sub-text span {
            color: #6bb5ff;
            font-weight: 400;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== BOTÓN DECUARDO ===== */
        .btn-decuardo {
            padding: 16px 50px;
            font-size: clamp(1.1rem, 2vw, 1.4rem);
            font-weight: 700;
            font-family: inherit;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            animation: fadeInUp 1.5s ease-out 0.8s both;
            min-width: 200px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-decuardo:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(74, 158, 255, 0.3);
        }

        .btn-decuardo:active {
            transform: scale(0.97);
        }

        /* Círculos decorativos flotantes */
        .floating-circles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(74, 158, 255, 0.05), transparent);
            animation: floatCircle 20s ease-in-out infinite;
        }

        .circle:nth-child(1) {
            width: 300px;
            height: 300px;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .circle:nth-child(2) {
            width: 400px;
            height: 400px;
            bottom: -150px;
            right: -150px;
            animation-delay: -5s;
        }

        .circle:nth-child(3) {
            width: 200px;
            height: 200px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes floatCircle {
            0%, 100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            25% {
                transform: translate(30px, -30px) scale(1.1);
                opacity: 0.6;
            }
            50% {
                transform: translate(-20px, 40px) scale(0.9);
                opacity: 0.4;
            }
            75% {
                transform: translate(40px, 20px) scale(1.05);
                opacity: 0.5;
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .main-container {
                padding: 30px 20px;
                gap: 25px;
            }

            .coming-soon {
                font-size: clamp(2.5rem, 10vw, 4rem);
            }

            .sub-text {
                font-size: clamp(0.8rem, 1.5vw, 1rem);
            }

            .btn-decuardo {
                padding: 14px 40px;
                font-size: clamp(1rem, 1.8vw, 1.2rem);
                min-width: 160px;
            }

            .circle:nth-child(1) {
                width: 150px;
                height: 150px;
                top: -50px;
                left: -50px;
            }

            .circle:nth-child(2) {
                width: 200px;
                height: 200px;
                bottom: -80px;
                right: -80px;
            }

            .circle:nth-child(3) {
                width: 120px;
                height: 120px;
            }
        }

        @media (max-width: 480px) {
            .main-container {
                padding: 20px 15px;
                gap: 20px;
            }

            .coming-soon {
                font-size: clamp(2rem, 8vw, 3rem);
                letter-spacing: 0.05em;
            }

            .sub-text {
                font-size: 0.75rem;
                letter-spacing: 0.1em;
            }

            .line-decorative {
                width: 40%;
                height: 2px;
            }

            .btn-decuardo {
                padding: 12px 30px;
                font-size: 0.9rem;
                min-width: 140px;
                border-width: 1.5px;
            }

            .circle:nth-child(1) {
                width: 100px;
                height: 100px;
            }

            .circle:nth-child(2) {
                width: 150px;
                height: 150px;
            }

            .circle:nth-child(3) {
                width: 80px;
                height: 80px;
            }
        }

        @media (max-width: 360px) {
            .coming-soon {
                font-size: 1.8rem;
            }

            .sub-text {
                font-size: 0.65rem;
            }

            .btn-decuardo {
                padding: 10px 24px;
                font-size: 0.8rem;
                min-width: 120px;
            }
        }
    </style>
</head>
<body>
    <!-- Círculos decorativos flotantes -->
    <div class="floating-circles">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <!-- Contenido principal -->
    <div class="main-container">
        <!-- Leyenda animada "PROXIMAMENTE" -->
        <div class="coming-soon">Próximamente</div>
        
        <!-- Línea decorativa animada -->
        <div class="line-decorative"></div>
        
        <!-- Texto secundario -->
        <div class="sub-text">
            <span>•</span> Estamos trabajando en algo increíble <span>•</span>
        </div>

        <!-- Botón DECUARDO que redirige a index2.html -->
        <a href="index.html" class="btn-decuardo">DECUARDO</a>
    </div>
</body>
</html>
