<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Kerim Music+ · Royal Blue</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background-color: #0a0e1a;
      color: #e8ecf4;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      line-height: 1.4;
      overflow-x: hidden;
      width: 100%;
    }
    .top-bar {
      background: #0a0e1a;
      padding: 0.5rem 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      border-bottom: 1px solid #1a2a5e;
    }
    .top-bar h1 {
      font-weight: 700;
      font-size: 1.5rem;
      background: linear-gradient(135deg, #2b6df6, #1a4fd6);

      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      white-space: nowrap;
      text-shadow: 0 0 20px rgba(43, 109, 246, 0.3);
    }
    .search-container {
      display: flex;
      align-items: center;
      background: #111a33;
      border-radius: 500px;
      padding: 0.2rem 0.2rem 0.2rem 1rem;
      flex: 1;
      min-width: 140px;
      max-width: 300px;
      transition: all 0.2s;
      border: 1px solid #1a2a5e;
    }
    .search-container:focus-within {

      border: 1px solid #2b6df6;

    }
    .search-container input {
      background: transparent;
      border: none;
      color: #e8ecf4;
      font-size: 0.85rem;
      padding: 0.6rem 0;
      width: 100%;
      outline: none;
    }
    .search-container input::placeholder {
      color: rgba(232, 236, 244, 0.35);
    }
    .search-container button {
      background: transparent;
      border: none;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      cursor: pointer;
      color: #5a7fc7;
      font-size: 1rem;
      transition: 0.2s;
    }
    .search-container button:hover { color: #2b6df6; }
    .filter-buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 0.5rem auto 1rem auto;
      padding: 0 1rem;
      flex-wrap: wrap;
    }
    .filter-main-btn {
      background: #111a33;
      border: 1px solid #1a2a5e;
      border-radius: 500px;
      padding: 0.55rem 1.5rem;
      font-size: 0.85rem;

      transition: all 0.2s ease;
      color: #7a9ad6;
      letter-spacing: 0.3px;
    }
    .filter-main-btn.active {

      color: #ffffff;
      border-color: #2b6df6;
      box-shadow: 0 0 30px rgba(43, 109, 246, 0.25);
    }
    .filter-main-btn:hover:not(.active) {
      background: #1a2a5e;
      transform: scale(1.02);
      color: #e8ecf4;
    }
    .filter-main-btn.locked {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .filter-main-btn.locked:hover {

      background: #111a33;
    }
    .gallery-section {

      margin: 0.5rem auto;
      padding: 0 1rem 6rem;
      position: relative;
    }
    .counter-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;

      width: fit-content;
      gap: 0.5rem;

    }
    .counter-wrapper.hidden-counter { display: none; }
    .counter-label {

    }
    .upgrade-btn {

      align-items: center;

      font-size: 1rem;
      padding: 0.7rem 2rem;
      border-radius: 500px;
      text-decoration: none;
      letter-spacing: 0.5px;

    .upgrade-btn:active {

    }

    .artists-horizontal::-webkit-scrollbar {

      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;

      letter-spacing: 0.3px;

      color: #e8ecf4;
    }
    .random-matte-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      transition: background-color 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      pointer-events: none;
    }
    .random-matte-bg::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 40%, rgba(43,109,246,0.08) 0%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
    }
    .portada-fija {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;

    .portada-track {
      display: flex;

    }
    .portada-track::-webkit-scrollbar {

      background: #111a33;
    }
    .portada-track::-webkit-scrollbar-thumb {
      background: #2b6df6;
      border-radius: 10px;
    }
    .portada-item {
      flex: 0 0 80%;
      max-width: 80%;
      scroll-snap-align: start;
      border-radius: 10px;
      overflow: hidden;
      background: #0d162b;
      transition: transform 0.2s ease;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #1a2a5e;
    }
    .portada-item a {

      height: 100%;

    }
    .portada-item img {

      height: auto;

      transition: transform 0.3s ease;
      background: #0a0e1a;
    }
    .portada-item:hover img {
      transform: scale(1.02);
    }
    .portada-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(10,14,26,0.85));
      padding: 1rem 0.8rem 0.6rem;

      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      pointer-events: none;
    }

      .portada-item { flex: 0 0 55%; max-width: 55%; }
    }
    @media (min-width: 1024px) {
      .portada-item { flex: 0 0 32%; max-width: 32%; }
    }

      display: grid;

      animation: fadeUp 0.4s forwards;
    }
    .gallery-grid.list-view {

      gap: 0.5rem;

    .gallery-grid.list-view .card-title {

      padding: 0;

      font-weight: 500;
      color: #e8ecf4;
    }
    .suggestions-section {
      margin-bottom: 2rem;
      padding: 0;
    }
    .suggestions-horizontal {

      gap: 1rem;
      overflow-x: auto;

      padding-bottom: 0.75rem;
      -webkit-overflow-scrolling: touch;
    }
    .suggestions-horizontal::-webkit-scrollbar {
      height: 4px;
      background: #111a33;
    }
    .suggestions-horizontal::-webkit-scrollbar-thumb {
      background: #2b6df6;
      border-radius: 10px;
    }
    .suggestion-card {

      background: #0d162b;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid #1a2a5e;
    }
    .suggestion-card:hover {

      box-shadow: 0 8px 30px rgba(43,109,246,0.15);
    }
    .suggestion-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }
    .suggestion-info {
      padding: 0.6rem 0.5rem;
      text-align: left;
    }
    .suggestion-title {
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #e8ecf4;
      margin-bottom: 4px;
    }
    .suggestion-badge {

    }
    .suggestion-invite {

      display: flex;
      align-items: center;

    }
    .image-card {
      background: #0d162b;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      border: 1px solid #1a2a5e;
    }
    .image-card:hover {
      background: #1a2a5e;
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(43,109,246,0.1);
    }
    .image-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      transition: transform 0.3s ease;
      display: block;
    }
    .image-card:hover img {
      transform: scale(1.02);
    }
    .card-title {
      padding: 0.75rem 0.5rem;
      text-align: left;
      font-size: 0.8rem;
      font-weight: 600;
      color: #e8ecf4;
      background: transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    @media (min-width: 500px) {
      .gallery-grid:not(.list-view) { grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    }
    @media (min-width: 640px) {

    }
    @media (min-width: 900px) {
      .gallery-grid:not(.list-view) { grid-template-columns: repeat(5, 1fr); }
    }
    @media (min-width: 1200px) {
      .gallery-grid:not(.list-view) { grid-template-columns: repeat(6, 1fr); }
    }
    .no-results {
      text-align: center;
      padding: 3rem;
      color: #5a7fc7;
      background: rgba(13,22,43,0.9);
      border-radius: 8px;
      border: 1px solid #1a2a5e;
    }
    .search-badge {
      font-size: 0.8rem;
      color: #5a7fc7;
      margin-bottom: 1rem;
      padding-left: 0.5rem;
    }

      position: fixed;
      top: 0;
      left: 0;

      height: 100%;

      overflow-y: auto;

    }
    .fullscreen-player.show { opacity: 1; visibility: visible; }
    .player-card {
      background: transparent;
      border: none;
      max-width: 500px;
      width: 100%;
      margin: 0 auto;
    }

    }

    }

    // ==================== FUNCIONES AUXILIARES ====================
    function shuffleArray(arr) {
      const array = [...arr];
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }
    
    function escapeHtml(str){ return str ? str.replace(/[&<>]/g, m => ({'&':'&', '<':'<', '>':'>'}[m] || m)) : ''; }
    
    function formatTime(sec){ if(isNaN(sec)) return '0:00'; let m=Math.floor(sec/60), s=Math.floor(sec%60); return `${m}:${s<10?'0':''}${s}`; }

        let newCount = (playCount.get(songId) || 0) + 1;
        playCount.set(songId, newCount);
        artistPlayCount.set(artist, (artistPlayCount.get(artist) || 0) + 1);

    function showVideoInPlayer(videoHtml) {
      // Ocultar imagen y mostrar contenedor de video

      videoContainer.style.display = 'block';
      videoContainer.innerHTML = videoHtml;
      
      // Asegurar que el contenedor tenga el tamaño adecuado
      videoContainer.style.width = '100%';
      videoContainer.style.aspectRatio = '16/9';
      videoContainer.style.background = '#000';
      
      // Obtener referencia al elemento de video o iframe
      const videoEl = videoContainer.querySelector('video');
      const iframeEl = videoContainer.querySelector('iframe');
      
      if (videoEl) {
        videoElement = videoEl;
        isVideoAd = true;
        // Escuchar el evento 'ended' del video
        videoEl.addEventListener('ended', onVideoAdEnd);
        // Intentar reproducir automáticamente
        videoEl.play().catch(e => console.log('Error al reproducir video:', e));
        // Si el video tiene audio, ocultar los controles de audio
        fullPlayPause.style.display = 'none';
        miniPlayPause.style.display = 'none';
        // Ocultar la barra de progreso
        if (progressArea) progressArea.style.display = 'none';
      } else if (iframeEl) {
        // Para iframes (YouTube, Vimeo), no podemos controlar el final fácilmente
        // Usaremos un temporizador con la duración del video (estimada)
        isVideoAd = true;
        fullPlayPause.style.display = 'none';
        miniPlayPause.style.display = 'none';
        if (progressArea) progressArea.style.display = 'none';
        // Para YouTube, estimar duración de 30 segundos
        const adDuration = 30000; // 30 segundos
        if (window._adTimer) clearTimeout(window._adTimer);
        window._adTimer = setTimeout(() => {
          onVideoAdEnd();
        }, adDuration);
      } else {
        isVideoAd = false;
      }
      
      // Ocultar la barra de progreso en todos los casos
      if (progressArea) progressArea.style.display = 'none';
      
      console.log('🎬 Video mostrado en el reproductor');
    }

        clearTimeout(window._adTimer);

        let videoHtml = '';
        // Si es un enlace de Dropbox, convertirlo para que se pueda reproducir
        if (ad.video.includes('dropbox.com')) {
          const videoUrl = ad.video;
          videoHtml = `<video controls style="width:100%;height:100%;background:#000;object-fit:contain;">
                        <source src="${videoUrl}" type="video/mp4">
                        Tu navegador no soporta reproducción de video.
                       </video>`;
        } else if (ad.video.includes('youtube.com') || ad.video.includes('youtu.be')) {
          const videoId = ad.video.includes('youtu.be') ? ad.video.split('/').pop() : ad.video.split('v=')[1]?.split('&')[0];
          if (videoId) {
            videoHtml = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
          }
        } else if (ad.video.includes('vimeo.com')) {
          const videoId = ad.video.split('/').pop();
          if (videoId) {
            videoHtml = `<iframe src="https://player.vimeo.com/video/${videoId}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
          }
        } else {
          videoHtml = `<video controls style="width:100%;height:100%;background:#000;object-fit:contain;">
                        <source src="${ad.video}" type="video/mp4">
                        Tu navegador no soporta reproducción de video.
                       </video>`;
        }
        
        if (videoHtml) {
          showVideoInPlayer(videoHtml);
        } else {
          hideVideoFromPlayer();
          fullCover.src = adSong.url;
        }
      } else {
        hideVideoFromPlayer();
        fullCover.src = adSong.url;
        // Para anuncios sin video, la barra de progreso se oculta igual
        if (progressArea) progressArea.style.display = 'none';
      }
      
      fullSongTitle.innerText = adSong.title;
      fullSongCategory.innerHTML = `ANUNCIO <span class="ad-badge">AD ${currentAdIndex + 1}/${adPlaylist.length}</span>`;
      miniCover.src = adSong.url;
      miniTitle.innerText = adSong.title;
      
      if (adSong.music && !ad.video) {
        // Solo audio - reproducir con el elemento audio
        audio.src = adSong.music;
        audio.play().catch(e => console.log('Error al reproducir audio del anuncio:', e));
        isPlaying = true;
        audio.removeEventListener('ended', onAdEnd);
        audio.addEventListener('ended', onAdEnd);
        // Ocultar botones de reproducción de video si estaban visibles
        fullPlayPause.style.display = 'flex';
        miniPlayPause.style.display = 'flex';
      } else if (ad.video) {
        // Video - el video se reproduce con su propio audio
        // Pausar el audio
        audio.pause();
        isPlaying = false;
        // Ocultar botones de reproducción de audio
        fullPlayPause.style.display = 'none';
        miniPlayPause.style.display = 'none';
        // El evento 'ended' del video manejará el cambio
      } else {
        // Anuncio sin audio ni video (solo imagen)
        audio.pause();
        isPlaying = false;
        // Auto-avanzar después de 5 segundos
        if (window._adTimer) clearTimeout(window._adTimer);
        window._adTimer = setTimeout(() => {
          onAdEnd();
        }, 5000);
      }
      
      fullPlayer.classList.add('show');
      miniPlayerDiv.classList.add('show');
      updatePlayPauseIcon();
      triggerBackgroundRefresh();
    }
    
    function onVideoAdEnd() {
      // El video terminó
      if (window._adTimer) {
        clearTimeout(window._adTimer);
        window._adTimer = null;
      }
      // Avanzar al siguiente anuncio
      onAdEnd();
    }
    
    function onAdEnd() {
      audio.removeEventListener('ended', onAdEnd);
      if (window._adTimer) {
        clearTimeout(window._adTimer);
        window._adTimer = null;
      }
      // Limpiar el video si estaba mostrándose
      if (videoElement) {
        videoElement.removeEventListener('ended', onVideoAdEnd);
        videoElement = null;
      }
      hideVideoFromPlayer();
      currentAdIndex++;
      playNextAd();
    }
    
    function finishAdPlaylist() {
      isAdPlaying = false;
      fullPrev.classList.remove('hidden-nav');
      fullNext.classList.remove('hidden-nav');
      miniPrev.classList.remove('hidden-nav');
      miniNext.classList.remove('hidden-nav');
      
      // Ocultar video si estaba visible y restaurar UI
      hideVideoFromPlayer();
      
      // Restaurar controles de reproducción
      fullPlayPause.style.display = 'flex';
      miniPlayPause.style.display = 'flex';
      
      if (progressArea) progressArea.style.display = 'block';
      
      if (previousSong && !previousSong.isAd) {
        let foundInQueue = currentPlayQueue.find(s => s.id === previousSong.id);
        if (foundInQueue) {
          playSongInternal(previousSong);
        } else {
          currentPlayQueue.unshift(previousSong);
          currentQueueIndex = 0;
          playSongInternal(previousSong);
        }
      } else if (currentPlayQueue.length > 0) {
        playSongInternal(currentPlayQueue[0]);
      }
      if (adCallback) {
        const callback = adCallback;
        adCallback = null;
        callback();
      }
    }
    
    // ==================== REPRODUCIR CANCIONES ====================
    function playSong(song, customQueue = null) {
      if (!song) return;
      if (isAdPlaying) return;
      if (!song.isAd) {
        adCounter++;
        if (adCounter >= 3) {
          adCounter = 0;
          pendingNextSong = song;
          playAds(function() {
            if (pendingNextSong) {
              const nextSong = pendingNextSong;
              pendingNextSong = null;
              playSongInternal(nextSong, customQueue);
            }
          });
          return;
        }
      }
      playSongInternal(song, customQueue);
    }
    
    function playSongInternal(song, customQueue = null) {
      if (!song) return;
      if (isAdPlaying) return;
      currentSong = song;
      
      // Asegurar que se muestre la imagen (ocultar video si estaba visible)
      hideVideoFromPlayer();
      
      if (progressArea) progressArea.style.display = 'block';
      
      if (!song.isAd) {
        incrementPlayCount(song.id);
        renderSuggestions();
        renderTopArtists();
        fullSongCategory.innerHTML = song.category || '';
      }
      if (customQueue) {
        currentPlayQueue = customQueue;
        if (shuffleActive) {
          originalQueue = [...customQueue];
          const currentSongId = song.id;
          let queueWithoutCurrent = customQueue.filter(s => s.id !== currentSongId);
          let shuffledWithoutCurrent = shuffleArray(queueWithoutCurrent);
          currentPlayQueue = [song, ...shuffledWithoutCurrent];
          currentQueueIndex = 0;
        } else {
          currentQueueIndex = currentPlayQueue.findIndex(s => s.id === song.id);
        }
      } else {
        updateQueueAndMode();
        let idx = currentPlayQueue.findIndex(s => s.id === song.id);
        if (idx !== -1) currentQueueIndex = idx;
      }
      if (song.music) {
        audio.src = song.music;
        audio.play().catch(e => console.log('Error al reproducir:', e));
        isPlaying = true;
      } else {
        audio.pause();
        isPlaying = false;
      }
      updateUIWithSong(song);
      fullPlayer.classList.add('show');
      miniPlayerDiv.classList.add('show');
      updatePlayPauseIcon();
      triggerBackgroundRefresh();
      renderPlayerSuggestions();
    }
    
    function updateUIWithSong(song){ 
      hideVideoFromPlayer();
      fullCover.src = song.url; 
      fullSongTitle.innerText = song.title; 
      if (!song.isAd) {
        fullSongCategory.innerHTML = song.category || '';
      }
      miniCover.src = song.url; 
      miniTitle.innerText = song.title; 
      updateFavButtonUI(); 
      renderPlayerSuggestions(); 
    }
    
    function updateFavButtonUI(){ 
      if(currentSong && !currentSong.isAd){ 
        if (!hasKerimMusicPlus) {
          favMainBtn.classList.remove('active');
          favMainBtn.innerText = '♡';
          favMainBtn.classList.add('locked');
        } else {
          favMainBtn.classList.remove('locked');
          favMainBtn.classList.toggle('active', isFav(currentSong.id)); 
          favMainBtn.innerText = isFav(currentSong.id) ? '❤️' : '♡'; 
        }
      } else {
        favMainBtn.classList.remove('active');
        favMainBtn.innerText = '♡';
        favMainBtn.classList.add('locked');
      }
    }
    
    function updatePlayPauseIcon(){ 
      if (isVideoAd) {
        // Durante anuncios de video, no mostramos el icono de play/pause
        fullPlayPause.style.display = 'none';
        miniPlayPause.style.display = 'none';
        return;
      }
      fullPlayPause.style.display = 'flex';
      miniPlayPause.style.display = 'flex';
      const icon = isPlaying ? '⏸' : '▶'; 
      fullPlayPause.innerText = icon; 
      miniPlayPause.innerText = icon; 
    }
    
    function nextTrack(){ 
      if (isAdPlaying) return;
      if (!currentPlayQueue.length) return; 
      let newIdx = (currentQueueIndex + 1) % currentPlayQueue.length; 
      currentQueueIndex = newIdx; 
      playSong(currentPlayQueue[newIdx]); 
    }
    
    function prevTrack(){ 
      if (isAdPlaying) return;
      if (!currentPlayQueue.length) return; 
      let newIdx = (currentQueueIndex - 1 + currentPlayQueue.length) % currentPlayQueue.length; 
      currentQueueIndex = newIdx; 
      playSong(currentPlayQueue[newIdx]); 
    }
    
    function togglePlayPause(){ 
      if (isAdPlaying) {
        // Si es un anuncio de video, intentar pausar/reproducir el video
        if (isVideoAd && videoElement) {
          if (videoElement.paused) {
            videoElement.play();
          } else {
            videoElement.pause();
          }
        }
        return;
      }
      isPlaying ? audio.pause() : audio.play(); 
    }
    
    // ==================== SUGERENCIAS ====================
    function renderSuggestions(){ 
      if(isPlaylistsMode || currentSearch.trim() !== '') { 
        suggestionsContainer.innerHTML = ''; 
        return; 
      } 
      const leastPlayed = getLeastPlayedSuggestions(6); 
      if(leastPlayed.length === 0){ suggestionsContainer.innerHTML = ''; return; } 
      let html = `<div class="suggestions-horizontal">`; 
      leastPlayed.forEach(song => { 
        const plays = (playCount.get(song.id) || 0); 
        const inviteMsg = plays === 0 ? '✨ Sin estrenar' : `🎧 ${plays} reproducción${plays !== 1 ? 'es' : ''}`; 
        html += `<div class="suggestion-card" data-id="${song.id}"><img src="${song.url}" loading="lazy"><div class="suggestion-info"><div class="suggestion-title">${escapeHtml(song.title)}</div><div class="suggestion-badge">${song.category}</div><div class="suggestion-invite"><span>▶</span> ${inviteMsg}</div></div></div>`; 
      }); 
      html += `</div>`; 
      suggestionsContainer.innerHTML = html; 
      document.querySelectorAll('.suggestion-card').forEach(card => { 
        card.addEventListener('click', () => { 
          const id = parseInt(card.dataset.id); 
          const found = masterSongs.find(s => s.id === id) || allSongs.find(s => s.id === id); 
          if(found){ updateQueueAndMode(); playSong(found); } 
        }); 
      }); 
    }
    
    // ==================== SUGERENCIAS DEL REPRODUCTOR ====================
    let suggestionsHidden = false;
    
    function getPlayerSuggestions(currentSongObj, limit = 6) {
      if (!currentSongObj) return [];
      const sameArtist = masterSongs.filter(s => s.id !== currentSongObj.id && ((s.artist && currentSongObj.artist) && s.artist.toLowerCase() === currentSongObj.artist.toLowerCase()));
      const others = masterSongs.filter(s => s.id !== currentSongObj.id && !sameArtist.includes(s));
      let combined = [...sameArtist, ...others];
      return combined.slice(0, limit);
    }
    
    function renderPlayerSuggestions() {
      const suggestionsTrack = document.getElementById('playerSuggestionsTrack');
      const toggleBtn = document.getElementById('toggleSuggestionsBtn');
      if (!currentSong) { suggestionsTrack.innerHTML = ''; return; }
      const suggestions = getPlayerSuggestions(currentSong);
      if (suggestions.length === 0) { suggestionsTrack.innerHTML = '<div style="color:#5a7fc7; text-align:center; font-size:0.7rem;">No hay sugerencias disponibles</div>'; return; }
      let html = '';
      suggestions.forEach(song => {
        const plays = playCount.get(song.id) || 0;
        html += `<div class="player-suggestion-item" data-id="${song.id}"><img class="player-suggestion-img" src="${song.url}" loading="lazy"><div class="player-suggestion-info"><div class="player-suggestion-title">${escapeHtml(song.title.length > 12 ? song.title.substring(0,10)+'...' : song.title)}</div><div class="player-suggestion-plays">${plays} escuchas</div></div></div>`;
      });
      suggestionsTrack.innerHTML = html;
      if (suggestionsHidden) { suggestionsTrack.classList.add('hidden-suggestions'); if(toggleBtn) toggleBtn.innerText = 'Mostrar'; } else { suggestionsTrack.classList.remove('hidden-suggestions'); if(toggleBtn) toggleBtn.innerText = 'Ocultar'; }
      document.querySelectorAll('#playerSuggestionsTrack .player-suggestion-item').forEach(item => { item.addEventListener('click', (e) => { e.stopPropagation(); const id = parseInt(item.getAttribute('data-id')); const found = masterSongs.find(s => s.id === id) || allSongs.find(s => s.id === id); if(found) { updateQueueAndMode(); playSong(found); } }); });
    }
    
    function toggleSuggestions() {
      suggestionsHidden = !suggestionsHidden;
      const track = document.getElementById('playerSuggestionsTrack');
      const toggleBtn = document.getElementById('toggleSuggestionsBtn');
      if (track) {
        if (suggestionsHidden) { track.classList.add('hidden-suggestions'); if(toggleBtn) toggleBtn.innerText = 'Mostrar'; } 
        else { track.classList.remove('hidden-suggestions'); if(toggleBtn) toggleBtn.innerText = 'Ocultar'; }
      }
    }
    
    // ==================== RENDER TOP ARTISTS ====================
    function renderTopArtists() {
      const topArtistsSection = document.getElementById('topArtistsSection');
      const artistsContainer = document.getElementById('artistsContainer');
      const shouldShow = (!isPlaylistsMode && currentSearch.trim() === '');
      if (!shouldShow) { topArtistsSection.classList.add('hidden-artists'); return; }
      topArtistsSection.classList.remove('hidden-artists');
      const topArtists = getTopArtists(6);
      if (topArtists.length === 0 || (topArtists.length === 1 && topArtists[0].plays === 0)) {
        artistsContainer.innerHTML = '<div style="color:#5a7fc7; font-size:0.8rem; padding:0.5rem;">Escucha más canciones para ver tus artistas favoritos 🎧</div>';
        return;
      }
      let html = '';
      topArtists.forEach(artist => {
        html += `<div class="artist-circle-card" data-artist="${escapeHtml(artist.name)}"><img class="artist-avatar" src="${artist.image}" alt="${escapeHtml(artist.name)}" loading="lazy"><div class="artist-name">${escapeHtml(artist.name.length > 15 ? artist.name.substring(0,12)+'...' : artist.name)}</div><div class="artist-plays">${artist.plays} reproducción${artist.plays !== 1 ? 'es' : ''}</div></div>`;
      });
      artistsContainer.innerHTML = html;
      document.querySelectorAll('.artist-circle-card').forEach(card => { card.addEventListener('click', () => { const artistName = card.getAttribute('data-artist'); if(artistName){ if (!hasKerimMusicPlus) { showToast('💎 Búsqueda solo disponible en Kerim Music+'); return; } currentSearch = artistName; searchInput.value = artistName; performSearch(); } }); });
    }
    
    // ==================== RENDER CONTENIDO ====================
    function updateCounterVisibility() { 
      if (isPlaylistsMode || currentSearch.trim() !== '') { 
        counterWrapper.classList.add('hidden-counter'); 
      } else { 
        counterWrapper.classList.remove('hidden-counter'); 
      } 
    }
    
    function renderContent(){ 
      updateCounterVisibility(); 
      renderTopArtists();
      const items = getActiveListForQueue();
      const isSearching = currentSearch.trim() !== ''; 
      if(isSearching) searchBadge.innerHTML = `🔍 Resultados: "${escapeHtml(currentSearch)}" (${items.length})`; 
      else if(isPlaylistsMode) searchBadge.innerHTML = `❤️ Tus Me gusta · ${items.length} canción${items.length !== 1 ? 'es' : ''}`; 
      else searchBadge.innerHTML = ''; 
      
      if(items.length === 0){ 
        if(isPlaylistsMode) {
          if (!hasKerimMusicPlus) {
            contentContainer.innerHTML = '<div class="no-results">💎 <strong>Kerim Music+</strong><br>Activa tu plan para guardar tus canciones favoritas</div>';
          } else {
            contentContainer.innerHTML = '<div class="no-results">💔 No hay canciones guardadas. Dale like ❤️ a una canción para agregarla a "Tus Me gusta"</div>';
          }
        } else {
          contentContainer.innerHTML = '<div class="no-results"> No se encontraron canciones</div>';
        }
        return; 
      } 
      
      let gridClass = 'gallery-grid' + (isSearching ? ' list-view' : ''); 
      let html = `<div class="${gridClass}">`; 
      items.forEach(song => { 
        const favMarker = isFav(song.id) ? ' ❤️' : ''; 
        if(isSearching) html += `<div class="image-card" data-id="${song.id}"><img src="${song.url}" loading="lazy"><div class="card-title">${escapeHtml(song.title)}<span style="font-size:0.7rem; color:#5a7fc7;"> · ${song.category}${favMarker}</span></div></div>`; 
        else html += `<div class="image-card" data-id="${song.id}"><img src="${song.url}" loading="lazy"><div class="card-title">${escapeHtml(song.title)}${isPlaylistsMode ? ' ❤️' : ''}</div></div>`; 
      }); 
      html += `</div>`; 
      contentContainer.innerHTML = html; 
      document.querySelectorAll('.image-card').forEach(card => { 
        card.addEventListener('click', () => { 
          const id = parseInt(card.dataset.id); 
          const found = masterSongs.find(s => s.id === id) || allSongs.find(s => s.id === id); 
          if(found){ updateQueueAndMode(); playSong(found); } 
        }); 
      }); 
      triggerBackgroundRefresh(); 
    }
    
    // ==================== FILTROS Y ORDEN ====================
    function updateSortChipsVisibility() { sortChipsContainer.style.display = isPlaylistsMode ? 'flex' : 'none'; }
    
    function setSortMode(mode) { 
      playlistsSortMode = mode; 
      localStorage.setItem('kerim_playlists_sort_mode', mode); 
      renderContent(); 
      updateQueueAndMode(); 
      document.querySelectorAll('.chip-sort').forEach(chip => chip.classList.remove('active')); 
      const activeChip = document.querySelector(`.chip-sort[data-sort="${mode}"]`); 
      if(activeChip) activeChip.classList.add('active'); 
    }
    
    function initChipsSortEvents() { 
      document.querySelectorAll('.chip-sort').forEach(chip => { 
        chip.addEventListener('click', (e) => { 
          e.stopPropagation(); 
          const mode = chip.getAttribute('data-sort'); 
          setSortMode(mode); 
        }); 
      }); 
      const activeChip = document.querySelector(`.chip-sort[data-sort="${playlistsSortMode}"]`); 
      if(activeChip) activeChip.classList.add('active'); 
      else document.querySelector('.chip-sort[data-sort="default"]')?.classList.add('active'); 
    }
    
    // ==================== BÚSQUEDA ====================
    function performSearch(){ 
      currentSearch = searchInput.value.trim(); 
      if(currentSearch !== '') {
        const searchResults = allSongs.filter(s => 
          s.title.toLowerCase().includes(currentSearch.toLowerCase()) || 
          (s.artist && s.artist.toLowerCase().includes(currentSearch.toLowerCase()))
        );
        masterSongs = searchResults.length > 0 ? searchResults : [];
      } else {
        masterSongs = [...shuffledSongs];
      }
      renderContent(); 
      renderSuggestions(); 
      updateQueueAndMode(); 
    }
    
    // ==================== EVENTOS ====================
    const homeBtn = document.querySelector('[data-view="home"]');
    const likesBtn = document.querySelector('[data-view="likes"]');
    
    homeBtn.addEventListener('click', () => {
      homeBtn.classList.add('active');
      likesBtn.classList.remove('active');
      isPlaylistsMode = false;
      updateSortChipsVisibility();
      renderContent();
      renderSuggestions();
      updateQueueAndMode();
    });
    
    likesBtn.addEventListener('click', () => {
      if (!hasKerimMusicPlus) {
        showToast('💎 Tus Me gusta solo disponible en Kerim Music+');
        return;
      }
      likesBtn.classList.add('active');
      homeBtn.classList.remove('active');
      isPlaylistsMode = true;
      updateSortChipsVisibility();
      renderContent();
      renderSuggestions();
      updateQueueAndMode();
    });
    
    searchButton.addEventListener('click', performSearch);
    searchInput.addEventListener('keyup', (e) => { if(e.key === 'Enter') performSearch(); });
    
    // ==================== AUDIO EVENTOS ====================
    audio.addEventListener('timeupdate',()=>{ 
      if(audio.duration && isFinite(audio.duration) && !audio.paused){ 
        let p = (audio.currentTime/audio.duration)*100; 
        progressFill.style.width = `${p}%`; 
        miniProgressFill.style.width = `${p}%`; 
        currentTimeSpan.innerText = formatTime(audio.currentTime); 
        if(durationSpan.innerText === '0:00') durationSpan.innerText = formatTime(audio.duration); 
      } 
    });
    
    audio.addEventListener('loadedmetadata',()=>{ if(audio.duration) durationSpan.innerText = formatTime(audio.duration); });
    
    audio.addEventListener('play',()=>{ isPlaying=true; updatePlayPauseIcon(); });
    audio.addEventListener('pause',()=>{ isPlaying=false; updatePlayPauseIcon(); });
    
    audio.addEventListener('ended',()=>{ 
      if (isAdPlaying) return;
      nextTrack(); 
    });
    
    // ==================== PROGRESS BAR ====================
    progressBarBg.addEventListener('click',(e)=>{ 
      if(audio.duration){ 
        let rect = progressBarBg.getBoundingClientRect(); 
        let perc = (e.clientX - rect.left)/rect.width; 
        audio.currentTime = perc * audio.duration; 
      } 
    });
    
    // ==================== CONTROLES ====================
    fullPlayPause.addEventListener('click', togglePlayPause);
    fullNext.addEventListener('click', nextTrack);
    fullPrev.addEventListener('click', prevTrack);
    miniPlayPause.addEventListener('click', togglePlayPause);
    miniNext.addEventListener('click', nextTrack);
    miniPrev.addEventListener('click', prevTrack);
    
    miniPlayerDiv.addEventListener('click',(e)=>{ if(!e.target.closest('.mini-btn')) fullPlayer.classList.add('show'); });
    closePlayerBtn.addEventListener('click',()=>fullPlayer.classList.remove('show'));
    
    favMainBtn.addEventListener('click',()=>{ 
      if(currentSong && !currentSong.isAd){ 
        if (!hasKerimMusicPlus) {
          showToast('💎 Solo disponible en Kerim Music+');
          return;
        }
        toggleFav(currentSong.id); 
        if(isPlaylistsMode) renderContent(); 
      } 
    });
    
    shuffleBtnPlayer.addEventListener('click', toggleShuffle);
    if (toggleSuggestionsBtnElem) toggleSuggestionsBtnElem.addEventListener('click', toggleSuggestions);
    
    // ==================== WELCOME MODAL ====================
    const welcomeModal = document.getElementById('welcomeModal');
    const acceptBtn = document.getElementById('acceptWelcomeBtn');
    if (localStorage.getItem('kerim_welcome_accepted') === 'true') welcomeModal.classList.add('hidden');
    else { 
      welcomeModal.classList.remove('hidden'); 
      acceptBtn.addEventListener('click', () => { 
        localStorage.setItem('kerim_welcome_accepted', 'true'); 
        welcomeModal.classList.add('hidden'); 
      }); 
    }
    
    // ==================== INICIALIZACIÓN FINAL ====================
    updateUIPlan();
    changeBackgroundRandomly();
    isPlaylistsMode = false; 
    currentSearch = '';
    updateSortChipsVisibility();
    initChipsSortEvents();
    renderContent(); 
    renderSuggestions(); 
    updateQueueAndMode(); 
    renderTopArtists();
    if(masterSongs.length) currentSong = masterSongs[0];
    audio.volume = 0.9;
    
    console.log('🎵 Kerim Music+ iniciado correctamente');
    console.log('🔀 Modo Aleatorio: haz clic en 🔀 para activarlo/desactivarlo');
    console.log('📺 Los anuncios con video se reproducirán en el reproductor');
    
  })();
</script>
</body>
</html>
