<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <title>Kerim Music+ · Spotify Style</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background-color: #0a0a1a; color: #e0e8ff; font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; line-height: 1.4; overflow-x: hidden; width: 100%; min-height: 100vh; }

    .suggestions-section { margin-bottom: 2rem; padding: 0; }

    // Mezcla inicial
    function shuffleArrayFn(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    let masterSongs = shuffleArrayFn(originalSongs);

    // Estado global
    let favSet = new Set(), playCount = new Map(), artistPlayCount = new Map(), favOrder = [];
    let listeningArtists = {};
    const LISTENING_DURATION_DAYS = 15;
    try {
      const saved = localStorage.getItem('kerim_listening_artists');
      if(saved) {
        listeningArtists = JSON.parse(saved);
        const now = Date.now();
        for(let a in listeningArtists) {
          if(listeningArtists[a].active) {
            if((now - listeningArtists[a].startDate) / (1000*60*60*24) >= LISTENING_DURATION_DAYS) {
              listeningArtists[a].active = false;
            }
          }
        }
        localStorage.setItem('kerim_listening_artists', JSON.stringify(listeningArtists));
      }
    } catch(e){}

    function isListeningToArtist(artistName) {
      if(!artistName) return false;
      const data = listeningArtists[artistName];
      if(!data || !data.active) return false;
      return true;
    }
    function startListeningToArtist(artistName) {
      if(!artistName || isListeningToArtist(artistName)) return false;
      listeningArtists[artistName] = { startDate: Date.now(), active: true };
      localStorage.setItem('kerim_listening_artists', JSON.stringify(listeningArtists));
      return true;
    }
    function stopListeningToArtist(artistName) {
      if(!artistName) return false;
      const data = listeningArtists[artistName];
      if(!data) return false;
      const elapsed = (Date.now() - data.startDate) / (1000*60*60*24);
      if(elapsed >= LISTENING_DURATION_DAYS) {
        data.active = false;
        localStorage.setItem('kerim_listening_artists', JSON.stringify(listeningArtists));
        return true;
      }
      return false;
    }
    function getRemainingDays(artistName) {
      const data = listeningArtists[artistName];
      if(!data || !data.active) return 0;
      const elapsed = (Date.now() - data.startDate) / (1000*60*60*24);
      return Math.max(0, Math.ceil(LISTENING_DURATION_DAYS - elapsed));
    }

    function rebuildArtistCounts() {
      artistPlayCount.clear();
      for(let s of masterSongs) {
        let p = playCount.get(s.id) || 0;
        if(p > 0) {
          let artist = s.artist || 'Artista';
          artistPlayCount.set(artist, (artistPlayCount.get(artist)||0) + p);
        }
      }
    }
    try {
      const savedFav = localStorage.getItem('kerim_favs_set');
      if(savedFav) JSON.parse(savedFav).forEach(id => favSet.add(Number(id)));
      const savedCounts = localStorage.getItem('kerim_play_counts');
      if(savedCounts) { const parsed = JSON.parse(savedCounts); for(let [k,v] of Object.entries(parsed)) playCount.set(Number(k), v); }
      const savedOrder = localStorage.getItem('kerim_fav_order');
      if(savedOrder) favOrder = JSON.parse(savedOrder);
      else favOrder = [...favSet];
      rebuildArtistCounts();
    } catch(e){}

    function saveFavs(){ localStorage.setItem('kerim_favs_set', JSON.stringify([...favSet])); favOrder = favOrder.filter(id => favSet.has(id)); for(let id of favSet) if(!favOrder.includes(id)) favOrder.push(id); localStorage.setItem('kerim_fav_order', JSON.stringify(favOrder)); }
    function savePlayCounts(){ let obj = {}; for(let [k,v] of playCount.entries()) obj[k] = v; localStorage.setItem('kerim_play_counts', JSON.stringify(obj)); rebuildArtistCounts(); renderTopArtists(); }
    function incrementPlayCount(songId){ 
      let song = masterSongs.find(s => s.id === songId);
      if(song) {
        let artist = song.artist || 'Artista';
        let newCount = (playCount.get(songId) || 0) + 1;
        playCount.set(songId, newCount);
        artistPlayCount.set(artist, (artistPlayCount.get(artist)||0) + 1);
        savePlayCounts();
      } else {
        playCount.set(songId, (playCount.get(songId)||0) + 1);
        savePlayCounts();
      }
    }
    function isFav(id){ return favSet.has(id); }
    function toggleFav(id){ if(isFav(id)) { favSet.delete(id); favOrder = favOrder.filter(fid => fid !== id); } else { favSet.add(id); if(!favOrder.includes(id)) favOrder.push(id); } saveFavs(); updateFavButtonUI(); if(isPlaylistsMode) renderContent(); }

    let playlistsSortMode = 'default';
    const savedSort = localStorage.getItem('kerim_playlists_sort_mode');
    if(savedSort && ['default','lastFirst','firstFirst'].includes(savedSort)) playlistsSortMode = savedSort;
    function applyPlaylistsSort(songs){ if(playlistsSortMode === 'default') return songs; if(playlistsSortMode === 'lastFirst') return [...songs].reverse(); return songs; }
    function getFavSongs(){ return applyPlaylistsSort(favOrder.map(id => originalSongs.find(s => s.id === id)).filter(Boolean)); }
    function getLeastPlayedSuggestions(limit=6){ let songsWithCount = masterSongs.map(s => ({...s, plays: playCount.get(s.id)||0})); songsWithCount.sort((a,b) => a.plays - b.plays); return songsWithCount.slice(0, limit); }
    function getTopArtists(limit=6) {
      let arr = [];
      for(let [artist, plays] of artistPlayCount.entries()) {
        let song = masterSongs.find(s => (s.artist||'Artista') === artist);

    function shuffleArray(arr) { const a = [...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

    function toggleShuffle() {
      shuffleActive = !shuffleActive;
      if (shuffleActive) {
        shuffleBtnPlayer.classList.add('active');
        showToast('🔀 Modo Aleatorio Activado');
        if (originalQueue.length === 0 && currentPlayQueue.length > 0) {
          originalQueue = [...currentPlayQueue];
        }
        const currentSongId = currentSong ? currentSong.id : null;
        let queueWithoutCurrent = currentPlayQueue.filter(s => s.id !== currentSongId);
        let shuffledWithoutCurrent = shuffleArray(queueWithoutCurrent);
        let newQueue = [];
        if (currentSongId && currentPlayQueue.find(s => s.id === currentSongId)) {
          newQueue = [currentSong, ...shuffledWithoutCurrent];
          currentQueueIndex = 0;
        } else {
          newQueue = shuffledWithoutCurrent;
          currentQueueIndex = 0;
        }
        currentPlayQueue = newQueue;
      } else {
        shuffleBtnPlayer.classList.remove('active');
        showToast('🔀 Modo Aleatorio Desactivado');
        if (originalQueue.length > 0) {
          const currentSongId = currentSong ? currentSong.id : null;
          let newIndex = originalQueue.findIndex(s => s.id === currentSongId);
          if (newIndex === -1 && currentSong) newIndex = 0;
          currentPlayQueue = originalQueue;
          currentQueueIndex = newIndex !== -1 ? newIndex : 0;
          originalQueue = [];
        }
      }
    }

    function getActiveListForQueue() {
      if(currentView === 'album' && currentAlbumSongs.length) {
        return currentAlbumSongs;
      }
      if(isPlaylistsMode) {
        let base = getFavSongs();
        if(currentSearch.trim() !== '') base = base.filter(s => s.title.toLowerCase().includes(currentSearch.toLowerCase()) || (s.artist && s.artist.toLowerCase().includes(currentSearch.toLowerCase())));
        return base;
      } else {
        let base = [...masterSongs];
        if(currentSearch.trim() !== '') base = base.filter(s => s.title.toLowerCase().includes(currentSearch.toLowerCase()) || (s.artist && s.artist.toLowerCase().includes(currentSearch.toLowerCase())));
        return base;
      }
    }
    function buildBaseQueue(){ return getActiveListForQueue(); }
    function updateQueueAndMode() {
      const newQueue = buildBaseQueue();
      if (shuffleActive) {
        originalQueue = [...newQueue];
        const currentSongId = currentSong ? currentSong.id : null;
        let queueWithoutCurrent = newQueue.filter(s => s.id !== currentSongId);
        let shuffledWithoutCurrent = shuffleArray(queueWithoutCurrent);
        let newQueueShuffled = [];
        if (currentSongId && newQueue.find(s => s.id === currentSongId)) {
          newQueueShuffled = [currentSong, ...shuffledWithoutCurrent];
          currentQueueIndex = 0;
        } else {
          newQueueShuffled = shuffledWithoutCurrent;
          currentQueueIndex = 0;
        }
        currentPlayQueue = newQueueShuffled;
      } else {
        currentPlayQueue = newQueue;
        if(currentSong && currentPlayQueue.findIndex(s => s.id === currentSong.id) !== -1) {
          currentQueueIndex = currentPlayQueue.findIndex(s => s.id === currentSong.id);
        } else {
          currentQueueIndex = 0;
          if(currentPlayQueue.length) currentSong = currentPlayQueue[0];
        }
      }
      if(currentPlayQueue.length === 0 && !isPlaylistsMode && masterSongs.length) {
        currentPlayQueue = [...masterSongs];
        if(shuffleActive) {
          const currentSongId = currentSong ? currentSong.id : null;
          let queueWithoutCurrent = currentPlayQueue.filter(s => s.id !== currentSongId);
          let shuffledWithoutCurrent = shuffleArray(queueWithoutCurrent);
          if(currentSongId && currentPlayQueue.find(s => s.id === currentSongId)) {
            currentPlayQueue = [currentSong, ...shuffledWithoutCurrent];
            currentQueueIndex = 0;
          } else {
            currentPlayQueue = shuffledWithoutCurrent;
            currentQueueIndex = 0;
          }
        }
      }
      if(currentPlayQueue.length && !currentSong) currentSong = currentPlayQueue[0];
    }

    function playSong(song, customQueue = null) {
      if(!song) return;
      currentSong = song;
      incrementPlayCount(song.id);
      renderSuggestions();
      renderTopArtists();
      if(customQueue) {
        currentPlayQueue = customQueue;
        // Si se pasa una cola personalizada, la usamos tal cual, pero respetamos shuffle?
        // Para álbum, queremos orden fijo, así que ignoramos shuffle.
        // Pero si shuffle está activo, podríamos desactivarlo temporalmente o mantenerlo.
        // Lo más limpio es que el álbum se reproduzca en orden y el shuffle se aplique solo si el usuario lo activa después.
        // Si shuffle está activo, lo desactivamos para el álbum completo.
        if(shuffleActive) {
          shuffleActive = false;
          shuffleBtnPlayer.classList.remove('active');
          showToast('🔀 Modo Aleatorio desactivado (álbum completo)');
        }
        currentQueueIndex = 0;
        // Asegurar que la cola tenga las canciones en el orden dado
        // Podría haber duplicados, pero no debería.
        currentPlayQueue = customQueue;
      } else {
        updateQueueAndMode();
        let idx = currentPlayQueue.findIndex(s => s.id === song.id);
        if(idx !== -1) currentQueueIndex = idx;
      }
      if(song.music) {
        audio.src = song.music;
        audio.play().catch(e => console.log);
        isPlaying = true;
      } else {
        audio.pause();
        isPlaying = false;
      }
      updateUIWithSong(song);
      fullPlayer.classList.add('show');
      miniPlayerDiv.classList.add('show');
      updatePlayPauseIcon();
      triggerBackgroundRefresh();
      renderPlayerSuggestions();
    }

    function updateUIWithSong(song){ fullCover.src = song.url; fullSongTitle.innerText = song.title; fullSongCategory.innerText = song.category; miniCover.src = song.url; miniTitle.innerText = song.title; updateFavButtonUI(); renderPlayerSuggestions(); }

    function updatePlayPauseIcon(){ const icon = isPlaying ? '⏸' : '▶'; fullPlayPause.innerText = icon; miniPlayPause.innerText = icon; }
    function nextTrack(){ if(!currentPlayQueue.length) return; let newIdx = (currentQueueIndex + 1) % currentPlayQueue.length; currentQueueIndex = newIdx; playSong(currentPlayQueue[newIdx]); }
    function prevTrack(){ if(!currentPlayQueue.length) return; let newIdx = (currentQueueIndex - 1 + currentPlayQueue.length) % currentPlayQueue.length; currentQueueIndex = newIdx; playSong(currentPlayQueue[newIdx]); }
    function togglePlayPause(){ isPlaying ? audio.pause() : audio.play(); }

    // ---------- NUEVAS FUNCIONES PARA ÁLBUMES ----------
    function renderArtistProfile() {
      if(!currentArtist) {
        renderContentFallback();
        return;
      }
      const songs = masterSongs.filter(s => {
        const artist = extractArtistFromTitle(s.title);
        return artist.toLowerCase() === currentArtist.toLowerCase();

          albumsMap.get(song.album).push(song);
        }
      });

      // Construir HTML
      let html = '';

      const listenersText = listeners === 1 ? 'oyente mensual' : 'oyentes mensuales';

      html += `

          <div class="artist-info-extra">${escapeHtml(extraInfo)}</div>
        </div>
      `;

      // Álbumes (grid)
      if (albumsMap.size > 0) {
        html += `<div style="margin:1.5rem 0 1rem 0;font-weight:600;color:#c0cfff;font-size:1rem;">Álbumes</div>`;
        html += `<div class="gallery-grid">`;
        for (let [albumName, albumSongs] of albumsMap) {
          const cover = albumSongs[0].url;
          html += `<div class="album-card" data-album="${escapeHtml(albumName)}" data-songs='${JSON.stringify(albumSongs.map(s => s.id))}'>
            <img src="${cover}" loading="lazy">
            <div class="album-title">${escapeHtml(albumName)}</div>
            <div class="album-badge">${albumSongs.length} canción${albumSongs.length !== 1 ? 'es' : ''}</div>
          </div>`;
        }
        html += `</div>`;
      }

      // Sencillos (individuales)
      if (singles.length > 0) {
        html += `<div style="margin:1.5rem 0 1rem 0;font-weight:600;color:#c0cfff;font-size:1rem;">Sencillos</div>`;
        html += `<div class="gallery-grid">`;
        singles.forEach(song => {
          const marker = isFav(song.id) ? ' ❤️' : '';
          html += `<div class="image-card" data-id="${song.id}"><img src="${song.url}" loading="lazy"><div class="card-title">${escapeHtml(song.title)}${marker}</div></div>`;
        });
        html += `</div>`;

      contentContainer.innerHTML = html;

      // Eventos para tarjetas de álbum
      document.querySelectorAll('.album-card').forEach(card => {

      document.querySelectorAll('.image-card').forEach(card => {

          const id = parseInt(card.dataset.id);

    function renderAlbumView() {

        currentView = 'home';

    // ---------- FUNCIÓN PRINCIPAL renderContent ----------
    function renderContent() {
      updateCounterVisibility();
      renderTopArtists();

      // Si estamos en vista de álbum, renderizar álbum
      if (currentView === 'album') {
        renderAlbumView();
        return;
      }
      // Si estamos en vista de artista, renderizar perfil
      if (currentView === 'artist' && currentArtist) {
        renderArtistProfile();
        return;
      }

      // Modo normal (home o likes)
      const items = getActiveListForQueue();
      const isSearching = currentSearch.trim() !== '';
      if(isSearching) filterButtons.classList.add('hidden');
      else filterButtons.classList.remove('hidden');

      if(isSearching) searchBadge.innerHTML = `🔍 Resultados: "${escapeHtml(currentSearch)}" (${items.length})`;
      else if(isPlaylistsMode) searchBadge.innerHTML = `❤️ Tus Me gusta · ${items.length} canción${items.length !== 1 ? 'es' : ''}`;
      else searchBadge.innerHTML = '';

      if(!isSearching) updateArtistBackground(null);

      if(items.length === 0) {
        if(isPlaylistsMode) contentContainer.innerHTML = '<div class="no-results">💔 No hay canciones guardadas. Dale like ❤️ a una canción para agregarla a "Tus Me gusta"</div>';
        else contentContainer.innerHTML = '<div class="no-results">✨ No se encontraron canciones</div>';
        return;
      }

      // Si hay búsqueda y coincide exactamente con un artista, mostramos perfil
      if(isSearching) {
        const searchLower = currentSearch.toLowerCase();
        let foundArtist = null;
        const artistSet = new Set();
        items.forEach(song => {
          const artist = extractArtistFromTitle(song.title);
          if(artist.toLowerCase().includes(searchLower) || searchLower.includes(artist.toLowerCase())) {
            artistSet.add(artist);
          }
        });
        if(artistSet.size > 0) {
          for(let a of artistSet) { if(a.toLowerCase() === searchLower) { foundArtist = a; break; } }
          if(!foundArtist) foundArtist = artistSet.values().next().value;
        }
        if(foundArtist) {
          // Cambiar a vista de artista
          currentView = 'artist';
          currentArtist = foundArtist;
          renderArtistProfile();
          return;
        }
      }

      // Si no es perfil de artista, mostrar lista normal
      let html = `<div class="gallery-grid">`;
      items.forEach(song => {
        const marker = isFav(song.id) ? ' ❤️' : '';
        html += `<div class="image-card" data-id="${song.id}"><img src="${song.url}" loading="lazy"><div class="card-title">${escapeHtml(song.title)}${isPlaylistsMode ? ' ❤️' : ''}</div></div>`;
      });
      html += `</div>`;
      contentContainer.innerHTML = html;

      document.querySelectorAll('.image-card').forEach(card => {
        card.addEventListener('click', () => {
          const id = parseInt(card.dataset.id);
          const found = masterSongs.find(s => s.id === id);
          if(found) { updateQueueAndMode(); playSong(found); }
        });
      });
      triggerBackgroundRefresh();
    }

    function escapeHtml(str){ return str ? str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m)) : ''; }

    function updateSortChipsVisibility() { sortChipsContainer.style.display = isPlaylistsMode ? 'flex' : 'none'; }
    function setSortMode(mode) { playlistsSortMode = mode; localStorage.setItem('kerim_playlists_sort_mode', mode); renderContent(); updateQueueAndMode(); document.querySelectorAll('.chip-sort').forEach(c => c.classList.remove('active')); const active = document.querySelector(`.chip-sort[data-sort="${mode}"]`); if(active) active.classList.add('active'); }
    function initChipsSortEvents() { document.querySelectorAll('.chip-sort').forEach(chip => { chip.addEventListener('click', (e) => { e.stopPropagation(); setSortMode(chip.getAttribute('data-sort')); }); }); const active = document.querySelector(`.chip-sort[data-sort="${playlistsSortMode}"]`); if(active) active.classList.add('active'); else document.querySelector('.chip-sort[data-sort="default"]')?.classList.add('active'); }

    // Eventos de filtros
    homeBtn.addEventListener('click', () => {
      homeBtn.classList.add('active'); likesBtn.classList.remove('active');
      isPlaylistsMode = false;
      currentSearch = ''; searchInput.value = '';
      currentView = 'home';
      currentArtist = null;
      currentAlbumName = null;
      currentAlbumSongs = [];
      filterButtons.classList.remove('hidden');
      updateSortChipsVisibility();
      renderContent(); renderSuggestions(); updateQueueAndMode();
    });
    likesBtn.addEventListener('click', () => {
      likesBtn.classList.add('active'); homeBtn.classList.remove('active');
      isPlaylistsMode = true;
      currentSearch = ''; searchInput.value = '';
      currentView = 'home';
      currentArtist = null;
      currentAlbumName = null;
      currentAlbumSongs = [];
      filterButtons.classList.remove('hidden');
      updateSortChipsVisibility();
      renderContent(); renderSuggestions(); updateQueueAndMode();
    });

    function performSearch() {
      currentSearch = searchInput.value.trim();
      if(currentSearch !== '') filterButtons.classList.add('hidden');
      else filterButtons.classList.remove('hidden');
      // Reiniciar vista a home para que la búsqueda pueda detectar artistas
      currentView = 'home';
      currentArtist = null;
      currentAlbumName = null;
      currentAlbumSongs = [];
      renderContent(); renderSuggestions(); updateQueueAndMode();
    }
    searchButton.addEventListener('click', performSearch);
    searchInput.addEventListener('keyup', (e) => { if(e.key === 'Enter') performSearch(); });

    // Player: sugerencias
    function getPlayerSuggestions(currentSongObj, limit=6) {
      if(!currentSongObj) return [];
      const sameArtist = masterSongs.filter(s => s.id !== currentSongObj.id && ((s.artist && currentSongObj.artist) && s.artist.toLowerCase() === currentSongObj.artist.toLowerCase()));
      const others = masterSongs.filter(s => s.id !== currentSongObj.id && !sameArtist.includes(s));
      return [...sameArtist, ...others].slice(0, limit);
    }
    function renderPlayerSuggestions() {
      const track = document.getElementById('playerSuggestionsTrack');
      const toggleBtn = document.getElementById('toggleSuggestionsBtn');
      if(!currentSong) { track.innerHTML = ''; return; }
      const suggestions = getPlayerSuggestions(currentSong);
      if(suggestions.length === 0) { track.innerHTML = '<div style="color:#6a8abf;text-align:center;font-size:0.7rem;">No hay sugerencias disponibles</div>'; return; }
      let html = '';
      suggestions.forEach(s => {
        const plays = playCount.get(s.id) || 0;
        html += `<div class="player-suggestion-item" data-id="${s.id}"><img class="player-suggestion-img" src="${s.url}" loading="lazy"><div class="player-suggestion-info"><div class="player-suggestion-title">${escapeHtml(s.title.length > 12 ? s.title.substring(0,10)+'...' : s.title)}</div><div class="player-suggestion-plays">${plays} escuchas</div></div></div>`;
      });
      track.innerHTML = html;
      if(suggestionsHidden) { track.classList.add('hidden-suggestions'); if(toggleBtn) toggleBtn.innerText = 'Mostrar'; } else { track.classList.remove('hidden-suggestions'); if(toggleBtn) toggleBtn.innerText = 'Ocultar'; }
      document.querySelectorAll('#playerSuggestionsTrack .player-suggestion-item').forEach(item => {
        item.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = parseInt(item.getAttribute('data-id'));
          const found = masterSongs.find(s => s.id === id);
          if(found) { updateQueueAndMode(); playSong(found); }
        });
      });
    }
    function toggleSuggestions() {
      suggestionsHidden = !suggestionsHidden;
      const track = document.getElementById('playerSuggestionsTrack');
      const toggleBtn = document.getElementById('toggleSuggestionsBtn');
      if(track) {
        if(suggestionsHidden) { track.classList.add('hidden-suggestions'); if(toggleBtn) toggleBtn.innerText = 'Mostrar'; }
        else { track.classList.remove('hidden-suggestions'); if(toggleBtn) toggleBtn.innerText = 'Ocultar'; }
      }
    }
    if(toggleSuggestionsBtnElem) toggleSuggestionsBtnElem.addEventListener('click', toggleSuggestions);

    // Eventos del reproductor
    audio.addEventListener('timeupdate', () => {
      if(audio.duration && isFinite(audio.duration)) {
        let p = (audio.currentTime/audio.duration)*100;
        progressFill.style.width = `${p}%`;
        miniProgressFill.style.width = `${p}%`;
        currentTimeSpan.innerText = formatTime(audio.currentTime);
        if(durationSpan.innerText === '0:00') durationSpan.innerText = formatTime(audio.duration);
      }
    });
    audio.addEventListener('loadedmetadata', () => { if(audio.duration) durationSpan.innerText = formatTime(audio.duration); });
    audio.addEventListener('play', () => { isPlaying = true; updatePlayPauseIcon(); });
    audio.addEventListener('pause', () => { isPlaying = false; updatePlayPauseIcon(); });
    audio.addEventListener('ended', () => { nextTrack(); });
    progressBarBg.addEventListener('click', (e) => {
      if(audio.duration) {
        let rect = progressBarBg.getBoundingClientRect();
        let perc = (e.clientX - rect.left) / rect.width;
        audio.currentTime = perc * audio.duration;
      }
    });

    fullPlayPause.addEventListener('click', togglePlayPause);
    fullNext.addEventListener('click', nextTrack);
    fullPrev.addEventListener('click', prevTrack);
    miniPlayPause.addEventListener('click', togglePlayPause);
    miniNext.addEventListener('click', nextTrack);
    miniPrev.addEventListener('click', prevTrack);
    miniPlayerDiv.addEventListener('click', (e) => { if(!e.target.closest('.mini-btn')) fullPlayer.classList.add('show'); });
    closePlayerBtn.addEventListener('click', () => fullPlayer.classList.remove('show'));
    favMainBtn.addEventListener('click', () => { if(currentSong) { toggleFav(currentSong.id); if(isPlaylistsMode) renderContent(); } });
    shuffleBtnPlayer.addEventListener('click', toggleShuffle);

    function formatTime(sec){ if(isNaN(sec)) return '0:00'; let m=Math.floor(sec/60), s=Math.floor(sec%60); return `${m}:${s<10?'0':''}${s}`; }

    // Welcome
    const welcomeModal = document.getElementById('welcomeModal');
    const acceptBtn = document.getElementById('acceptWelcomeBtn');
    if(localStorage.getItem('kerim_welcome_accepted') === 'true') welcomeModal.classList.add('hidden');
    else { welcomeModal.classList.remove('hidden'); acceptBtn.addEventListener('click', () => { localStorage.setItem('kerim_welcome_accepted', 'true'); welcomeModal.classList.add('hidden'); }); }

    // Inicialización
    changeBackgroundRandomly();
    isPlaylistsMode = false; currentSearch = '';
    currentView = 'home';
    updateSortChipsVisibility();
    initChipsSortEvents();
    renderContent(); renderSuggestions(); updateQueueAndMode(); renderTopArtists();
    if(masterSongs.length) currentSong = masterSongs[0];
    audio.volume = 0.9;

    // Sincronizar botones de artista después de cualquier render
    setTimeout(updateAllArtistButtons, 200);
  })();
</script>
</body>
</html>
