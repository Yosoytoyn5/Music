<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Kerim Music+ · Spotify Style</title>
  <style>
    /* (Aquí va todo tu CSS exactamente igual, sin cambios) */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #000000;
      color: #ffffff;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      line-height: 1.4;
      overflow-x: hidden;
      width: 100%;
    }

    .top-bar {
      background: #000000;
      padding: 0.5rem 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      border-bottom: none;
      flex-wrap: wrap;
    }

    .top-bar h1 {
      font-weight: 700;
      font-size: 1.5rem;
      background: linear-gradient(135deg, #1ed760, #1aa34a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      white-space: nowrap;
    }

    .search-container {
      display: flex;
      align-items: center;
      background: #1f1f1f;
      border: none;
      border-radius: 500px;
      padding: 0.2rem 0.2rem 0.2rem 1rem;
      flex: 1;
      min-width: 140px;
      max-width: 300px;
      transition: all 0.2s;
    }
    .search-container:focus-within {
      background: #2a2a2a;
      border: 1px solid #1ed760;
    }
    .search-container input {
      background: transparent;
      border: none;
      color: white;
      font-size: 0.85rem;
      padding: 0.6rem 0;
      width: 100%;
      outline: none;
    }
    .search-container button {
      background: transparent;
      border: none;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      cursor: pointer;
      color: #b3b3b3;
      font-size: 1rem;
      transition: 0.2s;
    }
    .search-container button:hover { color: white; }

    .filter-buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 0.5rem auto 1rem auto;
      padding: 0 1rem;
      flex-wrap: wrap;
    }
    .filter-main-btn {
      background: #232323;
      border: none;
      border-radius: 500px;
      padding: 0.55rem 1.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #f0f0f0;
      letter-spacing: 0.3px;
    }
    .filter-main-btn.active {
      background: #1ed760;
      color: #000000;
    }
    .filter-main-btn:hover:not(.active) {
      background: #3a3a3a;
      transform: scale(1.02);
    }

    .gallery-section {
      max-width: 1400px;
      margin: 0.5rem auto;
      padding: 0 1rem 6rem;
      position: relative;
    }
    
    .counter-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0.5rem auto 1rem auto;
      padding: 4px 12px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 500px;
      width: fit-content;
      gap: 0.5rem;
    }
    .counter-wrapper.hidden-counter {
      display: none;
    }
    .counter-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 1px;
      color: #1ed760;
    }
    
    .top-artists-section {
      margin-bottom: 2rem;
      padding: 0;
    }
    .top-artists-section.hidden-artists {
      display: none;
    }
    .artists-horizontal {
      display: flex;
      gap: 1.5rem;
      overflow-x: auto;
      scrollbar-width: thin;
      padding-bottom: 0.75rem;
      -webkit-overflow-scrolling: touch;
      justify-content: flex-start;
    }
    .artists-horizontal::-webkit-scrollbar {
      height: 4px;
      background: #282828;
    }
    .artists-horizontal::-webkit-scrollbar-thumb {
      background: #1ed760;
      border-radius: 10px;
    }
    .artist-circle-card {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 90px;
    }
    .artist-circle-card:hover {
      transform: translateY(-4px);
    }
    .artist-circle-card:hover .artist-avatar {
      box-shadow: 0 0 0 3px #1ed760;
    }
    .artist-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #282828;
      transition: all 0.2s ease;
      background: #1a1a1a;
    }
    .artist-name {
      font-size: 0.75rem;
      font-weight: 600;
      text-align: center;
      color: #f0f0f0;
      max-width: 90px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .artist-plays {
      font-size: 0.55rem;
      color: #b3b3b3;
    }

    .sort-chips-container {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      gap: 0.8rem;
      margin: 0.5rem auto 1.5rem auto;
      padding: 0.25rem 0.3rem 0.6rem 0.3rem;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
      justify-content: flex-start;
      width: 100%;
      white-space: nowrap;
    }
    .sort-chips-container::-webkit-scrollbar {
      height: 3px;
      background: #1e1e1e;
      border-radius: 10px;
    }
    .sort-chips-container::-webkit-scrollbar-thumb {
      background: #1ed760;
      border-radius: 10px;
    }
    .chip-sort {
      flex: 0 0 auto;
      background: #232323;
      border: none;
      border-radius: 500px;
      padding: 0.55rem 1.3rem;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #f0f0f0;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .chip-sort.active {
      background: #1ed760;
      color: #000000;
    }
    .chip-sort:hover:not(.active) {
      background: #3a3a3a;
      transform: scale(1.02);
    }
    
    .random-matte-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      transition: background-color 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      pointer-events: none;
    }
    .random-matte-bg::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 40%, rgba(30,215,96,0.05) 0%, rgba(0,0,0,0.4) 100%);
      pointer-events: none;
    }
    
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      opacity: 0;
      animation: fadeUp 0.4s forwards;
    }
    
    .music-list-view {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      width: 100%;
    }
    .music-list-item {
      background: rgba(18, 18, 18, 0.95);
      border-radius: 8px;
      border: none;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.5rem 1rem 0.5rem 0.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .music-list-item:hover {
      background: #282828;
      transform: scale(1.01);
    }
    .music-list-item img {
      width: 48px;
      height: 48px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .music-list-info {
      flex: 1;
    }
    .music-list-title {
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: -0.2px;
      color: #fff;
    }
    .music-list-cat {
      font-size: 0.7rem;
      color: #b3b3b3;
      margin-top: 2px;
    }
    .music-list-play-icon {
      font-size: 1.4rem;
      opacity: 0;
      transition: opacity 0.2s;
      color: #1ed760;
    }
    .music-list-item:hover .music-list-play-icon {
      opacity: 1;
    }
    
    .gallery-grid.list-view {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .gallery-grid.list-view .image-card {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 1rem;
      padding: 0.5rem;
      border-radius: 8px;
      background: rgba(18, 18, 18, 0.95);
    }
    .gallery-grid.list-view .image-card img {
      width: 48px;
      height: 48px;
      border-radius: 4px;
      aspect-ratio: 1/1;
      flex-shrink: 0;
    }
    .gallery-grid.list-view .card-title {
      flex: 1;
      text-align: left;
      white-space: normal;
      background: transparent;
      border: none;
      padding: 0;
      font-size: 0.85rem;
      font-weight: 500;
      color: white;
    }
    
    .suggestions-section {
      margin-bottom: 2rem;
      padding: 0;
    }
    .suggestions-horizontal {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      scrollbar-width: thin;
      padding-bottom: 0.75rem;
      -webkit-overflow-scrolling: touch;
    }
    .suggestions-horizontal::-webkit-scrollbar {
      height: 4px;
      background: #282828;
    }
    .suggestions-horizontal::-webkit-scrollbar-thumb {
      background: #1ed760;
      border-radius: 10px;
    }
    .suggestion-card {
      flex: 0 0 160px;
      background: #181818;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .suggestion-card:hover {
      background: #282828;
      transform: translateY(-4px);
    }
    .suggestion-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }
    .suggestion-info {
      padding: 0.6rem 0.5rem;
      text-align: left;
    }
    .suggestion-title {
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #f0f0f0;
      margin-bottom: 4px;
    }
    .suggestion-badge {
      font-size: 0.55rem;
      color: #1ed760;
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(30,215,96,0.1);
    }
    .suggestion-invite {
      font-size: 0.6rem;
      color: #b3b3b3;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .image-card {
      background: #181818;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.25s ease;
      border: none;
      display: flex;
      flex-direction: column;
    }
    .image-card:hover {
      background: #282828;
      transform: translateY(-4px);
    }
    .image-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      transition: transform 0.3s ease;
      display: block;
      border-radius: 0px;
    }
    .image-card:hover img {
      transform: scale(1.02);
    }
    .card-title {
      padding: 0.75rem 0.5rem;
      text-align: left;
      font-size: 0.8rem;
      font-weight: 600;
      color: #f0f0f0;
      background: transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    @media (min-width: 500px) {
      .gallery-grid:not(.list-view) { grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    }
    @media (min-width: 640px) {
      .gallery-grid:not(.list-view) { grid-template-columns: repeat(4, 1fr); }
    }
    @media (min-width: 900px) {
      .gallery-grid:not(.list-view) { grid-template-columns: repeat(5, 1fr); }
    }
    @media (min-width: 1200px) {
      .gallery-grid:not(.list-view) { grid-template-columns: repeat(6, 1fr); }
    }
    
    .no-results {
      text-align: center;
      padding: 3rem;
      color: #b3b3b3;
      background: rgba(24,24,24,0.8);
      border-radius: 8px;
    }
    .search-badge {
      font-size: 0.8rem;
      color: #b3b3b3;
      margin-bottom: 1rem;
      padding-left: 0.5rem;
    }
    
    .fullscreen-player {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #1a1a1a 0%, #000000 100%);
      backdrop-filter: blur(0);
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      overflow-y: auto;
      padding: 1rem;
    }
    .fullscreen-player.show { opacity: 1; visibility: visible; }
    .player-card {
      background: transparent;
      border: none;
      max-width: 500px;
      width: 100%;
      margin: 0 auto;
    }
    .player-cover {
      width: min(70vw, 280px);
      max-width: 280px;
      margin: 0 auto 1.5rem auto;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .player-cover img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
    .song-details { 
      text-align: center; 
      margin-bottom: 1rem;
    }
    .song-details h2 { 
      font-size: clamp(1rem, 5vw, 1.3rem); 
      font-weight: 700; 
      letter-spacing: -0.3px; 
      margin-bottom: 0.3rem;
    }
    .song-category { color: #1ed760; font-size: 0.75rem; font-weight: 500; }
    
    .fav-shuffle-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      margin-top: 0.8rem;
    }
    .fav-btn-player {
      background: transparent;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.4rem;
      cursor: pointer;
      transition: 0.2s;
      color: #b3b3b3;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .fav-btn-player.active { color: #1ed760; }
    .fav-btn-player:hover { color: white; transform: scale(1.05); }
    
    .ctrl-btn.shuffle-btn-player {
      background: transparent;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.2s;
      color: #b3b3b3;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .ctrl-btn.shuffle-btn-player.active { color: #1ed760; }
    .ctrl-btn.shuffle-btn-player:hover { color: white; transform: scale(1.05); }
    
    .progress-area { width: 100%; margin: 1.5rem 0; }
    .time-row { display: flex; justify-content: space-between; font-size: 0.7rem; color: #b3b3b3; margin-bottom: 5px; }
    .progress-bar-bg {
      width: 100%;
      height: 4px;
      background: #282828;
      border-radius: 2px;
      cursor: pointer;
    }
    .progress-fill { width: 0%; height: 100%; background: #1ed760; border-radius: 2px; }
    
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin: 1rem 0;
    }
    .ctrl-btn {
      background: transparent;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #b3b3b3;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .ctrl-btn:hover {
      color: white;
      transform: scale(1.05);
    }
    .ctrl-btn.play-pause {
      width: 64px;
      height: 64px;
      background: #1ed760;
      color: #000000;
      font-size: 1.8rem;
    }
    .ctrl-btn.play-pause:hover {
      background: #1ed760;
      transform: scale(1.05);
      color: #000000;
    }
    
    .close-player {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #b3b3b3;
    }
    .close-player:hover {
      color: white;
      transform: scale(1.05);
    }
    
    .player-suggestions {
      margin-top: 1.5rem;
    }
    .player-suggestions-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.8rem;
    }
    .player-suggestions-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: #b3b3b3;
      letter-spacing: 0.5px;
    }
    .toggle-suggestions-btn {
      background: transparent;
      border: 1px solid #3a3a3a;
      border-radius: 500px;
      padding: 0.25rem 0.8rem;
      font-size: 0.6rem;
      cursor: pointer;
      color: #b3b3b3;
      transition: all 0.2s ease;
    }
    .toggle-suggestions-btn:hover {
      border-color: #1ed760;
      color: white;
    }
    .player-suggestions-track {
      display: flex;
      gap: 0.8rem;
      overflow-x: auto;
      scrollbar-width: thin;
      padding-bottom: 0.6rem;
      transition: opacity 0.2s ease;
    }
    .player-suggestions-track.hidden-suggestions {
      display: none;
    }
    .player-suggestion-item {
      flex: 0 0 min(22vw, 100px);
      min-width: 80px;
      background: #181818;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      overflow: hidden;
    }
    .player-suggestion-item:hover {
      background: #282828;
      transform: translateY(-4px);
    }
    .player-suggestion-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      display: block;
    }
    .player-suggestion-info {
      padding: 0.4rem 0.2rem;
    }
    .player-suggestion-title {
      font-size: 0.6rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #f0f0f0;
    }
    .player-suggestion-plays {
      font-size: 0.45rem;
      color: #b3b3b3;
    }
    
    .mini-player {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #000000;
      border-top: 1px solid #282828;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 12px;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      z-index: 1200;
      cursor: pointer;
    }
    .mini-player.show { transform: translateY(0); }
    .mini-cover { width: 48px; height: 48px; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
    .mini-cover img { width: 100%; height: 100%; object-fit: cover; }
    .mini-info { flex: 1; min-width: 0; }
    .mini-title { font-weight: 600; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: white; }
    .mini-controls { display: flex; gap: 8px; flex-shrink: 0; }
    .mini-btn {
      background: transparent;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 0.9rem;
      cursor: pointer;
      color: #b3b3b3;
    }
    .mini-btn:hover { color: white; }
    .mini-progress-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: #282828;
    }
    .mini-progress-fill { width: 0%; height: 100%; background: #1ed760; }
    
    .welcome-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(8px);
      z-index: 5000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }
    .welcome-modal.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .welcome-card {
      background: #121212;
      border-radius: 8px;
      padding: 2rem 1.5rem;
      text-align: center;
      max-width: 320px;
      width: 85%;
    }
    .welcome-card h2 { color: #1ed760; margin-bottom: 0.5rem; }
    .accept-btn { background: #1ed760; color: black; border: none; padding: 0.8rem 2rem; border-radius: 500px; font-weight: bold; margin-top: 1rem; cursor: pointer; transition: 0.2s; }
    .accept-btn:hover { transform: scale(1.02); background: #1aa34a; }
    
    .attribution { text-align: center; margin-top: 2rem; font-size: 0.6rem; color: #5a5a5a; }
    
    @media (max-width: 480px) {
      .top-bar h1 { font-size: 1.2rem; }
      .artist-avatar { width: 65px; height: 65px; }
      .artist-circle-card { width: 75px; }
      .suggestion-card { flex: 0 0 130px; }
    }
    
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="random-matte-bg" id="randomMatteBg"></div>

<div class="welcome-modal" id="welcomeModal">
  <div class="welcome-card"><h2>Kerim Music+</h2><p style="color:#b3b3b3">Disfruta tu música</p><button class="accept-btn" id="acceptWelcomeBtn">COMENZAR</button></div>
</div>

<header class="top-bar">
  <h1>Kerim Music+</h1>
  <div class="search-container">
    <input type="text" id="searchInput" placeholder="¿Qué quieres escuchar?">
    <button id="searchButton">🔍</button>

      if (isPlaylistsMode || currentSearch.trim() !== '') { 
        counterWrapper.classList.add('hidden-counter'); 
      } else { 
        counterWrapper.classList.remove('hidden-counter'); 
      } 
    }
    
    function renderContent(){ 
      updateCounterVisibility(); 
      renderTopArtists();
      const items = getActiveListForQueue();
      const isSearching = currentSearch.trim() !== ''; 
      if(isSearching) searchBadge.innerHTML = `🔍 Resultados: "${escapeHtml(currentSearch)}" (${items.length})`; 
      else if(isPlaylistsMode) searchBadge.innerHTML = `❤️ Tus Me gusta · ${items.length} canción${items.length !== 1 ? 'es' : ''}`; 
      else searchBadge.innerHTML = ''; 
      
      if(items.length === 0){ 
        if(isPlaylistsMode) contentContainer.innerHTML = '<div class="no-results">💔 No hay canciones guardadas. Dale like ❤️ a una canción para agregarla a "Tus Me gusta"</div>'; 
        else contentContainer.innerHTML = '<div class="no-results">✨ No se encontraron canciones</div>'; 
        return; 
      } 
      
      let gridClass = 'gallery-grid' + (isSearching ? ' list-view' : ''); 
      let html = `<div class="${gridClass}">`; 
      items.forEach(song => { 
        const favMarker = isFav(song.id) ? ' ❤️' : ''; 
        if(isSearching) html += `<div class="image-card" data-id="${song.id}"><img src="${song.url}" loading="lazy"><div class="card-title">${escapeHtml(song.title)}<span style="font-size:0.7rem; color:#b3b3b3;"> · ${song.category}${favMarker}</span></div></div>`; 
        else html += `<div class="image-card" data-id="${song.id}"><img src="${song.url}" loading="lazy"><div class="card-title">${escapeHtml(song.title)}${isPlaylistsMode ? ' ❤️' : ''}</div></div>`; 
      }); 
      html += `</div>`; 
      contentContainer.innerHTML = html; 
      document.querySelectorAll('.image-card').forEach(card => { 
        card.addEventListener('click', () => { 
          const id = parseInt(card.dataset.id); 
          const found = masterSongs.find(s => s.id === id); 
          if(found){ updateQueueAndMode(); playSong(found); } 
        }); 
      }); 
      triggerBackgroundRefresh(); 
    }
    
    function escapeHtml(str){ return str ? str.replace(/[&<>]/g, m => ({'&':'&', '<':'<', '>':'>'}[m] || m)) : ''; }
    function applyFilters(){ renderContent(); renderSuggestions(); updateQueueAndMode(); }
    
    function updateSortChipsVisibility() { sortChipsContainer.style.display = isPlaylistsMode ? 'flex' : 'none'; }
    function setSortMode(mode) { playlistsSortMode = mode; localStorage.setItem('kerim_playlists_sort_mode', mode); renderContent(); updateQueueAndMode(); document.querySelectorAll('.chip-sort').forEach(chip => chip.classList.remove('active')); const activeChip = document.querySelector(`.chip-sort[data-sort="${mode}"]`); if(activeChip) activeChip.classList.add('active'); }
    function initChipsSortEvents() { document.querySelectorAll('.chip-sort').forEach(chip => { chip.addEventListener('click', (e) => { e.stopPropagation(); const mode = chip.getAttribute('data-sort'); setSortMode(mode); }); }); const activeChip = document.querySelector(`.chip-sort[data-sort="${playlistsSortMode}"]`); if(activeChip) activeChip.classList.add('active'); else document.querySelector('.chip-sort[data-sort="default"]')?.classList.add('active'); }
    
    const homeBtn = document.querySelector('[data-view="home"]');
    const likesBtn = document.querySelector('[data-view="likes"]');
    
    homeBtn.addEventListener('click', () => {
      homeBtn.classList.add('active');
      likesBtn.classList.remove('active');
      isPlaylistsMode = false;
      updateSortChipsVisibility();
      renderContent();
      renderSuggestions();
      updateQueueAndMode();
    });
    
    likesBtn.addEventListener('click', () => {
      likesBtn.classList.add('active');
      homeBtn.classList.remove('active');
      isPlaylistsMode = true;
      updateSortChipsVisibility();
      renderContent();
      renderSuggestions();
      updateQueueAndMode();
    });
    
    function performSearch(){ currentSearch = searchInput.value.trim(); renderContent(); renderSuggestions(); updateQueueAndMode(); }
    searchButton.addEventListener('click', performSearch);
    searchInput.addEventListener('keyup', (e) => { if(e.key === 'Enter') performSearch(); });
    
    audio.addEventListener('timeupdate',()=>{ if(audio.duration && isFinite(audio.duration)){ let p = (audio.currentTime/audio.duration)*100; progressFill.style.width = `${p}%`; miniProgressFill.style.width = `${p}%`; currentTimeSpan.innerText = formatTime(audio.currentTime); if(durationSpan.innerText === '0:00') durationSpan.innerText = formatTime(audio.duration); } });
    audio.addEventListener('loadedmetadata',()=>{ if(audio.duration) durationSpan.innerText = formatTime(audio.duration); });
    audio.addEventListener('play',()=>{ isPlaying=true; updatePlayPauseIcon(); });
    audio.addEventListener('pause',()=>{ isPlaying=false; updatePlayPauseIcon(); });
    audio.addEventListener('ended',()=>{ nextTrack(); });
    progressBarBg.addEventListener('click',(e)=>{ if(audio.duration){ let rect = progressBarBg.getBoundingClientRect(); let perc = (e.clientX - rect.left)/rect.width; audio.currentTime = perc * audio.duration; } });
    
    fullPlayPause.addEventListener('click', togglePlayPause);
    fullNext.addEventListener('click', nextTrack);
    fullPrev.addEventListener('click', prevTrack);
    miniPlayPause.addEventListener('click', togglePlayPause);
    miniNext.addEventListener('click', nextTrack);
    miniPrev.addEventListener('click', prevTrack);
    miniPlayerDiv.addEventListener('click',(e)=>{ if(!e.target.closest('.mini-btn')) fullPlayer.classList.add('show'); });
    closePlayerBtn.addEventListener('click',()=>fullPlayer.classList.remove('show'));
    favMainBtn.addEventListener('click',()=>{ if(currentSong){ toggleFav(currentSong.id); if(isPlaylistsMode) renderContent(); } });
    shuffleBtnPlayer.addEventListener('click', toggleShuffle);
    if (toggleSuggestionsBtnElem) toggleSuggestionsBtnElem.addEventListener('click', toggleSuggestions);
    
    function formatTime(sec){ if(isNaN(sec)) return '0:00'; let m=Math.floor(sec/60), s=Math.floor(sec%60); return `${m}:${s<10?'0':''}${s}`; }
    
    const welcomeModal = document.getElementById('welcomeModal'), acceptBtn = document.getElementById('acceptWelcomeBtn');
    if (localStorage.getItem('kerim_welcome_accepted') === 'true') welcomeModal.classList.add('hidden');
    else { welcomeModal.classList.remove('hidden'); acceptBtn.addEventListener('click', () => { localStorage.setItem('kerim_welcome_accepted', 'true'); welcomeModal.classList.add('hidden'); }); }
    
    changeBackgroundRandomly();
    isPlaylistsMode = false; currentSearch = '';
    updateSortChipsVisibility();
    initChipsSortEvents();
    renderContent(); renderSuggestions(); updateQueueAndMode(); renderTopArtists();
    if(masterSongs.length) currentSong = masterSongs[0];
    audio.volume = 0.9;
  })();
</script>
</body>
</html>
