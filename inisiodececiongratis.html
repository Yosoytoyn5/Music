<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Acceso Usuario - Blanco y Negro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: url('https://wallpapers.com/images/hd/newsroom-background-1500-x-999-qyiubqf85wlp4yvo.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 0;
            backdrop-filter: grayscale(100%) brightness(0.7);
        }

        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .main-container.visible {
            opacity: 1;
        }

        .legend-text {
            text-align: center;
            color: #ffffff;
            font-size: 15px;
            line-height: 1.8;
            font-weight: 300;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
            padding: 0 10px;
            animation: fadeInDown 0.8s ease-out;
        }

        .legend-text .highlight {
            color: #e0e0e0;
            font-weight: 400;
        }

        .legend-text .highlight-action {
            color: #ffffff;
            font-weight: 500;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-box {
            display: flex;
            flex-direction: row;
            gap: 12px;
            width: 100%;
            margin: 0 auto;
        }

        input[type="text"] {
            flex: 1;
            padding: 16px 20px;
            font-size: 16px;
            border: 2px solid #ffffff;
            border-radius: 50px;
            outline: none;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            color: #ffffff;
            transition: all 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        input[type="text"]:focus {
            background: rgba(0, 0, 0, 0.9);
            border-color: #aaaaaa;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        button {
            padding: 16px 28px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            color: #ffffff;
            border: 2px solid #ffffff;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
            border-color: #cccccc;
        }

        button:active {
            transform: scale(0.98);
        }

        .registrar-btn {
            background: rgba(0, 0, 0, 0.5);
            border-color: #aaaaaa;
        }
        
        .registrar-btn:hover {
            background: rgba(0, 0, 0, 0.7);
            border-color: #ffffff;
        }

        /* ============================================================
           BOTÓN MEJORAR PLAN - VERSIÓN FLOTANTE CIRCULAR
           ============================================================ */
        .mejorar-plan-flotante {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(255, 215, 0, 0.35), rgba(255, 200, 0, 0.2));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: #ffffff;
            border: 2.5px solid #ffd700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 8px 35px rgba(255, 215, 0, 0.3), 0 2px 15px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            font-size: 28px;
            font-weight: 700;
            text-decoration: none;
            padding: 0;
            line-height: 1;
            text-align: center;
        }

        .mejorar-plan-flotante::after {
            content: "⬆";
            display: block;
            font-size: 30px;
            line-height: 1;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .mejorar-plan-flotante .tooltip-text {
            position: absolute;
            bottom: 85px;
            right: 50%;
            transform: translateX(50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            border: 1px solid rgba(255, 215, 0, 0.3);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            letter-spacing: 0.5px;
        }

        .mejorar-plan-flotante:hover .tooltip-text,
        .mejorar-plan-flotante:focus .tooltip-text {
            opacity: 1;
        }

        .mejorar-plan-flotante:hover {
            transform: scale(1.12);
            background: rgba(255, 215, 0, 0.5);
            border-color: #ffffff;
            box-shadow: 0 12px 50px rgba(255, 215, 0, 0.4), 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .mejorar-plan-flotante:active {
            transform: scale(0.92);
            background: rgba(255, 215, 0, 0.6);
        }

        /* --- Tablets y pantallas medianas --- */
        @media (max-width: 900px) {
            .mejorar-plan-flotante {
                bottom: 25px;
                right: 25px;
                width: 62px;
                height: 62px;
                font-size: 24px;
                border-width: 2px;
            }
            .mejorar-plan-flotante::after {
                font-size: 26px;
            }
            .mejorar-plan-flotante .tooltip-text {
                font-size: 11px;
                bottom: 75px;
                padding: 5px 12px;
            }
        }

        /* --- Móviles grandes (600px - 768px) --- */
        @media (max-width: 768px) {
            .mejorar-plan-flotante {
                bottom: 22px;
                right: 22px;
                width: 56px;
                height: 56px;
                font-size: 20px;
                border-width: 2px;
            }
            .mejorar-plan-flotante::after {
                font-size: 22px;
            }
            .mejorar-plan-flotante .tooltip-text {
                font-size: 10px;
                bottom: 68px;
                padding: 4px 10px;
            }
        }

        /* --- Móviles medianos (480px - 600px) --- */
        @media (max-width: 600px) {
            .mejorar-plan-flotante {
                bottom: 18px;
                right: 18px;
                width: 50px;
                height: 50px;
                font-size: 18px;
                border-width: 1.8px;
                box-shadow: 0 6px 25px rgba(255, 215, 0, 0.25), 0 2px 10px rgba(0, 0, 0, 0.3);
            }
            .mejorar-plan-flotante::after {
                font-size: 20px;
            }
            .mejorar-plan-flotante .tooltip-text {
                font-size: 9px;
                bottom: 60px;
                padding: 3px 8px;
                border-radius: 16px;
            }
        }

        /* --- Móviles pequeños (400px - 480px) --- */
        @media (max-width: 480px) {
            .mejorar-plan-flotante {
                bottom: 15px;
                right: 15px;
                width: 44px;
                height: 44px;
                font-size: 15px;
                border-width: 1.5px;
                box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2), 0 2px 8px rgba(0, 0, 0, 0.25);
            }
            .mejorar-plan-flotante::after {
                font-size: 17px;
            }
            .mejorar-plan-flotante .tooltip-text {
                font-size: 8px;
                bottom: 52px;
                padding: 2px 7px;
                border-radius: 14px;
            }
        }

        /* --- Móviles muy pequeños (360px y menos) --- */
        @media (max-width: 400px) {
            .mejorar-plan-flotante {
                bottom: 12px;
                right: 12px;
                width: 38px;
                height: 38px;
                font-size: 12px;
                border-width: 1.3px;
                box-shadow: 0 3px 15px rgba(255, 215, 0, 0.15), 0 1px 6px rgba(0, 0, 0, 0.2);
            }
            .mejorar-plan-flotante::after {
                font-size: 14px;
            }
            .mejorar-plan-flotante .tooltip-text {
                font-size: 7px;
                bottom: 46px;
                padding: 2px 6px;
                border-radius: 12px;
            }
        }

        @media (max-width: 320px) {
            .mejorar-plan-flotante {
                bottom: 10px;
                right: 10px;
                width: 32px;
                height: 32px;
                font-size: 10px;
                border-width: 1px;
                box-shadow: 0 2px 10px rgba(255, 215, 0, 0.1);
            }
            .mejorar-plan-flotante::after {
                font-size: 12px;
            }
            .mejorar-plan-flotante .tooltip-text {
                display: none;
            }
        }

        /* --- Orientación horizontal (landscape) --- */
        @media (max-height: 500px) and (orientation: landscape) {
            .mejorar-plan-flotante {
                bottom: 15px;
                right: 15px;
                width: 40px;
                height: 40px;
                font-size: 14px;
                border-width: 1.5px;
            }
            .mejorar-plan-flotante::after {
                font-size: 16px;
            }
            .mejorar-plan-flotante .tooltip-text {
                font-size: 8px;
                bottom: 50px;
                padding: 2px 8px;
            }
        }

        @media (max-height: 400px) and (orientation: landscape) {
            .mejorar-plan-flotante {
                bottom: 10px;
                right: 10px;
                width: 34px;
                height: 34px;
                font-size: 11px;
                border-width: 1.2px;
            }
            .mejorar-plan-flotante::after {
                font-size: 13px;
            }
            .mejorar-plan-flotante .tooltip-text {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                max-width: 90%;
            }
            .search-box {
                gap: 10px;
            }
            input[type="text"] {
                padding: 14px 18px;
                font-size: 15px;
            }
            button {
                padding: 14px 24px;
                font-size: 15px;
            }
            .legend-text {
                font-size: 14px;
                line-height: 1.6;
            }
        }
        
        @media (max-width: 600px) {
            .search-box {
                flex-wrap: wrap;
                justify-content: center;
            }
            input[type="text"] {
                flex: 1 1 100%;
                order: 1;
            }
            .enviar-btn {
                order: 2;
            }
            .registrar-btn {
                order: 3;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            .main-container {
                max-width: 100%;
                gap: 15px;
            }
            .search-box {
                flex-direction: column;
                gap: 12px;
                width: 100%;
            }
            input[type="text"] {
                width: 100%;
                padding: 16px 18px;
                font-size: 16px;
                text-align: left;
            }
            button {
                width: 100%;
                padding: 14px 20px;
                font-size: 16px;
                font-weight: 600;
            }
            .legend-text {
                font-size: 13px;
                line-height: 1.5;
                padding: 0 5px;
            }
        }
        
        @media (max-width: 360px) {
            input[type="text"] {
                padding: 14px 16px;
                font-size: 14px;
            }
            input[type="text"]::placeholder {
                font-size: 13px;
            }
            button {
                padding: 12px 18px;
                font-size: 14px;
            }
            .legend-text {
                font-size: 12px;
            }
        }
        
        @media (hover: none) and (pointer: coarse) {
            button {
                -webkit-tap-highlight-color: rgba(255, 255, 255, 0.3);
            }
            input[type="text"] {
                font-size: 16px;
            }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border-radius: 28px;
            max-width: 340px;
            width: 85%;
            padding: 24px 20px 20px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 255, 255, 0.1);
            animation: modalAppear 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-family: inherit;
        }

        @keyframes modalAppear {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-icon {
            font-size: 56px;
            margin-bottom: 12px;
            display: inline-block;
            filter: grayscale(100%) drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }

        .modal-title {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .modal-message {
            font-size: 17px;
            color: #e0e0e0;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 12px;
            border-radius: 48px;
            margin: 14px 0 10px;
            line-height: 1.4;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-close-btn {
            background: #333333;
            border: 2px solid #666666;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            width: 100%;
            backdrop-filter: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .modal-close-btn:hover {
            background: #555555;
            border-color: #aaaaaa;
            transform: scale(1.02);
        }

        .modal-close-btn:active {
            transform: scale(0.97);
        }

        @media (max-width: 480px) {
            .modal-container {
                width: 80%;
                padding: 20px 16px 16px;
            }
            .modal-title {
                font-size: 24px;
            }
            .modal-message {
                font-size: 15px;
            }
        }

        /* Video intro con botón de play y leyenda "Anuncio" */
        .video-intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .video-intro video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000000;
        }

        .video-intro.hidden {
            display: none;
        }

        body.video-playing {
            overflow: hidden;
        }

        /* Leyenda "Anuncio" */
        .anuncio-label {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 4px;
            padding: 8px 28px;
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
        }

        /* Botón de Play personalizado */
        .play-btn-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            background: rgba(0, 0, 0, 0.3);
            transition: opacity 0.3s ease;
        }

        .play-btn-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .play-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 3px solid rgba(255, 255, 255, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
        }

        .play-btn:hover {
            transform: scale(1.08);
            background: rgba(255, 255, 255, 0.25);
            border-color: #ffffff;
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.2);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .play-btn svg {
            width: 50px;
            height: 50px;
            fill: #ffffff;
            margin-left: 8px;
        }

        @media (max-width: 600px) {
            .play-btn {
                width: 80px;
                height: 80px;
            }
            .play-btn svg {
                width: 40px;
                height: 40px;
            }
            .anuncio-label {
                font-size: 14px;
                padding: 6px 20px;
                letter-spacing: 3px;
                top: 14px;
            }
        }

        @media (max-width: 400px) {
            .play-btn {
                width: 70px;
                height: 70px;
            }
            .play-btn svg {
                width: 35px;
                height: 35px;
            }
            .anuncio-label {
                font-size: 12px;
                padding: 5px 16px;
                letter-spacing: 2px;
                top: 10px;
            }
        }

        /* ============================================================
           BOTÓN "SALTAR ANUNCIO" - CENTRADO, GRANDE Y RESPONSIVE
           ============================================================ */
        .skip-ad-btn {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #ffffff;
            border: 3px solid rgba(255, 255, 255, 0.7);
            border-radius: 60px;
            padding: 18px 40px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            z-index: 30;
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.7);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            min-height: 60px;
            min-width: 200px;
            line-height: 1.2;
        }

        .skip-ad-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .skip-ad-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffffff;
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 8px 40px rgba(255, 255, 255, 0.15);
        }

        .skip-ad-btn:active {
            transform: translateX(-50%) scale(0.95);
            background: rgba(255, 255, 255, 0.3);
        }

        .skip-ad-btn .countdown {
            font-weight: 500;
            opacity: 0.9;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 14px;
            border-radius: 30px;
            min-width: 50px;
            text-align: center;
            line-height: 1.4;
        }

        /* --- Tablets / pantallas medianas --- */
        @media (max-width: 900px) {
            .skip-ad-btn {
                bottom: 8%;
                padding: 16px 32px;
                font-size: 19px;
                min-height: 54px;
                min-width: 170px;
                gap: 10px;
                border-width: 2.5px;
            }
            .skip-ad-btn .countdown {
                font-size: 17px;
                padding: 3px 12px;
                min-width: 44px;
            }
        }

        /* --- Móviles grandes (600px - 768px) --- */
        @media (max-width: 768px) {
            .skip-ad-btn {
                bottom: 8%;
                padding: 14px 28px;
                font-size: 17px;
                min-height: 48px;
                min-width: 150px;
                gap: 8px;
                border-width: 2px;
                border-radius: 50px;
            }
            .skip-ad-btn .countdown {
                font-size: 15px;
                padding: 2px 10px;
                min-width: 38px;
            }
        }

        /* --- Móviles medianos (480px - 600px) --- */
        @media (max-width: 600px) {
            .skip-ad-btn {
                bottom: 7%;
                padding: 12px 24px;
                font-size: 15px;
                min-height: 42px;
                min-width: 130px;
                gap: 8px;
                border-width: 2px;
                border-radius: 40px;
            }
            .skip-ad-btn .countdown {
                font-size: 13px;
                padding: 2px 8px;
                min-width: 32px;
                border-radius: 20px;
            }
        }

        /* --- Móviles pequeños (400px - 480px) --- */
        @media (max-width: 480px) {
            .skip-ad-btn {
                bottom: 6%;
                padding: 10px 20px;
                font-size: 13px;
                min-height: 36px;
                min-width: 110px;
                gap: 6px;
                border-width: 1.8px;
                border-radius: 34px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            }
            .skip-ad-btn .countdown {
                font-size: 11px;
                padding: 1px 6px;
                min-width: 28px;
                border-radius: 16px;
            }
        }

        /* --- Móviles muy pequeños (360px y menos) --- */
        @media (max-width: 400px) {
            .skip-ad-btn {
                bottom: 5%;
                padding: 8px 16px;
                font-size: 11px;
                min-height: 30px;
                min-width: 90px;
                gap: 5px;
                border-width: 1.5px;
                border-radius: 28px;
                box-shadow: 0 3px 15px rgba(0, 0, 0, 0.4);
            }
            .skip-ad-btn .countdown {
                font-size: 10px;
                padding: 1px 5px;
                min-width: 22px;
                border-radius: 12px;
            }
        }

        @media (max-width: 320px) {
            .skip-ad-btn {
                bottom: 4%;
                padding: 6px 12px;
                font-size: 9px;
                min-height: 24px;
                min-width: 70px;
                gap: 4px;
                border-width: 1.2px;
                border-radius: 22px;
            }
            .skip-ad-btn .countdown {
                font-size: 8px;
                padding: 0px 4px;
                min-width: 18px;
                border-radius: 10px;
            }
        }

        /* --- Orientación horizontal (landscape) en móviles --- */
        @media (max-height: 500px) and (orientation: landscape) {
            .skip-ad-btn {
                bottom: 5%;
                padding: 8px 18px;
                font-size: 12px;
                min-height: 28px;
                min-width: 100px;
                gap: 6px;
                border-radius: 30px;
                border-width: 1.8px;
            }
            .skip-ad-btn .countdown {
                font-size: 11px;
                padding: 1px 6px;
                min-width: 26px;
            }
        }

        @media (max-height: 400px) and (orientation: landscape) {
            .skip-ad-btn {
                bottom: 4%;
                padding: 6px 14px;
                font-size: 10px;
                min-height: 22px;
                min-width: 80px;
                gap: 4px;
                border-radius: 24px;
                border-width: 1.5px;
            }
            .skip-ad-btn .countdown {
                font-size: 9px;
                padding: 0px 4px;
                min-width: 20px;
            }
        }

        .timer-display {
            display: none;
        }
    </style>
</head>
<body>
    <!-- VIDEO DE INTRO CON BOTÓN DE PLAY, LEYENDA "ANUNCIO" Y BOTÓN "SALTAR ANUNCIO" CENTRADO Y RESPONSIVE -->
    <div class="video-intro hidden" id="videoIntro">
        <!-- Leyenda "Anuncio" -->
        <div class="anuncio-label">Anuncio</div>
        
        <!-- Botón de Play (superpuesto) -->
        <div class="play-btn-overlay" id="playOverlay">
            <div class="play-btn" id="playButton">
                <svg viewBox="0 0 24 24">
                    <polygon points="5,3 19,12 5,21" />
                </svg>
            </div>
        </div>

        <!-- Botón "Saltar anuncio" - CENTRADO, GRANDE Y RESPONSIVE -->
        <button class="skip-ad-btn" id="skipAdBtn">
            Saltar <span class="countdown" id="skipCountdown">33s</span>
        </button>

        <video id="introVideo" playsinline preload="auto">
            <source src="https://www.dropbox.com/scl/fi/u8g3drfq5eg17jlth29gf/AQNNh-pvnGElBMOzs2TCWvS1Qg7-l6790vep4zd-gh7chug5cqDUambeDrsyVlUpXyXNAUSfr3XjPeRida7vBsfSEalNOo5RhwIgpKztNXzSdQ.mp4?rlkey=x0m5hp76feokbkpxxlty14swz&st=vpndoowb&raw=1" type="video/mp4">
            Tu navegador no soporta el video.
        </video>
        <div class="timer-display" id="timerDisplay">0.00</div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="main-container" id="mainContainer">
        <div class="legend-text">
            Si su usuario ya está registrado,<br>
            ingrese su información y presione <span class="highlight-action">Entrar</span>.<br>
            En caso contrario, presione <span class="highlight-action">Registrar</span>.
        </div>

        <div class="search-box">
            <input type="text" id="textInput" placeholder="Ingrese su usuario...">
            <button id="submitBtn" class="enviar-btn">Entrar</button>
            <button id="registrarBtn" class="registrar-btn">Registrar</button>
        </div>
    </div>

    <!-- BOTÓN MEJORAR PLAN - VERSIÓN FLOTANTE CIRCULAR (esquina inferior derecha) -->
    <button id="mejorarPlanBtn" class="mejorar-plan-flotante" aria-label="Mejorar Plan">
        <span class="tooltip-text">Mejorar Plan</span>
    </button>

    <!-- MODAL -->
    <div id="customModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-icon">⚠️</div>
            <div class="modal-title">Acceso denegado</div>
            <div class="modal-message" id="modalMessageText">
                La información ingresada no es válida.
            </div>
            <button class="modal-close-btn" id="modalCloseBtn">Entendido</button>
        </div>
    </div>

    <script>
        // --- VIDEO CON BOTÓN DE PLAY, LEYENDA "ANUNCIO" Y SALTAR ANUNCIO (centrado y responsive) ---
        const videoIntro = document.getElementById('videoIntro');
        const introVideo = document.getElementById('introVideo');
        const mainContainer = document.getElementById('mainContainer');
        const timerDisplay = document.getElementById('timerDisplay');
        const playOverlay = document.getElementById('playOverlay');
        const playButton = document.getElementById('playButton');
        const skipAdBtn = document.getElementById('skipAdBtn');
        const skipCountdown = document.getElementById('skipCountdown');

        timerDisplay.textContent = '0.00';

        let videoStarted = false;
        let skipAdVisible = false;
        let adSkipped = false;
        const SKIP_APPEAR_TIME = 33;
        const AD_INTERVAL_MINUTES = 60; // 60 minutos entre anuncios

        // Verificar si es la primera visita
        let isFirstVisit = true;
        let adCompleted = false;

        function iniciarVideoConSonido() {
            if (videoStarted) return;
            videoStarted = true;
            
            introVideo.muted = false;
            introVideo.volume = 1.0;
            
            var promesa = introVideo.play();
            if (promesa !== undefined) {
                promesa.then(function() {
                    console.log('Video iniciado con sonido');
                    playOverlay.classList.add('hidden');
                }).catch(function(error) {
                    console.log('Error al reproducir con sonido:', error);
                    introVideo.muted = true;
                    introVideo.play().catch(function() {});
                    alert('Para escuchar el audio, haga clic en el botón de play nuevamente.');
                    videoStarted = false;
                    playOverlay.classList.remove('hidden');
                });
            }
        }

        playButton.addEventListener('click', function(e) {
            e.stopPropagation();
            iniciarVideoConSonido();
        });

        playOverlay.addEventListener('click', function(e) {
            if (e.target === playOverlay) {
                iniciarVideoConSonido();
            }
        });

        function saltarAnuncio() {
            if (adSkipped) return;
            adSkipped = true;
            console.log('Anuncio saltado por el usuario');
            introVideo.currentTime = introVideo.duration || 0;
            introVideo.dispatchEvent(new Event('ended'));
        }

        skipAdBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            saltarAnuncio();
        });

        skipAdBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            saltarAnuncio();
        }, { passive: false });

        let anuncioActivo = false;

        function mostrarAnuncio() {
            if (anuncioActivo) return;
            
            // Si es la primera visita, siempre mostrar
            // Si no es la primera, solo mostrar si ya pasó el tiempo
            if (!isFirstVisit) {
                const lastAdTime = localStorage.getItem('lastAdTime');
                if (lastAdTime) {
                    const elapsed = (Date.now() - parseInt(lastAdTime)) / 60000; // en minutos
                    if (elapsed < AD_INTERVAL_MINUTES) {
                        console.log(`Faltan ${Math.round(AD_INTERVAL_MINUTES - elapsed)} minutos para el próximo anuncio`);
                        return;
                    }
                }
            }
            
            anuncioActivo = true;
            console.log('Mostrando anuncio');
            introVideo.currentTime = 0;
            adSkipped = false;
            videoStarted = false;
            videoIntro.classList.remove('hidden');
            document.body.classList.add('video-playing');
            skipAdBtn.classList.remove('visible');
            skipAdVisible = false;
            skipCountdown.textContent = '33s';
            playOverlay.classList.remove('hidden');
            mainContainer.classList.remove('visible');
            videoStarted = false;
            isFirstVisit = false;
        }

        function ocultarAnuncio() {
            videoIntro.classList.add('hidden');
            mainContainer.classList.add('visible');
            document.body.classList.remove('video-playing');
            anuncioActivo = false;
            playOverlay.classList.add('hidden');
            skipAdBtn.classList.remove('visible');
            skipAdVisible = false;
            // Guardar el momento en que se completó el anuncio
            localStorage.setItem('lastAdTime', Date.now().toString());
            console.log('Anuncio oculto - próximo en 60 minutos');
        }

        introVideo.addEventListener('ended', function() {
            ocultarAnuncio();
            if (!adSkipped) {
                console.log('Anuncio visto completo');
            }
        });

        // Mostrar el primer anuncio al cargar la página (solo si es primera visita)
        setTimeout(function() {
            // Verificar si es la primera visita
            const lastAdTime = localStorage.getItem('lastAdTime');
            if (!lastAdTime) {
                // Primera visita - mostrar anuncio
                mostrarAnuncio();
            } else {
                // No es primera visita - mostrar contenido directamente
                mainContainer.classList.add('visible');
                // Programar el próximo anuncio
                const elapsed = (Date.now() - parseInt(lastAdTime)) / 60000;
                const timeToNextAd = Math.max(0, AD_INTERVAL_MINUTES - elapsed);
                console.log(`Próximo anuncio en ${Math.round(timeToNextAd)} minutos`);
                setTimeout(function() {
                    mostrarAnuncio();
                }, timeToNextAd * 60000);
            }
        }, 100);

        // Verificar cada minuto si ya pasó el tiempo para el próximo anuncio
        setInterval(function() {
            if (!anuncioActivo && videoIntro.classList.contains('hidden')) {
                const lastAdTime = localStorage.getItem('lastAdTime');
                if (lastAdTime) {
                    const elapsed = (Date.now() - parseInt(lastAdTime)) / 60000;
                    if (elapsed >= AD_INTERVAL_MINUTES) {
                        mostrarAnuncio();
                    }
                }
            }
        }, 60000); // Verificar cada minuto

        introVideo.addEventListener('timeupdate', function() {
            if (!anuncioActivo) return;
            const currentTime = introVideo.currentTime;
            const duration = introVideo.duration || 0;
            
            if (currentTime >= SKIP_APPEAR_TIME && !skipAdVisible && !adSkipped && duration > 0) {
                skipAdBtn.classList.add('visible');
                skipAdVisible = true;
                console.log('Botón "Saltar anuncio" visible (después de 33s)');
            }
            
            if (skipAdVisible && !adSkipped) {
                const restante = Math.ceil(duration - currentTime);
                if (restante > 0) {
                    skipCountdown.textContent = restante + 's';
                } else {
                    skipCountdown.textContent = '0s';
                }
            }
        });

        introVideo.addEventListener('error', function() {
            ocultarAnuncio();
        });

        document.body.classList.add('video-playing');

        // --- CÓDIGO DE VALIDACIÓN ---
        var input = document.getElementById('textInput');
        var enviarBtn = document.getElementById('submitBtn');
        var registrarBtn = document.getElementById('registrarBtn');
        
        var modalOverlay = document.getElementById('customModal');
        var modalMessageText = document.getElementById('modalMessageText');
        var modalCloseBtn = document.getElementById('modalCloseBtn');

        var USUARIOS_VALIDOS = ["MAMM9511036K6", "Sain", "Ana", "Luis", "Carlos"];

        function mostrarModalInvalido(usuarioIngresado) {
            if (usuarioIngresado === "") {
                modalMessageText.innerHTML = "No ha ingresado ningún nombre.<br>Por favor, ingrese un usuario.";
            } else {
                modalMessageText.innerHTML = "“" + escapeHtml(usuarioIngresado) + "” no está autorizado.<br>Verifique su usuario o regístrese.";
            }
            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function cerrarModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        function verificarYRedirigir() {
            var texto = input.value.trim();
            
            if (texto === "") {
                mostrarModalInvalido("");
                return;
            } else if (USUARIOS_VALIDOS.indexOf(texto) === -1) {
                mostrarModalInvalido(texto);
                return;
            } else {
                sessionStorage.setItem("textoEnviado", texto);
                window.location.href = "menugratis.html";
            }
        }

        function irARegistro() {
            window.location.href = "registrorapidodewhatsapgratis.html";
        }

        // --- NUEVA FUNCIÓN PARA MEJORAR PLAN (FLOTANTE CIRCULAR) ---
        function irAMejorarPlan() {
            window.location.href = "planesgratis.html";
        }

        enviarBtn.addEventListener('click', verificarYRedirigir);
        registrarBtn.addEventListener('click', irARegistro);
        
        // Evento para el botón Mejorar Plan flotante circular
        document.getElementById('mejorarPlanBtn').addEventListener('click', irAMejorarPlan);
        
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                verificarYRedirigir();
            }
        });
        
        input.addEventListener('touchstart', function() {
            this.focus();
        });
        
        modalCloseBtn.addEventListener('click', cerrarModal);
        
        modalOverlay.addEventListener('click', function(e) {
            if (e.target === modalOverlay) {
                cerrarModal();
            }
        });
        
        var modalContainer = document.querySelector('.modal-container');
        if (modalContainer) {
            modalContainer.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                cerrarModal();
                e.preventDefault();
            }
        });

        setInterval(function() {
            if (!videoIntro.classList.contains('hidden') && anuncioActivo) {
                if (introVideo.muted) {
                    introVideo.muted = false;
                }
                if (introVideo.volume < 0.9) {
                    introVideo.volume = 1.0;
                }
                if (introVideo.paused && !playOverlay.classList.contains('hidden') === false) {
                    introVideo.play().catch(function() {});
                }
            }
        }, 500);
    </script>
</body>
</html>
