<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página con fondo blanco y negro · diseño fijo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            /* FONDO BLANCO Y NEGRO CON ANIMACIÓN */
            background: linear-gradient(135deg, #1a1a1a, #4a4a4a, #2a2a2a, #5a5a5a, #1a1a1a);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            padding: 0 10px 30px 10px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* IMAGEN DE PORTADA FIJA ARRIBA */
        .portada-fija {
            width: 100%;
            max-width: 1200px;
            margin: 12px auto 0 auto;
            padding: 0 10px;
            animation: fadeInScale 1.2s ease-out forwards;
            opacity: 0;
            transform: scale(0.9);
        }

        .portada-fija img {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 7;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 3px solid rgba(255,255,255,0.2);
            animation: subtleGlow 1.2s ease-out 0.2s forwards;
        }

        @keyframes subtleGlow {
            0% { filter: drop-shadow(0 0 0px rgba(255,255,255,0)); }
            50% { filter: drop-shadow(0 0 15px rgba(255,255,255,0.3)); }
            100% { filter: drop-shadow(0 0 0px rgba(255,255,255,0)); }
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* CONTENEDOR PRINCIPAL: una columna con todos los items */
        .botones-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 25px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 900px;
            padding: 0 10px;
        }

        /* Cada item: imagen a la izquierda, botón a la derecha */
        .boton-item {
            display: flex;
            align-items: center;
            gap: 20px;
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(5px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .boton-item:hover {
            transform: scale(1.01);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        /* Retrasos en la animación para cada item */
        .boton-item:nth-child(1) { animation-delay: 0.1s; }
        .boton-item:nth-child(2) { animation-delay: 0.2s; }
        .boton-item:nth-child(3) { animation-delay: 0.3s; }
        .boton-item:nth-child(4) { animation-delay: 0.4s; }

        .mini-img {
            flex: 0 0 180px; /* Ancho fijo para la imagen */
            width: 180px;
        }

        .mini-img img {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 5;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.15);
            transition: transform 0.3s ease;
        }

        .mini-img img:hover {
            transform: scale(1.05);
        }

        /* Contenedor del texto + botón (lado derecho) */
        .contenido-derecha {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            min-width: 0; /* Para evitar overflow */
        }

        /* Texto solo para Kerim Music */
        .texto-aviso-kerim {
            color: #e0e0e0;
            font-size: 14px;
            text-align: left;
            line-height: 1.4;
            font-weight: 500;
            letter-spacing: 0.3px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.7);
            width: 100%;
            padding: 6px 0 2px 0;
        }

        .button1 {
            width: 100%;
            max-width: 300px;
        }

        .button1 button {
            width: 100%;
            background-color: #ffffff;
            color: #000000;
            padding: 14px 20px;
            border: 2px solid #000000;
            border-radius: 50px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
            white-space: nowrap;
        }

        .button1 button:hover {
            background-color: #000000;
            color: #ffffff;
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            border-color: #ffffff;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Efecto de partículas en blanco y negro */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.05) 0%, transparent 50%);
            pointer-events: none;
            animation: particleMove 8s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes particleMove {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }

        /* --- RESPONSIVE: MANTENEMOS FILA EN MÓVIL --- */
        @media (max-width: 768px) {
            .boton-item {
                flex-direction: row; /* Mantenemos fila horizontal */
                align-items: center;
                padding: 12px 15px;
                gap: 12px;
            }

            .mini-img {
                flex: 0 0 100px; /* Imagen más pequeña en móvil */
                width: 100px;
            }

            .mini-img img {
                aspect-ratio: 16 / 5;
                border-radius: 12px;
            }

            .contenido-derecha {
                align-items: flex-start;
                gap: 6px;
            }

            .texto-aviso-kerim {
                text-align: left;
                font-size: 10px;
                padding: 2px 0;
                line-height: 1.2;
            }

            .button1 {
                max-width: 100%;
            }

            .button1 button {
                font-size: 13px;
                padding: 10px 12px;
                white-space: nowrap;
                letter-spacing: 1px;
            }
        }

        @media (max-width: 480px) {
            .boton-item {
                padding: 10px 12px;
                gap: 10px;
            }

            .mini-img {
                flex: 0 0 80px;
                width: 80px;
            }

            .mini-img img {
                aspect-ratio: 16 / 5;
                border-radius: 10px;
            }

            .portada-fija {
                padding: 0 4px;
                margin-top: 8px;
            }
            .portada-fija img {
                aspect-ratio: 16 / 6;
                border-radius: 12px;
            }

            .texto-aviso-kerim {
                font-size: 9px;
                padding: 2px 0;
            }

            .button1 button {
                font-size: 11px;
                padding: 8px 10px;
                border-radius: 25px;
                letter-spacing: 0.5px;
                white-space: nowrap;
            }
        }

        @media (max-width: 380px) {
            .boton-item {
                padding: 8px 10px;
                gap: 8px;
            }

            .mini-img {
                flex: 0 0 65px;
                width: 65px;
            }

            .button1 button {
                font-size: 10px;
                padding: 6px 8px;
            }
            .texto-aviso-kerim {
                font-size: 8px;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .boton-item {
                gap: 15px;
                padding: 15px 18px;
            }
            .mini-img {
                flex: 0 0 150px;
                width: 150px;
            }
            .button1 button {
                font-size: 16px;
                padding: 12px 16px;
            }
        }
    </style>
</head>
