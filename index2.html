<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página con fondo dinámico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            /* Fondo dinámico con animación de gradiente */
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #feca57, #ff9ff3);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
            padding: 0;
        }

        /* Animación del gradiente de fondo */
        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* Contenedor de la imagen con margen superior sutil */
        .portadainico {
            width: 100%;
            max-width: 1200px;
            margin: 12px auto 0 auto; /* Margen superior de 12px */
            padding: 0 10px;
            animation: fadeInScale 1.2s ease-out forwards;
            opacity: 0;
            transform: scale(0.9);
        }

        /* La imagen ahora es un rectángulo que se ajusta al ancho */
        .portadainico img {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 7;
            object-fit: cover;
            border-radius: 20px; /* Bordes redondeados completos nuevamente */
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 3px solid rgba(255,255,255,0.3);
            animation: subtleGlow 1.2s ease-out 0.2s forwards;
        }

        /* Animación de brillo en la imagen */
        @keyframes subtleGlow {
            0% {
                filter: drop-shadow(0 0 0px rgba(255,255,255,0));
            }
            50% {
                filter: drop-shadow(0 0 15px rgba(255,255,255,0.6));
            }
            100% {
                filter: drop-shadow(0 0 0px rgba(255,255,255,0));
            }
        }

        /* Contenedor de botones */
        .button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            margin-bottom: 20px;
        }

        .button1 {
            animation: fadeInUp 1s ease-out 0.4s forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .button1 button {
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 100%;
            min-width: 140px;
        }

        /* Efecto hover en el botón */
        .button1 button:hover {
            background-color: rgba(0, 0, 0, 0.95);
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        /* Definición de las animaciones */
        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.9);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Efecto adicional: partículas de fondo opcionales */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
            animation: particleMove 8s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes particleMove {
            0%, 100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 0.6;
                transform: scale(1.1);
            }
        }

        /* Responsive: ajustes para móviles */
        @media (max-width: 600px) {
            .portadainico {
                padding: 0 5px;
                margin-top: 8px; /* Margen superior más pequeño en móvil */
            }
            .portadainico img {
                aspect-ratio: 16 / 6;
                border-radius: 12px;
            }
            .button1 button {
                padding: 10px 18px;
                font-size: 15px;
                min-width: 120px;
            }
            .button-container {
                gap: 12px;
                margin-top: 18px;
            }
        }

        @media (min-width: 1200px) {
            .portadainico {
                margin-top: 16px; /* Margen superior ligeramente mayor en pantallas grandes */
            }
            .portadainico img {
                aspect-ratio: 16 / 5;
            }
        }
    </style>
</head>
<body>
    <div class="portadainico">
        <img src="https://i.pinimg.com/originals/db/86/b1/db86b1859084974e19605c0d016a947a.gif" alt="Imagen de portada">
    </div>
    <div class="button-container">
        <div class="button1">
            <a href="index5.html">
                <button>Agendar</button>
            </a>
        </div>
        <div class="button1">
            <a href="index4.html">
                <button>Horarios</button>
            </a>
        </div>
    </div>
</body>
</html>
