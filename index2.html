<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página con fondo blanco y negro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            /* --- FONDO BLANCO Y NEGRO CON ANIMACIÓN --- */
            background: linear-gradient(135deg, #1a1a1a, #4a4a4a, #2a2a2a, #5a5a5a, #1a1a1a);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            padding: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Contenedor de la imagen */
        .portadainico {
            width: 100%;
            max-width: 1200px;
            margin: 12px auto 0 auto;
            padding: 0 10px;
            animation: fadeInScale 1.2s ease-out forwards;
            opacity: 0;
            transform: scale(0.9);
        }

        .portadainico img {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 7;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 3px solid rgba(255,255,255,0.2);
            animation: subtleGlow 1.2s ease-out 0.2s forwards;
        }

        @keyframes subtleGlow {
            0% { filter: drop-shadow(0 0 0px rgba(255,255,255,0)); }
            50% { filter: drop-shadow(0 0 15px rgba(255,255,255,0.3)); }
            100% { filter: drop-shadow(0 0 0px rgba(255,255,255,0)); }
        }

        /* --- LISTA VERTICAL DE BOTONES EN BLANCO Y NEGRO --- */
        .button-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 25px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 300px;
            padding: 0 10px;
        }

        .button1 {
            width: 100%;
            animation: fadeInUp 1s ease-out 0.4s forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .button1 button {
            width: 100%;
            background-color: #ffffff;
            color: #000000;
            padding: 14px 20px;
            border: 2px solid #000000;
            border-radius: 50px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* Hover: invertir colores */
        .button1 button:hover {
            background-color: #000000;
            color: #ffffff;
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            border-color: #ffffff;
        }

        /* Animaciones */
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Efecto de partículas en blanco y negro */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.05) 0%, transparent 50%);
            pointer-events: none;
            animation: particleMove 8s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes particleMove {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 600px) {
            .portadainico {
                padding: 0 5px;
                margin-top: 8px;
            }
            .portadainico img {
                aspect-ratio: 16 / 6;
                border-radius: 12px;
            }
            .button-list {
                max-width: 260px;
                gap: 15px;
                margin-top: 18px;
            }
            .button1 button {
                padding: 12px 16px;
                font-size: 15px;
            }
        }

        @media (min-width: 1200px) {
            .portadainico {
                margin-top: 16px;
            }
            .portadainico img {
                aspect-ratio: 16 / 5;
            }
            .button-list {
                max-width: 360px;
            }
        }
    </style>
</head>
<body>
    <div class="portadainico">
        <img src="https://i.pinimg.com/originals/db/86/b1/db86b1859084974e19605c0d016a947a.gif" alt="Imagen de portada">
    </div>

    <!-- Lista vertical de botones en blanco y negro -->
    <div class="button-list">
        <div class="button1">
            <a href="index5.html">
                <button>Agendar</button>
            </a>
        </div>
        <div class="button1">
            <a href="index4.html">
                <button>Horarios</button>
            </a>
        </div>
    </div>
</body>
</html>
